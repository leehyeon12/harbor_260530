<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레시피 노트</title>

  <!-- Tailwind CSS (버전 고정) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>

  <!--
    ⚠️ 모든 CDN은 버전을 명시적으로 고정한다.
    미고정 시 @babel/standalone 이 최신(8.x)으로 올라가 type="text/babel"
    인라인 변환이 통째로 깨진다. Babel 은 반드시 7.x 로 고정.
  -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 추출
    // ========================================
    const { useState, useEffect, useCallback } = React

    // 같은 출처(same-origin)로 서빙되므로 상대경로 사용 (localhost 하드코딩 금지)
    const API_BASE_URL = '/api'

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 프레젠테이션)
    // ========================================

    // 카드 래퍼: 그림자 + 둥근 모서리
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl ${className}`}>
          {children}
        </div>
      )
    }

    // 배지: 개수 표시 등에 사용
    function Badge({ children, className = '' }) {
      return (
        <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold ${className}`}>
          {children}
        </span>
      )
    }

    // 스피너: 로딩 인디케이터
    function Spinner() {
      return (
        <div
          className="w-8 h-8 border-4 border-slate-200 border-t-indigo-500 rounded-full animate-spin"
          role="status"
          aria-label="로딩 중"
        />
      )
    }

    // 한 줄 입력창 (controlled)
    function Input({ value, onChange, onKeyDown, placeholder, disabled }) {
      return (
        <input
          type="text"
          value={value}
          onChange={onChange}
          onKeyDown={onKeyDown}
          placeholder={placeholder}
          disabled={disabled}
          className="w-full min-w-0 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-700
            placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-300
            focus:border-indigo-300 transition disabled:opacity-50 disabled:cursor-not-allowed"
        />
      )
    }

    // 여러 줄 입력창 (controlled) — 재료·조리법 입력용
    function Textarea({ value, onChange, placeholder, disabled, rows = 3 }) {
      return (
        <textarea
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          disabled={disabled}
          rows={rows}
          className="w-full min-w-0 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-700
            placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-300
            focus:border-indigo-300 transition resize-y disabled:opacity-50 disabled:cursor-not-allowed"
        />
      )
    }

    // 버튼: className 으로 색상을 지정하는 작은 프리미티브
    function Button({ children, onClick, disabled, type = 'button', className = '' }) {
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors
            disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        >
          {children}
        </button>
      )
    }

    // ========================================
    // 🧩 상태별 표시 컴포넌트
    // ========================================

    // 로딩 상태
    function LoadingState() {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-4 text-slate-500">
          <Spinner />
          <p className="text-sm">레시피를 불러오는 중...</p>
        </div>
      )
    }

    // 에러 상태
    function ErrorState({ message, onRetry }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-4 text-center">
          <div className="text-4xl">⚠️</div>
          <p className="text-red-600 font-medium">불러오기에 실패했어요</p>
          <p className="text-sm text-slate-500 max-w-xs break-words">{message}</p>
          <button
            onClick={onRetry}
            className="mt-2 px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg text-sm font-semibold transition-colors"
          >
            다시 시도
          </button>
        </div>
      )
    }

    // 항목 없음 상태
    function EmptyState() {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-3 text-slate-400">
          <div className="text-4xl">🍳</div>
          <p className="text-sm">아직 등록된 레시피가 없어요</p>
          <p className="text-xs">위 폼에서 첫 레시피를 추가해 보세요</p>
        </div>
      )
    }

    // ========================================
    // 📝 레시피 입력 폼 (추가 / 수정 공용)
    // ========================================
    // editing 이 있으면 수정 모드, 없으면 추가 모드
    function RecipeForm({ editing, onSubmit, onCancel, submitting }) {
      const [title, setTitle] = useState('')
      const [ingredients, setIngredients] = useState('')
      const [steps, setSteps] = useState('')

      // 수정 대상이 바뀌면 폼 값을 채운다 (추가 모드면 비운다)
      useEffect(() => {
        setTitle(editing ? editing.title : '')
        setIngredients(editing ? editing.ingredients : '')
        setSteps(editing ? editing.steps : '')
      }, [editing])

      const isEditing = !!editing
      const canSubmit = title.trim() !== '' && !submitting

      const handleSubmit = () => {
        if (!canSubmit) return
        onSubmit({
          title: title.trim(),
          ingredients: ingredients.trim(),
          steps: steps.trim(),
        })
      }

      return (
        <div className="flex flex-col gap-3">
          <Input
            value={title}
            onChange={(e) => setTitle(e.target.value)}
            placeholder="레시피 제목 (예: 김치볶음밥)"
            disabled={submitting}
          />
          <Textarea
            value={ingredients}
            onChange={(e) => setIngredients(e.target.value)}
            placeholder="재료 (한 줄에 하나씩 적어보세요)&#10;예)&#10;밥 1공기&#10;김치 100g&#10;계란 1개"
            disabled={submitting}
            rows={4}
          />
          <Textarea
            value={steps}
            onChange={(e) => setSteps(e.target.value)}
            placeholder="조리법 (단계별로 줄바꿈해서 적어보세요)&#10;예)&#10;1. 팬에 기름을 두른다&#10;2. 김치를 볶는다&#10;3. 밥을 넣고 볶는다"
            disabled={submitting}
            rows={5}
          />

          <div className="flex gap-2">
            <Button
              onClick={handleSubmit}
              disabled={!canSubmit}
              className="bg-indigo-500 hover:bg-indigo-600 text-white flex-1"
            >
              {submitting ? '저장 중…' : isEditing ? '수정 완료' : '레시피 추가'}
            </Button>
            {isEditing && (
              <Button
                onClick={onCancel}
                disabled={submitting}
                className="bg-slate-100 hover:bg-slate-200 text-slate-600"
              >
                취소
              </Button>
            )}
          </div>
        </div>
      )
    }

    // ========================================
    // 🧩 레시피 카드 컴포넌트
    // ========================================
    // 재료·조리법은 whitespace-pre-line 으로 줄바꿈을 그대로 표시
    function RecipeCard({ recipe, onEdit, onDelete, busy }) {
      const hasIngredients = recipe.ingredients && recipe.ingredients.trim() !== ''
      const hasSteps = recipe.steps && recipe.steps.trim() !== ''

      return (
        <Card className="p-5">
          <div className="flex items-start justify-between gap-3">
            <h3 className="text-lg font-bold text-slate-800 break-words">{recipe.title}</h3>
            <div className="flex gap-1 shrink-0">
              <button
                type="button"
                onClick={() => onEdit(recipe)}
                disabled={busy}
                aria-label={`"${recipe.title}" 수정`}
                className="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-500
                  hover:text-indigo-600 hover:bg-indigo-50 transition-colors
                  disabled:opacity-50 disabled:cursor-not-allowed"
              >
                수정
              </button>
              <button
                type="button"
                onClick={() => onDelete(recipe)}
                disabled={busy}
                aria-label={`"${recipe.title}" 삭제`}
                className="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400
                  hover:text-red-600 hover:bg-red-50 transition-colors
                  disabled:opacity-50 disabled:cursor-not-allowed"
              >
                삭제
              </button>
            </div>
          </div>

          {hasIngredients && (
            <div className="mt-4">
              <Badge className="bg-emerald-50 text-emerald-700">🥕 재료</Badge>
              <p className="mt-2 text-sm text-slate-600 whitespace-pre-line break-words">
                {recipe.ingredients}
              </p>
            </div>
          )}

          {hasSteps && (
            <div className="mt-4">
              <Badge className="bg-amber-50 text-amber-700">👩‍🍳 조리법</Badge>
              <p className="mt-2 text-sm text-slate-600 whitespace-pre-line break-words">
                {recipe.steps}
              </p>
            </div>
          )}

          {!hasIngredients && !hasSteps && (
            <p className="mt-3 text-sm text-slate-400">재료·조리법이 아직 없어요</p>
          )}
        </Card>
      )
    }

    // ========================================
    // 🚀 App: 레시피 CRUD 전체 로직
    // ========================================
    function App() {
      const [recipes, setRecipes] = useState([])
      const [loading, setLoading] = useState(true)
      const [error, setError] = useState(null)          // 최초 로드 실패 (전체 화면 에러)
      const [actionError, setActionError] = useState(null) // 추가/수정/삭제 액션 에러 (배너)
      const [submitting, setSubmitting] = useState(false)  // 추가·수정 요청 진행 중
      const [editing, setEditing] = useState(null)         // 수정 중인 레시피 (없으면 추가 모드)
      const [busyIds, setBusyIds] = useState(new Set())    // 삭제 진행 중인 id 집합

      // 특정 id 의 진행 상태 on/off
      const setBusy = (id, on) => {
        setBusyIds((prev) => {
          const next = new Set(prev)
          if (on) next.add(id)
          else next.delete(id)
          return next
        })
      }

      // /api/recipes 목록 조회
      const loadRecipes = useCallback(() => {
        setLoading(true)
        setError(null)

        fetch(`${API_BASE_URL}/recipes`)
          .then((res) => {
            if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`)
            return res.json()
          })
          .then((data) => {
            setRecipes(Array.isArray(data) ? data : [])
          })
          .catch((err) => {
            setError(err.message || '알 수 없는 오류')
          })
          .finally(() => {
            setLoading(false)
          })
      }, [])

      // 최초 로드 시 한 번 호출
      useEffect(() => {
        loadRecipes()
      }, [loadRecipes])

      // 추가/수정 제출: editing 유무로 POST / PUT 분기
      const handleSubmit = (payload) => {
        setSubmitting(true)
        setActionError(null)

        const isEditing = !!editing
        const url = isEditing
          ? `${API_BASE_URL}/recipes/${editing.id}`
          : `${API_BASE_URL}/recipes`
        const methodName = isEditing ? 'PUT' : 'POST'

        fetch(url, {
          method: methodName,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        })
          .then(async (res) => {
            const data = await res.json().catch(() => ({}))
            if (!res.ok) throw new Error(data.error || `요청 실패 (${res.status})`)
            return data
          })
          .then((saved) => {
            if (isEditing) {
              // 수정된 항목을 목록에서 교체
              setRecipes((prev) => prev.map((r) => (r.id === saved.id ? saved : r)))
              setEditing(null)
            } else {
              // 새 항목을 목록 맨 앞에 추가 (최신순)
              setRecipes((prev) => [saved, ...prev])
            }
          })
          .catch((err) => {
            setActionError(err.message || '저장 중 오류가 발생했어요')
          })
          .finally(() => {
            setSubmitting(false)
          })
      }

      // 수정 시작: 폼에 값을 채우고 화면 상단으로 스크롤
      const handleEdit = (recipe) => {
        setEditing(recipe)
        setActionError(null)
        window.scrollTo({ top: 0, behavior: 'smooth' })
      }

      // 수정 취소
      const handleCancelEdit = () => {
        setEditing(null)
      }

      // 삭제: DELETE /api/recipes/:id
      const handleDelete = (recipe) => {
        if (busyIds.has(recipe.id)) return
        if (!window.confirm(`"${recipe.title}" 레시피를 삭제할까요?`)) return

        setActionError(null)
        setBusy(recipe.id, true)

        fetch(`${API_BASE_URL}/recipes/${recipe.id}`, { method: 'DELETE' })
          .then(async (res) => {
            if (!res.ok) {
              const data = await res.json().catch(() => ({}))
              throw new Error(data.error || `삭제 실패 (${res.status})`)
            }
            return res.json()
          })
          .then(() => {
            setRecipes((prev) => prev.filter((r) => r.id !== recipe.id))
            // 삭제한 항목을 수정 중이었다면 폼도 초기화
            setEditing((cur) => (cur && cur.id === recipe.id ? null : cur))
          })
          .catch((err) => {
            setActionError(err.message || '삭제 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(recipe.id, false)
          })
      }

      const total = recipes.length

      return (
        <main className="max-w-2xl mx-auto px-4 py-10 sm:py-16">
          {/* 헤더 */}
          <header className="mb-6">
            <div className="flex items-end justify-between gap-3">
              <div>
                <h1 className="text-3xl font-bold tracking-tight text-slate-800">🍴 레시피 노트</h1>
                <p className="text-slate-500 text-sm mt-1">나만의 요리 레시피를 기록해요</p>
              </div>
              {!loading && !error && total > 0 && (
                <Badge className="bg-indigo-100 text-indigo-700">전체 {total}개</Badge>
              )}
            </div>
          </header>

          {/* 입력 폼 카드 */}
          <Card className="p-5 mb-6">
            <h2 className="text-base font-bold text-slate-700 mb-3">
              {editing ? '✏️ 레시피 수정' : '➕ 새 레시피 추가'}
            </h2>
            <RecipeForm
              editing={editing}
              onSubmit={handleSubmit}
              onCancel={handleCancelEdit}
              submitting={submitting}
            />

            {/* 액션 에러 배너 (추가/수정/삭제 공통) */}
            {actionError && (
              <div
                role="alert"
                className="mt-3 flex items-center justify-between gap-3 px-3 py-2 rounded-lg
                  bg-red-50 text-red-700 text-sm border border-red-100"
              >
                <span className="break-words">⚠️ {actionError}</span>
                <button
                  onClick={() => setActionError(null)}
                  aria-label="에러 닫기"
                  className="shrink-0 text-red-400 hover:text-red-600 font-bold"
                >
                  ✕
                </button>
              </div>
            )}
          </Card>

          {/* 본문: 상태별 분기 */}
          {loading && <LoadingState />}

          {!loading && error && <ErrorState message={error} onRetry={loadRecipes} />}

          {!loading && !error && total === 0 && <EmptyState />}

          {!loading && !error && total > 0 && (
            <div className="flex flex-col gap-4">
              {recipes.map((recipe) => (
                <RecipeCard
                  key={recipe.id}
                  recipe={recipe}
                  onEdit={handleEdit}
                  onDelete={handleDelete}
                  busy={busyIds.has(recipe.id)}
                />
              ))}
            </div>
          )}

          {/* 푸터 안내 */}
          <p className="text-center text-xs text-slate-400 mt-8">
            레시피는 Supabase 데이터베이스에 저장됩니다. (로그인 없이 누구나 공유)
          </p>
        </main>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
