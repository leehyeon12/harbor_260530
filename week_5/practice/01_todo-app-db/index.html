<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 목록</title>

  <!-- Tailwind CSS (버전 고정) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>

  <!--
    ⚠️ 모든 CDN은 버전을 명시적으로 고정한다.
    미고정 시 @babel/standalone 이 최신(8.x)으로 올라가 type="text/babel"
    인라인 변환이 통째로 깨진다. Babel 은 반드시 7.x 로 고정.
  -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 추출
    // ========================================
    const { useState, useEffect, useMemo, useCallback } = React

    // 같은 출처(same-origin)로 서빙되므로 상대경로 사용 (localhost 하드코딩 금지)
    const API_BASE_URL = '/api'
    // JWT 토큰을 저장할 localStorage 키
    const TOKEN_KEY = 'todo_token'
    const USER_KEY = 'todo_user'

    // ========================================
    // 🔐 인증 저장소 헬퍼 (localStorage)
    // ========================================
    const authStore = {
      getToken: () => localStorage.getItem(TOKEN_KEY),
      getUser: () => {
        try {
          return JSON.parse(localStorage.getItem(USER_KEY) || 'null')
        } catch {
          return null
        }
      },
      save: (token, user) => {
        localStorage.setItem(TOKEN_KEY, token)
        localStorage.setItem(USER_KEY, JSON.stringify(user))
      },
      clear: () => {
        localStorage.removeItem(TOKEN_KEY)
        localStorage.removeItem(USER_KEY)
      },
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 프레젠테이션)
    // ========================================

    // 카드 래퍼: 그림자 + 둥근 모서리
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl ${className}`}>
          {children}
        </div>
      )
    }

    // 배지: 개수 표시 등에 사용
    function Badge({ children, className = '' }) {
      return (
        <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold ${className}`}>
          {children}
        </span>
      )
    }

    // 스피너: 로딩 인디케이터
    function Spinner() {
      return (
        <div
          className="w-8 h-8 border-4 border-slate-200 border-t-indigo-500 rounded-full animate-spin"
          role="status"
          aria-label="로딩 중"
        />
      )
    }

    // 입력창: 라벨 없이 placeholder 기반 (controlled)
    // type 을 받아 비밀번호(password) 입력도 지원
    function Input({ value, onChange, onKeyDown, placeholder, disabled, type = 'text' }) {
      return (
        <input
          type={type}
          value={value}
          onChange={onChange}
          onKeyDown={onKeyDown}
          placeholder={placeholder}
          disabled={disabled}
          className="flex-1 min-w-0 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-700
            placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-300
            focus:border-indigo-300 transition disabled:opacity-50 disabled:cursor-not-allowed"
        />
      )
    }

    // 버튼: variant(primary)·disabled 지원하는 작은 프리미티브
    function Button({ children, onClick, disabled, type = 'button', className = '' }) {
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors
            disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        >
          {children}
        </button>
      )
    }

    // ========================================
    // 🌐 인증 헤더를 자동으로 붙이는 fetch 래퍼
    // ========================================
    // 401 응답이 오면 onUnauthorized 콜백(자동 로그아웃)을 호출한다.
    function createApiFetch(onUnauthorized) {
      return async (url, options = {}) => {
        const token = authStore.getToken()
        const headers = { ...(options.headers || {}) }
        if (token) headers['Authorization'] = `Bearer ${token}`

        const res = await fetch(url, { ...options, headers })
        if (res.status === 401) {
          onUnauthorized()
          throw new Error('로그인이 만료되었어요. 다시 로그인해 주세요.')
        }
        return res
      }
    }

    // ========================================
    // 🔑 로그인 / 회원가입 화면
    // ========================================
    function AuthForm({ onAuthSuccess }) {
      const [mode, setMode] = useState('login') // 'login' | 'register'
      const [username, setUsername] = useState('')
      const [password, setPassword] = useState('')
      const [submitting, setSubmitting] = useState(false)
      const [error, setError] = useState(null)

      const isLogin = mode === 'login'

      // 로그인/회원가입 요청
      const handleSubmit = () => {
        const id = username.trim()
        if (!id || !password || submitting) return

        setSubmitting(true)
        setError(null)

        const endpoint = isLogin ? '/auth/login' : '/auth/register'
        fetch(`${API_BASE_URL}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: id, password }),
        })
          .then(async (res) => {
            const data = await res.json().catch(() => ({}))
            if (!res.ok) throw new Error(data.error || `요청 실패 (${res.status})`)
            return data
          })
          .then((data) => {
            // 토큰 저장 후 상위로 알림
            authStore.save(data.token, data.user)
            onAuthSuccess(data.user)
          })
          .catch((err) => {
            setError(err.message || '오류가 발생했어요')
          })
          .finally(() => {
            setSubmitting(false)
          })
      }

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') handleSubmit()
      }

      // 모드 전환 시 에러 초기화
      const switchMode = (next) => {
        setMode(next)
        setError(null)
      }

      return (
        <main className="max-w-md mx-auto px-4 py-16 sm:py-24">
          <Card className="overflow-hidden">
            {/* 헤더 */}
            <header className="px-6 py-6 bg-gradient-to-r from-indigo-500 to-violet-500 text-white">
              <h1 className="text-2xl font-bold tracking-tight">할 일 목록</h1>
              <p className="text-indigo-100 text-sm mt-1">
                {isLogin ? '로그인하고 내 할 일을 관리하세요' : '회원가입하고 시작하세요'}
              </p>
            </header>

            {/* 로그인/회원가입 탭 */}
            <div className="flex border-b border-slate-100">
              <button
                onClick={() => switchMode('login')}
                className={`flex-1 py-3 text-sm font-semibold transition-colors
                  ${isLogin ? 'text-indigo-600 border-b-2 border-indigo-500' : 'text-slate-400 hover:text-slate-600'}`}
              >
                로그인
              </button>
              <button
                onClick={() => switchMode('register')}
                className={`flex-1 py-3 text-sm font-semibold transition-colors
                  ${!isLogin ? 'text-indigo-600 border-b-2 border-indigo-500' : 'text-slate-400 hover:text-slate-600'}`}
              >
                회원가입
              </button>
            </div>

            {/* 입력 폼 */}
            <div className="px-6 py-6 flex flex-col gap-3">
              <Input
                value={username}
                onChange={(e) => setUsername(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="아이디 (3자 이상)"
                disabled={submitting}
              />
              <Input
                type="password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="비밀번호 (4자 이상)"
                disabled={submitting}
              />

              {/* 에러 배너 */}
              {error && (
                <div
                  role="alert"
                  className="flex items-center gap-2 px-3 py-2 rounded-lg
                    bg-red-50 text-red-700 text-sm border border-red-100"
                >
                  <span className="break-words">⚠️ {error}</span>
                </div>
              )}

              <Button
                onClick={handleSubmit}
                disabled={submitting || username.trim() === '' || password === ''}
                className="bg-indigo-500 hover:bg-indigo-600 text-white mt-1"
              >
                {submitting ? '처리 중…' : isLogin ? '로그인' : '회원가입'}
              </Button>
            </div>
          </Card>

          <p className="text-center text-xs text-slate-400 mt-6">
            비밀번호는 서버에서 암호화(scrypt)되어 저장되며, 인증은 JWT 로 처리됩니다.
          </p>
        </main>
      )
    }

    // ========================================
    // 🧩 상태별 표시 컴포넌트
    // ========================================

    // 로딩 상태
    function LoadingState() {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-4 text-slate-500">
          <Spinner />
          <p className="text-sm">할 일을 불러오는 중...</p>
        </div>
      )
    }

    // 에러 상태
    function ErrorState({ message, onRetry }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-4 text-center">
          <div className="text-4xl">⚠️</div>
          <p className="text-red-600 font-medium">불러오기에 실패했어요</p>
          <p className="text-sm text-slate-500 max-w-xs break-words">{message}</p>
          <button
            onClick={onRetry}
            className="mt-2 px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg text-sm font-semibold transition-colors"
          >
            다시 시도
          </button>
        </div>
      )
    }

    // 항목 없음 상태
    function EmptyState() {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-3 text-slate-400">
          <div className="text-4xl">📭</div>
          <p className="text-sm">등록된 할 일이 없어요</p>
        </div>
      )
    }

    // ========================================
    // 🧩 Todo 항목 컴포넌트
    // ========================================
    // done 은 서버 상태(todo.done)를 그대로 반영한다.
    function TodoItem({ todo, onToggle, onDelete, busy }) {
      const done = todo.done
      return (
        <li className="group flex items-center gap-2">
          <label
            className={`flex flex-1 min-w-0 items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition-colors select-none
              ${done ? 'bg-slate-50' : 'hover:bg-slate-50'}`}
          >
            {/* 체크박스: 토글 시 서버에 PATCH 로 저장 (낙관적 업데이트) */}
            <input
              type="checkbox"
              checked={done}
              disabled={busy}
              onChange={() => onToggle(todo)}
              className="w-5 h-5 rounded accent-indigo-500 cursor-pointer shrink-0 disabled:cursor-not-allowed"
            />
            <span
              className={`truncate text-slate-700 transition-all
                ${done ? 'line-through text-slate-400 opacity-60' : ''}`}
            >
              {todo.text}
            </span>
          </label>

          {/* 삭제 버튼: 클릭 시 서버에 DELETE 요청 */}
          <button
            type="button"
            onClick={() => onDelete(todo)}
            disabled={busy}
            aria-label={`"${todo.text}" 삭제`}
            className="shrink-0 px-3 py-2 rounded-lg text-sm font-medium text-slate-400
              hover:text-red-600 hover:bg-red-50 transition-colors
              disabled:opacity-50 disabled:cursor-not-allowed
              sm:opacity-0 sm:group-hover:opacity-100 focus:opacity-100"
          >
            삭제
          </button>
        </li>
      )
    }

    // ========================================
    // 📄 Todo 페이지 컴포넌트 (비즈니스 로직)
    // ========================================
    // user: 현재 로그인 사용자, onLogout: 로그아웃 콜백, apiFetch: 인증 fetch 래퍼
    function TodoApp({ user, onLogout, apiFetch }) {
      const [todos, setTodos] = useState([])      // 서버에서 받아온 목록 (done 포함)
      const [loading, setLoading] = useState(true)
      const [error, setError] = useState(null)    // 최초 로드 실패 (전체 화면 에러)
      const [actionError, setActionError] = useState(null) // 추가/토글/삭제 등 액션 에러 (배너)
      const [text, setText] = useState('')        // 입력창 값 (controlled)
      const [adding, setAdding] = useState(false)  // 추가 요청 진행 중
      const [busyIds, setBusyIds] = useState(new Set()) // 토글/삭제 진행 중인 id 집합

      // 특정 id 의 진행 상태 on/off
      const setBusy = (id, on) => {
        setBusyIds((prev) => {
          const next = new Set(prev)
          if (on) next.add(id)
          else next.delete(id)
          return next
        })
      }

      // /api/todos 목록 조회 (인증 fetch 사용)
      const loadTodos = useCallback(() => {
        setLoading(true)
        setError(null)

        apiFetch(`${API_BASE_URL}/todos`)
          .then((res) => {
            if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`)
            return res.json()
          })
          .then((data) => {
            setTodos(Array.isArray(data) ? data : [])
          })
          .catch((err) => {
            setError(err.message || '알 수 없는 오류')
          })
          .finally(() => {
            setLoading(false)
          })
      }, [apiFetch])

      // 최초 로드 시 한 번 호출
      useEffect(() => {
        loadTodos()
      }, [loadTodos])

      // 추가: POST /api/todos { text }
      const handleAdd = () => {
        const value = text.trim()
        if (!value || adding) return // 빈 입력 차단 / 중복 요청 방지

        setAdding(true)
        setActionError(null)

        apiFetch(`${API_BASE_URL}/todos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: value }),
        })
          .then((res) => {
            if (!res.ok) throw new Error(`추가 실패 (${res.status})`)
            return res.json()
          })
          .then((created) => {
            // 응답으로 받은 항목을 목록 끝에 반영
            setTodos((prev) => [...prev, created])
            setText('') // 입력창 비우기
          })
          .catch((err) => {
            setActionError(err.message || '추가 중 오류가 발생했어요')
          })
          .finally(() => {
            setAdding(false)
          })
      }

      // 입력창 Enter 키로도 추가
      const handleKeyDown = (e) => {
        if (e.key === 'Enter') handleAdd()
      }

      // 토글: PATCH /api/todos/:id { done } — 낙관적 업데이트 후 실패 시 롤백
      const handleToggle = (todo) => {
        if (busyIds.has(todo.id)) return
        const nextDone = !todo.done

        setActionError(null)
        setBusy(todo.id, true)
        // 1) 화면 먼저 갱신 (낙관적)
        setTodos((prev) =>
          prev.map((t) => (t.id === todo.id ? { ...t, done: nextDone } : t))
        )

        apiFetch(`${API_BASE_URL}/todos/${todo.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: nextDone }),
        })
          .then((res) => {
            if (!res.ok) throw new Error(`저장 실패 (${res.status})`)
            return res.json()
          })
          .then((updated) => {
            // 서버가 확정한 값으로 동기화
            setTodos((prev) =>
              prev.map((t) => (t.id === updated.id ? { ...t, ...updated } : t))
            )
          })
          .catch((err) => {
            // 2) 실패 시 원래 상태로 롤백 + 에러 표시
            setTodos((prev) =>
              prev.map((t) => (t.id === todo.id ? { ...t, done: todo.done } : t))
            )
            setActionError(err.message || '저장 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(todo.id, false)
          })
      }

      // 삭제: DELETE /api/todos/:id — 성공 시 목록에서 제거
      const handleDelete = (todo) => {
        if (busyIds.has(todo.id)) return

        setActionError(null)
        setBusy(todo.id, true)

        apiFetch(`${API_BASE_URL}/todos/${todo.id}`, { method: 'DELETE' })
          .then((res) => {
            if (!res.ok) throw new Error(`삭제 실패 (${res.status})`)
            return res.json()
          })
          .then(() => {
            setTodos((prev) => prev.filter((t) => t.id !== todo.id))
          })
          .catch((err) => {
            setActionError(err.message || '삭제 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(todo.id, false)
          })
      }

      // 전체/완료 개수 계산 (서버 done 기준)
      const total = todos.length
      const doneCount = useMemo(
        () => todos.filter((t) => t.done).length,
        [todos]
      )

      return (
        <main className="max-w-lg mx-auto px-4 py-10 sm:py-16">
          <Card className="overflow-hidden">
            {/* 헤더 */}
            <header className="px-6 py-6 bg-gradient-to-r from-indigo-500 to-violet-500 text-white">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <h1 className="text-2xl font-bold tracking-tight">할 일 목록</h1>
                  <p className="text-indigo-100 text-sm mt-1">
                    <span className="font-semibold">{user?.username}</span> 님, 오늘도 화이팅!
                  </p>
                </div>
                {/* 로그아웃 버튼 */}
                <button
                  onClick={onLogout}
                  className="shrink-0 px-3 py-1.5 rounded-lg text-sm font-semibold
                    bg-white/20 hover:bg-white/30 text-white transition-colors"
                >
                  로그아웃
                </button>
              </div>

              {/* 전체/완료 개수 배지 (로딩/에러가 아닐 때만) */}
              {!loading && !error && total > 0 && (
                <div className="flex gap-2 mt-4">
                  <Badge className="bg-white/20 text-white">
                    전체 {total}개
                  </Badge>
                  <Badge className="bg-white/20 text-white">
                    완료 {doneCount}개
                  </Badge>
                </div>
              )}
            </header>

            {/* 입력 영역: 추가 (로딩/전체에러 아닐 때만 노출) */}
            {!loading && !error && (
              <div className="px-6 pt-5">
                <div className="flex gap-2">
                  <Input
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder="할 일을 입력하세요"
                    disabled={adding}
                  />
                  <Button
                    onClick={handleAdd}
                    disabled={adding || text.trim() === ''}
                    className="bg-indigo-500 hover:bg-indigo-600 text-white shrink-0"
                  >
                    {adding ? '추가 중…' : '추가'}
                  </Button>
                </div>

                {/* 액션 에러 배너 (추가/토글/삭제 공통) */}
                {actionError && (
                  <div
                    role="alert"
                    className="mt-3 flex items-center justify-between gap-3 px-3 py-2 rounded-lg
                      bg-red-50 text-red-700 text-sm border border-red-100"
                  >
                    <span className="break-words">⚠️ {actionError}</span>
                    <button
                      onClick={() => setActionError(null)}
                      aria-label="에러 닫기"
                      className="shrink-0 text-red-400 hover:text-red-600 font-bold"
                    >
                      ✕
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* 본문: 상태별 분기 */}
            <div className="px-6 py-4">
              {loading && <LoadingState />}

              {!loading && error && (
                <ErrorState message={error} onRetry={loadTodos} />
              )}

              {!loading && !error && total === 0 && <EmptyState />}

              {!loading && !error && total > 0 && (
                <ul className="flex flex-col gap-1 py-2">
                  {todos.map((todo) => (
                    <TodoItem
                      key={todo.id}
                      todo={todo}
                      onToggle={handleToggle}
                      onDelete={handleDelete}
                      busy={busyIds.has(todo.id)}
                    />
                  ))}
                </ul>
              )}
            </div>
          </Card>

          {/* 푸터 안내 */}
          <p className="text-center text-xs text-slate-400 mt-6">
            체크 상태와 추가·삭제 내용은 내 계정에 저장됩니다.
          </p>
        </main>
      )
    }

    // ========================================
    // 🚀 App: 로그인 여부에 따라 화면 분기
    // ========================================
    function App() {
      // 새로고침해도 유지되도록 localStorage 에서 초기값 로드
      const [user, setUser] = useState(() => authStore.getUser())

      // 로그아웃: 토큰 제거 후 상태 초기화
      const handleLogout = useCallback(() => {
        authStore.clear()
        setUser(null)
      }, [])

      // 인증 실패(401) 시 자동 로그아웃되는 fetch 래퍼 (user 변동과 무관하게 고정)
      const apiFetch = useMemo(() => createApiFetch(handleLogout), [handleLogout])

      // 토큰은 있는데 user 정보가 없을 수도 있으니, 토큰 유무로 화면 판단
      const hasToken = !!authStore.getToken()

      if (!user || !hasToken) {
        return <AuthForm onAuthSuccess={setUser} />
      }
      return <TodoApp user={user} onLogout={handleLogout} apiFetch={apiFetch} />
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
