<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React

    // ========================================
    // 유틸
    // ========================================

    let idSeed = 1
    function makeId() {
      idSeed += 1
      return idSeed
    }

    function formatWon(amount) {
      return Math.round(amount).toLocaleString('ko-KR') + '원'
    }

    function nameOf(people, id) {
      const p = people.find((x) => x.id === id)
      return p ? p.name : '?'
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트
    // ========================================

    function Button({ variant = 'primary', size = 'md', onClick, disabled, className = '', children }) {
      const base = 'inline-flex items-center justify-center font-semibold rounded-lg transition active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed'
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700',
        secondary: 'bg-slate-200 text-slate-700 hover:bg-slate-300',
        danger: 'bg-red-100 text-red-600 hover:bg-red-200',
        ghost: 'bg-transparent text-indigo-600 hover:bg-indigo-50'
      }
      const sizes = { sm: 'text-sm px-2.5 py-1', md: 'text-sm px-4 py-2', lg: 'text-base px-5 py-2.5' }
      return (
        <button className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} onClick={onClick} disabled={disabled}>
          {children}
        </button>
      )
    }

    function Input({ label, type = 'text', value, onChange, placeholder, className = '', ...rest }) {
      return (
        <label className={`block ${className}`}>
          {label && <span className="block text-xs font-medium text-slate-500 mb-1">{label}</span>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            {...rest}
          />
        </label>
      )
    }

    // 금액 입력 (천단위 콤마 표시, 저장은 숫자 문자열)
    function MoneyInput({ label, value, onChange, placeholder, className = '', ...rest }) {
      const display = value === '' || value == null ? '' : Number(value).toLocaleString('ko-KR')
      return (
        <label className={`block ${className}`}>
          {label && <span className="block text-xs font-medium text-slate-500 mb-1">{label}</span>}
          <input
            type="text" inputMode="numeric"
            value={display}
            onChange={(e) => onChange(e.target.value.replace(/[^0-9]/g, ''))}
            placeholder={placeholder}
            className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            {...rest}
          />
        </label>
      )
    }

    function Card({ className = '', children }) {
      return <div className={`bg-white rounded-2xl shadow-sm border border-slate-100 ${className}`}>{children}</div>
    }

    function Badge({ className = '', children }) {
      return <span className={`inline-block rounded-full px-2.5 py-0.5 text-xs font-semibold ${className}`}>{children}</span>
    }

    // 세그먼트 토글 (옵션 2개)
    function Segment({ value, options, onChange, dark = false }) {
      return (
        <div className={`flex gap-1 rounded-lg p-1 ${dark ? 'bg-white/20' : 'bg-slate-100'}`}>
          {options.map((o) => (
            <button key={o.key} onClick={() => onChange(o.key)}
              className={`flex-1 text-sm font-semibold rounded-md py-1.5 transition ${value === o.key ? 'bg-white text-indigo-600 shadow-sm' : (dark ? 'text-white/90' : 'text-slate-500')}`}>
              {o.label}
            </button>
          ))}
        </div>
      )
    }

    // ========================================
    // 🧮 계산 헬퍼 (배열/반복문/reduce)
    // ========================================

    // 한 가게의 멤버별 부담액 계산 (quick: 총액 1/N, detail: 공유/개인 항목)
    function calcPlace(place) {
      const memberIds = place.members
      const n = memberIds.length
      const subtotal = {}
      memberIds.forEach((id) => { subtotal[id] = 0 })
      let total = 0

      if (place.mode === 'quick') {
        total = parseFloat(place.quickAmount) || 0
        if (n > 0) { const each = total / n; memberIds.forEach((id) => { subtotal[id] += each }) }
      } else {
        place.items.forEach((it) => {
          total += it.price
          if (it.shared) {
            if (n > 0) { const each = it.price / n; memberIds.forEach((id) => { subtotal[id] += each }) }
          } else if (subtotal[it.ownerId] != null) {
            subtotal[it.ownerId] += it.price
          }
        })
      }

      const dv = parseFloat(place.discount.value) || 0
      let discountAmount = place.discount.type === 'percent' ? Math.round(total * dv / 100) : dv
      discountAmount = Math.max(0, Math.min(discountAmount, total))
      const afterDiscount = total - discountAmount

      const shares = memberIds.map((id) => ({
        personId: id,
        subtotal: subtotal[id],
        pay: total > 0 ? Math.round(afterDiscount * subtotal[id] / total) : 0
      }))

      // 우수리(반올림 차액)는 결제자가 흡수 (없으면 마지막 멤버)
      const payerIsMember = memberIds.includes(place.payerId)
      if (shares.length > 0) {
        const summed = shares.reduce((s, x) => s + x.pay, 0)
        let idx = payerIsMember ? shares.findIndex((s) => s.personId === place.payerId) : shares.length - 1
        if (idx < 0) idx = shares.length - 1
        shares[idx].pay += afterDiscount - summed
      }

      return { total, discountAmount, afterDiscount, shares, payerIsMember }
    }

    // ========================================
    // 🧩 메뉴 입력 폼 (detail 모드)
    // ========================================

    function ItemForm({ placeId, members, people, onAddItem }) {
      const [name, setName] = useState('')
      const [price, setPrice] = useState('')
      const [shared, setShared] = useState(true)
      const [ownerId, setOwnerId] = useState(members[0] || null)

      function handleAdd() {
        const p = parseInt(price, 10)
        if (!name.trim() || isNaN(p) || p <= 0) return
        const owner = shared ? null : (members.includes(ownerId) ? ownerId : members[0])
        if (!shared && owner == null) return // 개인인데 참여자가 없음
        onAddItem(placeId, { name: name.trim(), price: p, shared, ownerId: owner })
        setName(''); setPrice('')
      }

      return (
        <div className="rounded-xl border border-slate-200 p-3 space-y-2">
          <div className="flex gap-2">
            <Input placeholder="메뉴명" value={name} onChange={(e) => setName(e.target.value)} className="flex-1" />
            <MoneyInput placeholder="가격" value={price} onChange={(v) => setPrice(v)} className="w-28"
              onKeyDown={(e) => { if (e.key === 'Enter') handleAdd() }} />
          </div>
          <div className="flex items-center gap-2">
            <div className="w-40"><Segment value={shared ? 'shared' : 'mine'} onChange={(k) => setShared(k === 'shared')}
              options={[{ key: 'shared', label: '공유' }, { key: 'mine', label: '개인' }]} /></div>
            {!shared && (
              <select value={ownerId == null ? '' : String(ownerId)} onChange={(e) => setOwnerId(Number(e.target.value))}
                className="flex-1 rounded-lg border border-slate-300 px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                {members.length === 0 && <option value="">참여자 없음</option>}
                {members.map((id) => <option key={id} value={String(id)}>{nameOf(people, id)}</option>)}
              </select>
            )}
            <Button variant="secondary" onClick={handleAdd} className="shrink-0 ml-auto">추가</Button>
          </div>
        </div>
      )
    }

    // ========================================
    // 🧩 메뉴 한 줄 (탭하면 전체 수정)
    // ========================================

    function ItemRow({ placeId, item, members, people, onUpdate, onRemove }) {
      const [editing, setEditing] = useState(false)
      const [name, setName] = useState(item.name)
      const [price, setPrice] = useState(String(item.price))
      const [shared, setShared] = useState(item.shared)
      const [ownerId, setOwnerId] = useState(item.ownerId)

      function startEdit() {
        setName(item.name); setPrice(String(item.price)); setShared(item.shared)
        setOwnerId(members.includes(item.ownerId) ? item.ownerId : (members[0] ?? null))
        setEditing(true)
      }
      function save() {
        const p = parseInt(price, 10)
        if (!name.trim() || isNaN(p) || p <= 0) return
        const owner = shared ? null : (members.includes(ownerId) ? ownerId : members[0])
        if (!shared && owner == null) return
        onUpdate(placeId, item.id, { name: name.trim(), price: p, shared, ownerId: owner })
        setEditing(false)
      }

      if (!editing) {
        return (
          <li className="flex items-center gap-2 text-sm">
            <button onClick={startEdit} className="flex items-center gap-2 flex-1 text-left rounded px-1 -mx-1 py-0.5 hover:bg-slate-50">
              <span className="text-slate-700">{item.name}</span>
              {item.shared
                ? <Badge className="bg-amber-50 text-amber-600">공유</Badge>
                : <Badge className="bg-slate-100 text-slate-500">개인 · {nameOf(people, item.ownerId)}</Badge>}
              <span className="ml-auto text-slate-500 tabular-nums">{formatWon(item.price)}</span>
              <span className="text-slate-300 text-xs">✎</span>
            </button>
            <button onClick={() => onRemove(placeId, item.id)} className="text-slate-300 hover:text-red-500 px-1">✕</button>
          </li>
        )
      }
      return (
        <li className="rounded-xl border border-indigo-200 bg-indigo-50/40 p-3 space-y-2">
          <div className="flex gap-2">
            <Input placeholder="메뉴명" value={name} onChange={(e) => setName(e.target.value)} className="flex-1" />
            <MoneyInput placeholder="가격" value={price} onChange={setPrice} className="w-28"
              onKeyDown={(e) => { if (e.key === 'Enter') save() }} />
          </div>
          <div className="flex items-center gap-2">
            <div className="w-40"><Segment value={shared ? 'shared' : 'mine'} onChange={(k) => setShared(k === 'shared')}
              options={[{ key: 'shared', label: '공유' }, { key: 'mine', label: '개인' }]} /></div>
            {!shared && (
              <select value={ownerId == null ? '' : String(ownerId)} onChange={(e) => setOwnerId(Number(e.target.value))}
                className="flex-1 rounded-lg border border-slate-300 px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                {members.length === 0 && <option value="">참여자 없음</option>}
                {members.map((id) => <option key={id} value={String(id)}>{nameOf(people, id)}</option>)}
              </select>
            )}
            <Button onClick={save} className="ml-auto shrink-0">완료</Button>
          </div>
        </li>
      )
    }

    // ========================================
    // 🧩 가게 카드
    // ========================================

    function PlaceCard({ place, people, result, onRename, onSetPayer, onSetMode, onSetQuick, onSetDiscount, onRemove, onAddMember, onRemoveMember, onAddItem, onUpdateItem, onRemoveItem }) {
      const [showDiscount, setShowDiscount] = useState(!!(place.discount.value && place.discount.value !== '0'))
      const payMap = {}
      result.shares.forEach((s) => { payMap[s.personId] = s.pay })
      const candidates = people.filter((p) => !place.members.includes(p.id))

      return (
        <Card className="p-4 space-y-3">
          <div className="flex items-center gap-2">
            <input value={place.name} onChange={(e) => onRename(place.id, e.target.value)} placeholder="가게명"
              className="flex-1 font-bold text-slate-800 bg-transparent border-b border-slate-200 focus:border-indigo-400 focus:outline-none py-1" />
            <Badge className="bg-indigo-50 text-indigo-600">합계 {formatWon(result.total)}</Badge>
            <Button variant="danger" size="sm" onClick={() => onRemove(place.id)}>삭제</Button>
          </div>

          <div className="flex flex-wrap gap-2 items-end">
            <label className="flex-1 min-w-[130px]">
              <span className="block text-xs font-medium text-slate-500 mb-1">결제자</span>
              <select value={place.payerId == null ? '' : String(place.payerId)}
                onChange={(e) => onSetPayer(place.id, e.target.value === '' ? null : Number(e.target.value))}
                className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                <option value="">결제자 선택</option>
                {place.members.map((id) => <option key={id} value={String(id)}>{nameOf(people, id)}</option>)}
              </select>
            </label>
            <div className="w-44">
              <span className="block text-xs font-medium text-slate-500 mb-1">입력 방식</span>
              <Segment value={place.mode} onChange={(k) => onSetMode(place.id, k)}
                options={[{ key: 'quick', label: '빠른 1/N' }, { key: 'detail', label: '상세' }]} />
            </div>
          </div>

          {/* 참여자 칩 */}
          <div className="flex flex-wrap gap-2">
            {place.members.map((id) => (
              <span key={id} className="inline-flex items-center gap-1 bg-slate-100 rounded-full pl-3 pr-2 py-1 text-sm">
                {nameOf(people, id)}
                <button onClick={() => onRemoveMember(place.id, id)} className="text-slate-400 hover:text-red-500">✕</button>
              </span>
            ))}
            {place.members.length === 0 && <span className="text-sm text-slate-400">참여자를 추가하세요</span>}
            {candidates.length > 0 && (
              <select value="" onChange={(e) => { if (e.target.value) onAddMember(place.id, Number(e.target.value)) }}
                className="rounded-full border border-dashed border-indigo-300 text-indigo-600 px-3 py-1 text-sm focus:outline-none">
                <option value="">+ 참여자</option>
                {candidates.map((p) => <option key={p.id} value={String(p.id)}>{p.name}</option>)}
              </select>
            )}
          </div>

          {/* 입력 영역 */}
          {place.mode === 'quick' ? (
            <MoneyInput label="총액 (참여자끼리 1/N)" value={place.quickAmount}
              onChange={(v) => onSetQuick(place.id, v)} placeholder="예: 60,000" />
          ) : (
            <div className="space-y-2">
              <ItemForm placeId={place.id} members={place.members} people={people} onAddItem={onAddItem} />
              <ul className="space-y-1">
                {place.items.map((it) => (
                  <ItemRow key={it.id} placeId={place.id} item={it} members={place.members} people={people}
                    onUpdate={onUpdateItem} onRemove={onRemoveItem} />
                ))}
                {place.items.length === 0 && <li className="text-xs text-slate-400">메뉴를 추가하세요</li>}
              </ul>
            </div>
          )}

          {/* 정산 미반영 힌트 (결제자 없음/멤버 없음인데 지출은 있음) */}
          {result.total > 0 && !place.members.includes(place.payerId) && (
            <div className="rounded-lg bg-amber-50 text-amber-700 text-xs px-3 py-2">
              ⚠️ {place.members.length === 0 ? '참여자를 추가하고 ' : ''}결제자를 선택해야 이 가게가 정산에 반영됩니다.
            </div>
          )}

          {/* 멤버별 부담 요약 */}
          {place.members.length > 0 && (
            <div className="rounded-xl bg-slate-50 p-3 space-y-1">
              {place.members.map((id) => (
                <div key={id} className="flex justify-between text-sm">
                  <span className="text-slate-600">{nameOf(people, id)}{place.payerId === id && <span className="ml-1 text-xs text-indigo-500">(결제자)</span>}</span>
                  <span className="font-semibold tabular-nums text-slate-800">{formatWon(payMap[id] || 0)}</span>
                </div>
              ))}
            </div>
          )}

          {/* 할인 (기본 숨김) */}
          {showDiscount ? (
            <div className="flex items-end gap-2">
              <div className="flex-1">
                <span className="block text-xs font-medium text-slate-500 mb-1">할인</span>
                <div className="flex gap-1">
                  <select value={place.discount.type} onChange={(e) => onSetDiscount(place.id, { ...place.discount, type: e.target.value })}
                    className="rounded-lg border border-slate-300 px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    <option value="percent">%</option>
                    <option value="amount">원</option>
                  </select>
                  <input type="text" inputMode="numeric"
                    value={place.discount.value === '' ? '' : (place.discount.type === 'amount' ? Number(place.discount.value).toLocaleString('ko-KR') : place.discount.value)}
                    onChange={(e) => onSetDiscount(place.id, { ...place.discount, value: e.target.value.replace(/[^0-9]/g, '') })}
                    placeholder="0" className="w-full rounded-lg border border-slate-300 px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
                </div>
              </div>
              <button onClick={() => { onSetDiscount(place.id, { ...place.discount, value: '0' }); setShowDiscount(false) }}
                className="text-xs text-slate-400 hover:text-red-500 pb-2">할인 제거</button>
            </div>
          ) : (
            <button onClick={() => setShowDiscount(true)} className="text-sm text-indigo-600 hover:underline">+ 할인 추가</button>
          )}
        </Card>
      )
    }

    // ========================================
    // 🧩 참여자 명부 (전역)
    // ========================================

    function PeopleRoster({ people, onAdd, onRemove }) {
      const [name, setName] = useState('')
      function handleAdd() { if (!name.trim()) return; onAdd(name.trim()); setName('') }
      return (
        <Card className="p-4">
          <h2 className="font-bold text-slate-800 mb-3">참여자</h2>
          <div className="flex flex-wrap gap-2 mb-3">
            {people.map((p) => (
              <span key={p.id} className="inline-flex items-center gap-1 bg-slate-100 rounded-full pl-3 pr-2 py-1 text-sm">
                {p.name}
                <button onClick={() => onRemove(p.id)} className="text-slate-400 hover:text-red-500">✕</button>
              </span>
            ))}
            {people.length === 0 && <span className="text-sm text-slate-400">참여자를 추가하세요</span>}
          </div>
          <div className="flex gap-2">
            <Input placeholder="이름" value={name} onChange={(e) => setName(e.target.value)} className="flex-1"
              onKeyDown={(e) => { if (e.key === 'Enter') handleAdd() }} />
            <Button onClick={handleAdd} className="shrink-0">추가</Button>
          </div>
        </Card>
      )
    }

    // ========================================
    // 🧩 송금 한 줄 (펼침 + 이체 체크)
    // ========================================

    function TransferRow({ transfer, people, settled, onToggle }) {
      const [open, setOpen] = useState(false)
      const key = `${transfer.fromId}->${transfer.toId}`
      const done = settled.has(key)
      return (
        <li className={`rounded-xl p-3 ${done ? 'bg-white/5' : 'bg-white/10'}`}>
          <div className="flex items-center gap-3">
            <input type="checkbox" checked={done} onChange={() => onToggle(key)} className="w-4 h-4 accent-emerald-400" />
            <button onClick={() => setOpen(!open)} className={`flex-1 text-left ${done ? 'line-through opacity-50' : ''}`}>
              <span className="opacity-90">{nameOf(people, transfer.fromId)} → {nameOf(people, transfer.toId)}</span>
              <span className="ml-1 text-xs opacity-60">{open ? '▲' : '▼'}</span>
            </button>
            <span className={`font-bold tabular-nums text-lg ${done ? 'line-through opacity-50' : ''}`}>{formatWon(transfer.amount)}</span>
          </div>
          {open && (
            <ul className="mt-2 ml-7 space-y-1 text-xs opacity-80">
              {transfer.breakdown.map((b, i) => (
                <li key={i} className="flex justify-between">
                  <span>{b.place} · {nameOf(people, b.fromId)} → {nameOf(people, b.toId)}</span>
                  <span className="tabular-nums">{formatWon(b.amount)}</span>
                </li>
              ))}
            </ul>
          )}
        </li>
      )
    }

    // ========================================
    // 🔝 정산 결과 헤더 (가장 중요 — 최상단)
    // ========================================

    function SettlementHeader({ settlement, people, settled, onToggle }) {
      const { transfers, netSummary, grandTotal, grandDiscount, grandAfter } = settlement
      const pending = transfers.filter((t) => !settled.has(`${t.fromId}->${t.toId}`))
      const doneList = transfers.filter((t) => settled.has(`${t.fromId}->${t.toId}`))
      const ordered = [...pending, ...doneList]
      const nets = netSummary.filter((s) => Math.round(s.net) !== 0)

      return (
        <Card className="p-5 bg-gradient-to-br from-indigo-600 to-indigo-500 text-white">
          <div className="flex items-center justify-between mb-3">
            <h2 className="font-extrabold text-xl">💸 정산 결과</h2>
            <Badge className="bg-white/20 text-white">미이체 {pending.length}건</Badge>
          </div>

          {/* 사람별 순정산 요약 */}
          {nets.length > 0 && (
            <div className="flex flex-wrap gap-2 mb-4">
              {nets.map((s) => (
                <span key={s.id} className={`rounded-full px-3 py-1 text-sm font-semibold ${s.net > 0 ? 'bg-emerald-400/25 text-emerald-50' : 'bg-amber-400/25 text-amber-50'}`}>
                  {s.name} {s.net > 0 ? `+${formatWon(s.net)} 받음` : `−${formatWon(-s.net)} 보냄`}
                </span>
              ))}
            </div>
          )}

          <ul className="space-y-2 mb-4">
            {ordered.map((t) => (
              <TransferRow key={`${t.fromId}->${t.toId}`} transfer={t} people={people} settled={settled} onToggle={onToggle} />
            ))}
            {transfers.length === 0 && <li className="opacity-80 text-sm">가게·참여자·결제자를 입력하면 송금 정산이 계산됩니다.</li>}
            {transfers.length > 0 && pending.length === 0 && <li className="text-emerald-200 font-semibold text-sm">🎉 모든 송금이 완료되었습니다.</li>}
          </ul>

          <div className="border-t border-white/30 pt-3 space-y-1 text-sm">
            <div className="flex justify-between opacity-90"><span>전체 합계</span><span className="tabular-nums">{formatWon(grandTotal)}</span></div>
            <div className="flex justify-between opacity-90"><span>총 할인</span><span className="tabular-nums">- {formatWon(grandDiscount)}</span></div>
            <div className="flex justify-between font-bold text-base"><span>할인 후 총액</span><span className="tabular-nums">{formatWon(grandAfter)}</span></div>
          </div>
        </Card>
      )
    }

    // ========================================
    // 초기 샘플 데이터 (id 고정)
    // ========================================

    const P_HJ = makeId(), P_MS = makeId(), P_YH = makeId()
    const INITIAL_PEOPLE = [
      { id: P_HJ, name: '현재' }, { id: P_MS, name: '민수' }, { id: P_YH, name: '영희' }
    ]
    const INITIAL_PLACES = [
      { id: makeId(), name: '파스타집', payerId: P_HJ, mode: 'detail', quickAmount: '', discount: { type: 'percent', value: '10' },
        members: [P_HJ, P_MS, P_YH], items: [
          { id: makeId(), name: '파스타', price: 18000, shared: false, ownerId: P_HJ },
          { id: makeId(), name: '스테이크', price: 32000, shared: false, ownerId: P_MS },
          { id: makeId(), name: '샐러드', price: 12000, shared: false, ownerId: P_YH }
        ] },
      { id: makeId(), name: '치킨집', payerId: P_MS, mode: 'detail', quickAmount: '', discount: { type: 'percent', value: '0' },
        members: [P_MS, P_YH, P_HJ], items: [
          { id: makeId(), name: '치킨', price: 20000, shared: true, ownerId: null },
          { id: makeId(), name: '맥주', price: 6000, shared: false, ownerId: P_YH },
          { id: makeId(), name: '콜라', price: 3000, shared: false, ownerId: P_HJ }
        ] }
    ]
    const INITIAL_SETTLED = [`${P_YH}->${P_MS}`] // 영희→민수 이체 완료(샘플)

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      const [people, setPeople] = useState(INITIAL_PEOPLE)
      const [places, setPlaces] = useState(INITIAL_PLACES)
      const [settled, setSettled] = useState(() => new Set(INITIAL_SETTLED))

      // --- 참여자 명부 ---
      function addPerson(name) { setPeople([...people, { id: makeId(), name }]) }
      function removePerson(personId) {
        setPeople(people.filter((p) => p.id !== personId))
        setPlaces(places.map((pl) => ({
          ...pl,
          payerId: pl.payerId === personId ? null : pl.payerId,
          members: pl.members.filter((id) => id !== personId),
          items: pl.items.filter((it) => it.shared || it.ownerId !== personId)
        })))
      }

      // --- 가게 ---
      function patchPlace(placeId, patch) { setPlaces(places.map((pl) => pl.id === placeId ? { ...pl, ...patch } : pl)) }
      function addPlace() {
        const memberIds = people.map((p) => p.id) // 명부 전원 자동 포함
        setPlaces([...places, { id: makeId(), name: '', payerId: memberIds[0] ?? null, mode: 'quick', quickAmount: '', discount: { type: 'percent', value: '0' }, members: memberIds, items: [] }])
      }
      function removePlace(placeId) { setPlaces(places.filter((pl) => pl.id !== placeId)) }
      const renamePlace = (id, name) => patchPlace(id, { name })
      const setPayer = (id, payerId) => patchPlace(id, { payerId })
      const setMode = (id, mode) => patchPlace(id, { mode })
      const setQuick = (id, quickAmount) => patchPlace(id, { quickAmount })
      const setDiscount = (id, discount) => patchPlace(id, { discount })

      function addMember(placeId, personId) {
        setPlaces(places.map((pl) => pl.id === placeId ? { ...pl, members: [...pl.members, personId] } : pl))
      }
      function removeMember(placeId, personId) {
        setPlaces(places.map((pl) => pl.id === placeId ? {
          ...pl,
          payerId: pl.payerId === personId ? null : pl.payerId,
          members: pl.members.filter((id) => id !== personId),
          items: pl.items.filter((it) => it.shared || it.ownerId !== personId)
        } : pl))
      }
      function addItem(placeId, item) {
        setPlaces(places.map((pl) => pl.id === placeId ? { ...pl, items: [...pl.items, { id: makeId(), ...item }] } : pl))
      }
      function updateItem(placeId, itemId, patch) {
        setPlaces(places.map((pl) => pl.id === placeId
          ? { ...pl, items: pl.items.map((it) => it.id === itemId ? { ...it, ...patch } : it) }
          : pl))
      }
      function removeItem(placeId, itemId) {
        setPlaces(places.map((pl) => pl.id === placeId ? { ...pl, items: pl.items.filter((it) => it.id !== itemId) } : pl))
      }

      function toggleSettled(key) {
        const next = new Set(settled)
        if (next.has(key)) next.delete(key); else next.add(key)
        setSettled(next)
      }

      // --- 정산 계산 ---
      const settlement = useMemo(() => {
        let grandTotal = 0, grandDiscount = 0, grandAfter = 0
        const contribs = []
        const paid = {}, owed = {}
        people.forEach((p) => { paid[p.id] = 0; owed[p.id] = 0 })

        const placeResults = places.map((place) => {
          const r = calcPlace(place)
          grandTotal += r.total; grandDiscount += r.discountAmount; grandAfter += r.afterDiscount
          // 결제자가 있는 가게만 정산 집계 (없으면 송금·순정산에서 제외 → Σnet=0 유지)
          if (r.payerIsMember) {
            paid[place.payerId] = (paid[place.payerId] || 0) + r.afterDiscount
            r.shares.forEach((s) => {
              if (owed[s.personId] != null) owed[s.personId] += s.pay
              if (s.personId !== place.payerId && s.pay > 0) {
                contribs.push({ fromId: s.personId, toId: place.payerId, place: place.name || '이름없는 가게', amount: s.pay })
              }
            })
          }
          return { place, result: r }
        })

        // 사람쌍별 양방향 상계
        const pairs = {}
        contribs.forEach((c) => {
          const a = Math.min(c.fromId, c.toId), b = Math.max(c.fromId, c.toId)
          const k = `${a}_${b}`
          if (!pairs[k]) pairs[k] = { a, b, net: 0, breakdown: [] }
          pairs[k].net += (c.fromId === a ? 1 : -1) * c.amount
          pairs[k].breakdown.push({ place: c.place, fromId: c.fromId, toId: c.toId, amount: c.amount })
        })
        const transfers = Object.values(pairs).map((p) => {
          if (p.net === 0) return null
          return { fromId: p.net > 0 ? p.a : p.b, toId: p.net > 0 ? p.b : p.a, amount: Math.abs(p.net), breakdown: p.breakdown }
        }).filter(Boolean)

        // 사람별 순정산
        const netSummary = people.map((p) => ({ id: p.id, name: p.name, net: (paid[p.id] || 0) - (owed[p.id] || 0) }))

        return { placeResults, transfers, netSummary, grandTotal, grandDiscount, grandAfter }
      }, [people, places])

      const resultByPlace = {}
      settlement.placeResults.forEach((pr) => { resultByPlace[pr.place.id] = pr.result })

      return (
        <div className="max-w-2xl mx-auto px-4 py-8 space-y-4">
          <header>
            <h1 className="text-2xl font-extrabold text-slate-800">💸 더치페이 계산기</h1>
            <p className="text-sm text-slate-500 mt-1">가게마다 결제자를 따로 두고, 공유/개인 메뉴를 나눠 정산합니다. 누가 누구에게 얼마 보낼지 상계해 보여줘요.</p>
          </header>

          <SettlementHeader settlement={settlement} people={people} settled={settled} onToggle={toggleSettled} />

          <PeopleRoster people={people} onAdd={addPerson} onRemove={removePerson} />

          <div className="space-y-4">
            {places.map((place) => (
              <PlaceCard
                key={place.id} place={place} people={people} result={resultByPlace[place.id]}
                onRename={renamePlace} onSetPayer={setPayer} onSetMode={setMode} onSetQuick={setQuick}
                onSetDiscount={setDiscount} onRemove={removePlace}
                onAddMember={addMember} onRemoveMember={removeMember} onAddItem={addItem} onUpdateItem={updateItem} onRemoveItem={removeItem}
              />
            ))}
            <Button variant="ghost" onClick={addPlace} className="w-full border border-dashed border-indigo-300 py-3">+ 가게 추가</Button>
          </div>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
