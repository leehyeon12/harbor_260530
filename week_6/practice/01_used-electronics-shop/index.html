<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>중고테크 마켓</title>

  <!-- Tailwind CSS (버전 고정) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>

  <!--
    ⚠️ 모든 CDN은 버전을 명시적으로 고정한다.
    미고정 시 @babel/standalone 이 최신(8.x)으로 올라가 type="text/babel"
    인라인 변환이 통째로 깨진다. Babel 은 반드시 7.x 로 고정.
  -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <!-- TossPayments 결제위젯 SDK v2 -->
  <script src="https://js.tosspayments.com/v2/standard"></script>

  <style>
    /* 토스트 등장 애니메이션 (Tailwind 유틸로 표현하기 어려운 keyframe) */
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-toast-in { animation: toast-in 0.25s ease-out; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 추출
    // ========================================
    const { useState, useEffect, useMemo, useCallback, useRef } = React

    // 같은 출처(same-origin)로 서빙되므로 상대경로 사용 (localhost 하드코딩 금지)
    const API_BASE_URL = '/api'
    // JWT 토큰 / 사용자 정보를 저장할 localStorage 키
    const TOKEN_KEY = 'shop_token'
    const USER_KEY = 'shop_user'

    // 토스페이먼츠 클라이언트키 (공개 테스트키 — 프론트 노출 OK, 시크릿키는 서버에만)
    const TOSS_CLIENT_KEY = 'test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm'

    // ========================================
    // 상수 / 유틸
    // ========================================

    // 금액을 원화 포맷으로: 120000 → "120,000원"
    const formatWon = (value) => {
      const n = Number(value) || 0
      return `${n.toLocaleString('ko-KR')}원`
    }

    // 주문일 포맷: ISO 문자열 → "2026. 7. 11." (실패 시 원문 앞 10자)
    const formatDate = (iso) => {
      const d = new Date(iso)
      if (isNaN(d.getTime())) return String(iso || '').slice(0, 10)
      return d.toLocaleDateString('ko-KR')
    }

    // 주문번호 축약: "order_ab12cd34..." → "#ab12cd34…" (접두사 제거 후 앞 8자리)
    const shortOrderNo = (uid) => {
      const s = String(uid || '').replace(/^order_/, '')
      return `#${s.slice(0, 8)}${s.length > 8 ? '…' : ''}`
    }

    // 이미지 로드 실패 시 대체할 플레이스홀더 (data URI — 외부 요청 없음)
    const FALLBACK_IMG =
      'data:image/svg+xml;utf8,' +
      encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300">' +
        '<rect width="100%" height="100%" fill="#e2e8f0"/>' +
        '<text x="50%" y="50%" font-size="20" fill="#94a3b8" text-anchor="middle" ' +
        'dominant-baseline="middle" font-family="sans-serif">이미지 없음</text></svg>'
      )

    // ========================================
    // 🔐 인증 저장소 헬퍼 (localStorage) — todo-app 정본 계승
    // ========================================
    const authStore = {
      getToken: () => localStorage.getItem(TOKEN_KEY),
      getUser: () => {
        try {
          return JSON.parse(localStorage.getItem(USER_KEY) || 'null')
        } catch {
          return null
        }
      },
      save: (token, user) => {
        localStorage.setItem(TOKEN_KEY, token)
        localStorage.setItem(USER_KEY, JSON.stringify(user))
      },
      clear: () => {
        localStorage.removeItem(TOKEN_KEY)
        localStorage.removeItem(USER_KEY)
      },
    }

    // ========================================
    // 🌐 인증 헤더를 자동으로 붙이는 fetch 래퍼 — todo-app 정본 계승
    // ========================================
    // 401 응답이 오면 onUnauthorized 콜백(자동 로그아웃)을 호출한다.
    function createApiFetch(onUnauthorized) {
      return async (url, options = {}) => {
        const token = authStore.getToken()
        const headers = { ...(options.headers || {}) }
        if (token) headers['Authorization'] = `Bearer ${token}`

        const res = await fetch(url, { ...options, headers })
        if (res.status === 401) {
          onUnauthorized()
          throw new Error('로그인이 만료되었어요. 다시 로그인해 주세요.')
        }
        return res
      }
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 프레젠테이션)
    // ========================================

    // 카드 래퍼: 그림자 + 둥근 모서리
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl ${className}`}>
          {children}
        </div>
      )
    }

    // 배지: 개수/카테고리 표시 등에 사용
    function Badge({ children, className = '' }) {
      return (
        <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold ${className}`}>
          {children}
        </span>
      )
    }

    // 스피너: 로딩 인디케이터
    function Spinner() {
      return (
        <div
          className="w-8 h-8 border-4 border-slate-200 border-t-indigo-500 rounded-full animate-spin"
          role="status"
          aria-label="로딩 중"
        />
      )
    }

    // 입력창: 단일 라인 (controlled). type 지정 가능(password 등)
    function Input({ value, onChange, onKeyDown, placeholder, disabled, type = 'text', className = '' }) {
      return (
        <input
          type={type}
          value={value}
          onChange={onChange}
          onKeyDown={onKeyDown}
          placeholder={placeholder}
          disabled={disabled}
          className={`min-w-0 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-700
            placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-300
            focus:border-indigo-300 transition disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        />
      )
    }

    // 버튼: variant·disabled 지원하는 작은 프리미티브
    function Button({ children, onClick, disabled, type = 'button', className = '' }) {
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors
            disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        >
          {children}
        </button>
      )
    }

    // 모달: isOpen / onClose / title / children — 배경 클릭·ESC 로 닫힘
    function Modal({ isOpen, onClose, title, children }) {
      // ESC 키로 닫기
      useEffect(() => {
        if (!isOpen) return
        const onKey = (e) => { if (e.key === 'Escape') onClose() }
        window.addEventListener('keydown', onKey)
        return () => window.removeEventListener('keydown', onKey)
      }, [isOpen, onClose])

      if (!isOpen) return null

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center px-4 bg-slate-900/50 backdrop-blur-sm"
          onClick={onClose}
          role="dialog"
          aria-modal="true"
          aria-label={title}
        >
          {/* 내부 클릭은 닫힘 방지 */}
          <div className="w-full max-w-md" onClick={(e) => e.stopPropagation()}>
            {children}
          </div>
        </div>
      )
    }

    // ========================================
    // 🧩 상태별 표시 컴포넌트
    // ========================================

    // 로딩 상태
    function LoadingState({ label = '불러오는 중...' }) {
      return (
        <div className="flex flex-col items-center justify-center py-20 gap-4 text-slate-500">
          <Spinner />
          <p className="text-sm">{label}</p>
        </div>
      )
    }

    // 에러 상태
    function ErrorState({ message, onRetry }) {
      return (
        <div className="flex flex-col items-center justify-center py-20 gap-4 text-center">
          <div className="text-4xl">⚠️</div>
          <p className="text-red-600 font-medium">불러오기에 실패했어요</p>
          <p className="text-sm text-slate-500 max-w-xs break-words">{message}</p>
          {onRetry && (
            <button
              onClick={onRetry}
              className="mt-2 px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg text-sm font-semibold transition-colors"
            >
              다시 시도
            </button>
          )}
        </div>
      )
    }

    // ========================================
    // 🍞 토스트 (담기 성공 등 피드백)
    // ========================================
    function Toast({ message }) {
      if (!message) return null
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] animate-toast-in">
          <div className="px-5 py-3 rounded-xl bg-slate-800 text-white text-sm font-medium shadow-2xl flex items-center gap-2">
            <span>✅</span>
            <span className="break-words">{message}</span>
          </div>
        </div>
      )
    }

    // ========================================
    // 🔑 로그인 / 회원가입 폼 (모달 안에서 사용) — todo-app AuthForm 계승
    // ========================================
    // onAuthSuccess: 성공 시 user 전달 / onClose: 모달 닫기(없으면 닫기 버튼 숨김)
    function AuthForm({ onAuthSuccess, onClose }) {
      const [mode, setMode] = useState('login') // 'login' | 'register'
      const [username, setUsername] = useState('')
      const [password, setPassword] = useState('')
      const [submitting, setSubmitting] = useState(false)
      const [error, setError] = useState(null)

      const isLogin = mode === 'login'

      // 로그인/회원가입 요청 (auth 엔드포인트는 토큰이 없으므로 순수 fetch 사용)
      const handleSubmit = () => {
        const id = username.trim()
        if (!id || !password || submitting) return

        setSubmitting(true)
        setError(null)

        const endpoint = isLogin ? '/auth/login' : '/auth/register'
        fetch(`${API_BASE_URL}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: id, password }),
        })
          .then(async (res) => {
            const data = await res.json().catch(() => ({}))
            if (!res.ok) throw new Error(data.error || `요청 실패 (${res.status})`)
            return data
          })
          .then((data) => {
            // 토큰 저장 후 상위로 알림
            authStore.save(data.token, data.user)
            onAuthSuccess(data.user)
          })
          .catch((err) => {
            setError(err.message || '오류가 발생했어요')
          })
          .finally(() => {
            setSubmitting(false)
          })
      }

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') handleSubmit()
      }

      // 모드 전환 시 에러 초기화
      const switchMode = (next) => {
        setMode(next)
        setError(null)
      }

      return (
        <Card className="overflow-hidden">
          {/* 헤더 */}
          <header className="relative px-6 py-6 bg-gradient-to-r from-indigo-500 to-violet-500 text-white">
            <h2 className="text-xl font-bold tracking-tight">🛒 중고테크 마켓</h2>
            <p className="text-indigo-100 text-sm mt-1">
              {isLogin ? '로그인하고 장바구니에 담아보세요' : '회원가입하고 시작하세요'}
            </p>
            {onClose && (
              <button
                onClick={onClose}
                aria-label="닫기"
                className="absolute top-4 right-4 w-8 h-8 rounded-lg flex items-center justify-center
                  text-white/80 hover:text-white hover:bg-white/20 transition-colors font-bold"
              >
                ✕
              </button>
            )}
          </header>

          {/* 로그인/회원가입 탭 */}
          <div className="flex border-b border-slate-100">
            <button
              onClick={() => switchMode('login')}
              className={`flex-1 py-3 text-sm font-semibold transition-colors
                ${isLogin ? 'text-indigo-600 border-b-2 border-indigo-500' : 'text-slate-400 hover:text-slate-600'}`}
            >
              로그인
            </button>
            <button
              onClick={() => switchMode('register')}
              className={`flex-1 py-3 text-sm font-semibold transition-colors
                ${!isLogin ? 'text-indigo-600 border-b-2 border-indigo-500' : 'text-slate-400 hover:text-slate-600'}`}
            >
              회원가입
            </button>
          </div>

          {/* 입력 폼 */}
          <div className="px-6 py-6 flex flex-col gap-3">
            <Input
              value={username}
              onChange={(e) => setUsername(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="아이디"
              disabled={submitting}
              className="w-full"
            />
            <Input
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="비밀번호"
              disabled={submitting}
              className="w-full"
            />

            {/* 에러 배너 */}
            {error && (
              <div
                role="alert"
                className="flex items-center gap-2 px-3 py-2 rounded-lg
                  bg-red-50 text-red-700 text-sm border border-red-100"
              >
                <span className="break-words">⚠️ {error}</span>
              </div>
            )}

            <Button
              onClick={handleSubmit}
              disabled={submitting || username.trim() === '' || password === ''}
              className="bg-indigo-500 hover:bg-indigo-600 text-white mt-1"
            >
              {submitting ? '처리 중…' : isLogin ? '로그인' : '회원가입'}
            </Button>
          </div>
        </Card>
      )
    }

    // ========================================
    // 🧩 상품 카드
    // ========================================
    function ProductCard({ product, onAddToCart, busy }) {
      return (
        <Card className="overflow-hidden flex flex-col hover:shadow-2xl transition-shadow">
          {/* 이미지 */}
          <div className="aspect-[4/3] bg-slate-100 overflow-hidden">
            <img
              src={product.image_url || FALLBACK_IMG}
              alt={product.name}
              loading="lazy"
              onError={(e) => { e.currentTarget.src = FALLBACK_IMG }}
              className="w-full h-full object-cover"
            />
          </div>

          {/* 정보 */}
          <div className="flex flex-col flex-1 px-4 py-4">
            <h3 className="text-sm font-bold text-slate-800 break-words line-clamp-2">
              {product.name}
            </h3>
            {product.description && (
              <p className="mt-1.5 text-xs text-slate-500 break-words line-clamp-2">
                {product.description}
              </p>
            )}
            <p className="mt-3 text-lg font-bold text-indigo-600">
              {formatWon(product.price)}
            </p>

            <Button
              onClick={() => onAddToCart(product)}
              disabled={busy}
              className="mt-3 w-full bg-indigo-500 hover:bg-indigo-600 text-white"
            >
              {busy ? '담는 중…' : '🛒 장바구니 담기'}
            </Button>
          </div>
        </Card>
      )
    }

    // ========================================
    // 🧩 장바구니 항목
    // ========================================
    // item: { cart_id, product_id, name, price, image_url, quantity, subtotal }
    function CartItem({ item, onChangeQty, onRemove, busy }) {
      return (
        <li className="flex items-center gap-3 py-4 border-b border-slate-100 last:border-b-0">
          {/* 썸네일 */}
          <div className="w-16 h-16 shrink-0 rounded-xl bg-slate-100 overflow-hidden">
            <img
              src={item.image_url || FALLBACK_IMG}
              alt={item.name}
              onError={(e) => { e.currentTarget.src = FALLBACK_IMG }}
              className="w-full h-full object-cover"
            />
          </div>

          {/* 이름 / 단가 */}
          <div className="min-w-0 flex-1">
            <p className="text-sm font-semibold text-slate-800 break-words line-clamp-1">
              {item.name}
            </p>
            <p className="text-xs text-slate-400 mt-0.5">
              단가 {formatWon(item.price)}
            </p>
            {/* 수량 조절 */}
            <div className="flex items-center gap-2 mt-2">
              <button
                onClick={() => onChangeQty(item, item.quantity - 1)}
                disabled={busy}
                aria-label="수량 줄이기"
                className="w-7 h-7 rounded-lg border border-slate-200 text-slate-600 font-bold
                  hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
              >
                −
              </button>
              <span className="min-w-[2rem] text-center text-sm font-semibold text-slate-700">
                {item.quantity}
              </span>
              <button
                onClick={() => onChangeQty(item, item.quantity + 1)}
                disabled={busy}
                aria-label="수량 늘리기"
                className="w-7 h-7 rounded-lg border border-slate-200 text-slate-600 font-bold
                  hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
              >
                +
              </button>
            </div>
          </div>

          {/* 소계 / 삭제 */}
          <div className="flex flex-col items-end gap-2 shrink-0">
            <span className="text-sm font-bold text-slate-800 whitespace-nowrap">
              {formatWon(item.subtotal)}
            </span>
            <button
              onClick={() => onRemove(item)}
              disabled={busy}
              aria-label={`${item.name} 삭제`}
              className="px-2 py-1 rounded-lg text-xs font-medium text-slate-400
                hover:text-red-600 hover:bg-red-50 transition-colors
                disabled:opacity-50 disabled:cursor-not-allowed"
            >
              삭제
            </button>
          </div>
        </li>
      )
    }

    // ========================================
    // 📄 장바구니 뷰 (로그인 필요)
    // ========================================
    function CartView({ apiFetch, onBack, onCartChange, onCheckout }) {
      const [items, setItems] = useState([])
      const [loading, setLoading] = useState(true)
      const [error, setError] = useState(null)
      const [actionError, setActionError] = useState(null)
      const [busyIds, setBusyIds] = useState(new Set())

      const setBusy = (id, on) => {
        setBusyIds((prev) => {
          const next = new Set(prev)
          if (on) next.add(id)
          else next.delete(id)
          return next
        })
      }

      // GET /api/cart
      const loadCart = useCallback(() => {
        setLoading(true)
        setError(null)

        apiFetch(`${API_BASE_URL}/cart`)
          .then((res) => {
            if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`)
            return res.json()
          })
          .then((data) => {
            const list = Array.isArray(data) ? data : []
            setItems(list)
            // 헤더 배지 동기화 (총 수량)
            onCartChange(list.reduce((sum, it) => sum + Number(it.quantity), 0))
          })
          .catch((err) => {
            setError(err.message || '알 수 없는 오류')
          })
          .finally(() => {
            setLoading(false)
          })
      }, [apiFetch, onCartChange])

      useEffect(() => {
        loadCart()
      }, [loadCart])

      // 수량 변경: PATCH /api/cart/:id { quantity } — 낙관적 업데이트 후 실패 시 롤백
      // 서버 규칙: quantity 0 이하면 삭제되므로, 그 경우 목록에서 제거
      const handleChangeQty = (item, nextQty) => {
        if (busyIds.has(item.cart_id)) return

        setActionError(null)
        setBusy(item.cart_id, true)

        const willRemove = nextQty <= 0
        const prevItems = items

        // 1) 화면 먼저 갱신 (낙관적)
        setItems((prev) => {
          if (willRemove) return prev.filter((it) => it.cart_id !== item.cart_id)
          return prev.map((it) =>
            it.cart_id === item.cart_id
              ? { ...it, quantity: nextQty, subtotal: Number(it.price) * nextQty }
              : it
          )
        })

        apiFetch(`${API_BASE_URL}/cart/${item.cart_id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity: nextQty }),
        })
          .then((res) => {
            if (!res.ok) throw new Error(`수량 변경 실패 (${res.status})`)
            // 서버 확정값 반영을 위해 목록 재조회 (subtotal 등 서버 계산 기준)
            loadCart()
          })
          .catch((err) => {
            // 2) 실패 시 롤백
            setItems(prevItems)
            onCartChange(prevItems.reduce((sum, it) => sum + Number(it.quantity), 0))
            setActionError(err.message || '수량 변경 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(item.cart_id, false)
          })
      }

      // 삭제: DELETE /api/cart/:id — 낙관적 제거 후 실패 시 롤백
      const handleRemove = (item) => {
        if (busyIds.has(item.cart_id)) return

        setActionError(null)
        setBusy(item.cart_id, true)
        const prevItems = items

        setItems((prev) => prev.filter((it) => it.cart_id !== item.cart_id))
        onCartChange(
          prevItems
            .filter((it) => it.cart_id !== item.cart_id)
            .reduce((sum, it) => sum + Number(it.quantity), 0)
        )

        apiFetch(`${API_BASE_URL}/cart/${item.cart_id}`, { method: 'DELETE' })
          .then((res) => {
            if (!res.ok) throw new Error(`삭제 실패 (${res.status})`)
          })
          .catch((err) => {
            setItems(prevItems)
            onCartChange(prevItems.reduce((sum, it) => sum + Number(it.quantity), 0))
            setActionError(err.message || '삭제 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(item.cart_id, false)
          })
      }

      // 총 합계 (서버 subtotal 합)
      const total = useMemo(
        () => items.reduce((sum, it) => sum + Number(it.subtotal || 0), 0),
        [items]
      )
      const count = items.length

      return (
        <main className="max-w-2xl mx-auto px-4 py-8 sm:py-12">
          {/* 상단 바 */}
          <div className="flex items-center gap-3 mb-5">
            <button
              onClick={onBack}
              className="px-3 py-1.5 rounded-lg text-sm font-semibold text-slate-600
                bg-white shadow hover:bg-slate-50 transition-colors"
            >
              ← 계속 쇼핑하기
            </button>
            <h1 className="text-xl font-bold tracking-tight text-slate-800">장바구니</h1>
          </div>

          <Card>
            <div className="px-6 py-5">
              {/* 액션 에러 배너 */}
              {actionError && (
                <div
                  role="alert"
                  className="mb-4 flex items-center justify-between gap-3 px-3 py-2 rounded-lg
                    bg-red-50 text-red-700 text-sm border border-red-100"
                >
                  <span className="break-words">⚠️ {actionError}</span>
                  <button
                    onClick={() => setActionError(null)}
                    aria-label="에러 닫기"
                    className="shrink-0 text-red-400 hover:text-red-600 font-bold"
                  >
                    ✕
                  </button>
                </div>
              )}

              {loading && <LoadingState label="장바구니를 불러오는 중..." />}

              {!loading && error && (
                <ErrorState message={error} onRetry={loadCart} />
              )}

              {!loading && !error && count === 0 && (
                <div className="flex flex-col items-center justify-center py-16 gap-3 text-slate-400">
                  <div className="text-4xl">🛒</div>
                  <p className="text-sm">장바구니가 비어 있어요</p>
                  <button
                    onClick={onBack}
                    className="mt-2 px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg text-sm font-semibold transition-colors"
                  >
                    상품 보러 가기
                  </button>
                </div>
              )}

              {!loading && !error && count > 0 && (
                <>
                  <ul className="flex flex-col">
                    {items.map((item) => (
                      <CartItem
                        key={item.cart_id}
                        item={item}
                        onChangeQty={handleChangeQty}
                        onRemove={handleRemove}
                        busy={busyIds.has(item.cart_id)}
                      />
                    ))}
                  </ul>

                  {/* 총 합계 */}
                  <div className="mt-5 pt-5 border-t border-slate-200 flex items-center justify-between">
                    <span className="text-sm font-medium text-slate-500">
                      총 {count}종 상품
                    </span>
                    <div className="text-right">
                      <span className="text-xs text-slate-400 mr-2">합계</span>
                      <span className="text-2xl font-bold text-indigo-600">
                        {formatWon(total)}
                      </span>
                    </div>
                  </div>

                  <Button
                    onClick={onCheckout}
                    className="mt-4 w-full bg-slate-800 hover:bg-slate-900 text-white py-3"
                  >
                    💳 {formatWon(total)} 결제하기
                  </Button>
                </>
              )}
            </div>
          </Card>
        </main>
      )
    }

    // ========================================
    // 📄 상품 목록 뷰 (공개 — 비로그인도 열람)
    // ========================================
    function ProductListView({ user, apiFetch, onRequireLogin, onAddedToCart }) {
      const [products, setProducts] = useState([])
      const [loading, setLoading] = useState(true)
      const [error, setError] = useState(null)
      const [busyId, setBusyId] = useState(null) // 담기 진행 중인 product_id

      // GET /api/products (공개)
      const loadProducts = useCallback(() => {
        setLoading(true)
        setError(null)

        fetch(`${API_BASE_URL}/products`)
          .then((res) => {
            if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`)
            return res.json()
          })
          .then((data) => {
            setProducts(Array.isArray(data) ? data : [])
          })
          .catch((err) => {
            setError(err.message || '알 수 없는 오류')
          })
          .finally(() => {
            setLoading(false)
          })
      }, [])

      useEffect(() => {
        loadProducts()
      }, [loadProducts])

      // 장바구니 담기: 비로그인이면 로그인 모달을 띄운다 (이 퀘스트 핵심)
      const handleAddToCart = (product) => {
        if (!user) {
          onRequireLogin()
          return
        }
        if (busyId) return

        setBusyId(product.id)

        apiFetch(`${API_BASE_URL}/cart`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ product_id: product.id, quantity: 1 }),
        })
          .then((res) => {
            if (!res.ok) throw new Error(`담기 실패 (${res.status})`)
            return res.json().catch(() => ({}))
          })
          .then(() => {
            // 담기 성공 → 토스트 + 헤더 배지 갱신 (상위에서 장바구니 재조회)
            onAddedToCart(product)
          })
          .catch((err) => {
            onAddedToCart(null, err.message || '담기 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusyId(null)
          })
      }

      return (
        <main className="max-w-5xl mx-auto px-4 py-8 sm:py-10">
          {/* 소개 배너 */}
          <div className="mb-6">
            <h1 className="text-2xl font-bold tracking-tight text-slate-800">
              중고 전자기기, 합리적인 가격에
            </h1>
            <p className="text-slate-500 text-sm mt-1">
              검수 완료된 중고 테크 제품을 만나보세요
              {!user && ' · 장바구니 담기는 로그인 후 이용 가능합니다'}
            </p>
          </div>

          {loading && <LoadingState label="상품을 불러오는 중..." />}

          {!loading && error && (
            <ErrorState message={error} onRetry={loadProducts} />
          )}

          {!loading && !error && products.length === 0 && (
            <div className="flex flex-col items-center justify-center py-20 gap-3 text-slate-400">
              <div className="text-4xl">📦</div>
              <p className="text-sm">등록된 상품이 없어요</p>
            </div>
          )}

          {!loading && !error && products.length > 0 && (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
              {products.map((product) => (
                <ProductCard
                  key={product.id}
                  product={product}
                  onAddToCart={handleAddToCart}
                  busy={busyId === product.id}
                />
              ))}
            </div>
          )}
        </main>
      )
    }

    // ========================================
    // 👤 프로필 뷰 (로그인 필요) — 프로필 이미지 업로드
    // ========================================
    function ProfileView({ user, apiFetch, onBack, onProfileImageChange }) {
      const [imageUrl, setImageUrl] = useState('')  // 서버에 저장된 현재 이미지
      const [preview, setPreview] = useState('')    // 아직 업로드 전 미리보기(base64)
      const [fileBase64, setFileBase64] = useState('') // 업로드할 base64 원본
      const [fileName, setFileName] = useState('')
      const [loading, setLoading] = useState(true)
      const [uploading, setUploading] = useState(false)
      const [error, setError] = useState('')

      // 주문 내역 상태
      const [orders, setOrders] = useState([])
      const [ordersLoading, setOrdersLoading] = useState(true)
      const [expanded, setExpanded] = useState(null) // 펼쳐진 주문 order_uid (보너스 상세)

      // 현재 프로필 로드
      useEffect(() => {
        let alive = true
        apiFetch(`${API_BASE_URL}/profile`)
          .then((res) => (res.ok ? res.json() : Promise.reject()))
          .then((data) => { if (alive) setImageUrl(data.image_url || '') })
          .catch(() => {})
          .finally(() => { if (alive) setLoading(false) })
        return () => { alive = false }
      }, [apiFetch])

      // 주문 내역 로드 (본인 것만 서버가 필터)
      useEffect(() => {
        let alive = true
        apiFetch(`${API_BASE_URL}/orders`)
          .then((res) => (res.ok ? res.json() : Promise.reject()))
          .then((data) => { if (alive) setOrders(Array.isArray(data) ? data : []) })
          .catch(() => {})
          .finally(() => { if (alive) setOrdersLoading(false) })
        return () => { alive = false }
      }, [apiFetch])

      // 파일 선택 → base64로 읽어 미리보기
      const handleFile = (e) => {
        setError('')
        const file = e.target.files && e.target.files[0]
        if (!file) return
        if (!file.type.startsWith('image/')) {
          setError('이미지 파일만 올릴 수 있어요')
          return
        }
        if (file.size > 5 * 1024 * 1024) {
          setError('이미지는 5MB 이하만 가능해요')
          return
        }
        const reader = new FileReader()
        reader.onload = () => {
          setFileBase64(reader.result)   // data URI 형태
          setPreview(reader.result)
          setFileName(file.name)
        }
        reader.readAsDataURL(file)
      }

      // 업로드 실행
      const handleUpload = () => {
        if (!fileBase64 || uploading) return
        setUploading(true)
        setError('')
        apiFetch(`${API_BASE_URL}/profile/image`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fileName, fileBase64 }),
        })
          .then(async (res) => {
            const data = await res.json().catch(() => ({}))
            if (!res.ok) throw new Error(data.error || '업로드에 실패했어요')
            return data
          })
          .then((data) => {
            setImageUrl(data.image_url)
            setPreview('')
            setFileBase64('')
            setFileName('')
            onProfileImageChange && onProfileImageChange(data.image_url)
          })
          .catch((err) => setError(err.message || '업로드에 실패했어요'))
          .finally(() => setUploading(false))
      }

      // 화면에 보여줄 이미지: 미리보기 > 저장된 이미지 > 없음
      const shownImage = preview || imageUrl

      return (
        <main className="max-w-md mx-auto px-4 py-8">
          <button
            onClick={onBack}
            className="mb-4 text-sm text-slate-500 hover:text-indigo-600 transition-colors"
          >
            ← 상품 목록으로
          </button>

          <Card className="p-8">
            <h1 className="text-xl font-bold text-slate-800 mb-6 text-center">내 프로필</h1>

            {loading ? (
              <div className="flex justify-center py-8"><Spinner /></div>
            ) : (
              <div className="flex flex-col items-center gap-5">
                {/* 아바타 */}
                <div className="w-32 h-32 rounded-full overflow-hidden bg-slate-100 border-4 border-white shadow-lg flex items-center justify-center">
                  {shownImage ? (
                    <img src={shownImage} alt="프로필 이미지" className="w-full h-full object-cover" />
                  ) : (
                    <span className="text-5xl text-slate-300">👤</span>
                  )}
                </div>

                {/* 사용자명 */}
                <p className="text-lg font-semibold text-slate-700">{user.username}</p>

                {/* 파일 선택 */}
                <label className="w-full">
                  <span className="block text-sm text-slate-500 mb-1.5">프로필 이미지 선택</span>
                  <input
                    type="file"
                    accept="image/*"
                    onChange={handleFile}
                    className="block w-full text-sm text-slate-600
                      file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0
                      file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-600
                      hover:file:bg-indigo-100 file:cursor-pointer cursor-pointer"
                  />
                </label>

                {error && <p className="text-sm text-red-500 w-full text-center">{error}</p>}

                {/* 업로드 버튼: 새 파일이 선택됐을 때만 활성 */}
                <Button
                  onClick={handleUpload}
                  disabled={!fileBase64 || uploading}
                  className="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-3"
                >
                  {uploading ? '업로드 중…' : '이미지 저장'}
                </Button>
              </div>
            )}
          </Card>

          {/* 주문 내역 */}
          <Card className="p-6 mt-6">
            <h2 className="text-lg font-bold text-slate-800 mb-4">주문 내역</h2>

            {ordersLoading ? (
              <div className="flex justify-center py-8"><Spinner /></div>
            ) : orders.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-10 gap-2 text-slate-400">
                <div className="text-3xl">🧾</div>
                <p className="text-sm">아직 주문 내역이 없어요</p>
              </div>
            ) : (
              <ul className="flex flex-col divide-y divide-slate-100">
                {orders.map((o) => {
                  const isOpen = expanded === o.order_uid
                  return (
                    <li key={o.order_uid} className="py-3">
                      {/* 주문 요약 행 (클릭 → 상세 토글) */}
                      <button
                        onClick={() => setExpanded(isOpen ? null : o.order_uid)}
                        className="w-full flex items-center justify-between gap-3 text-left hover:bg-slate-50 rounded-lg px-2 py-1.5 transition-colors"
                      >
                        <div className="min-w-0">
                          <p className="text-sm font-semibold text-slate-700 truncate">{o.order_name}</p>
                          <p className="text-xs text-slate-400 mt-0.5">
                            <span className="font-mono">{shortOrderNo(o.order_uid)}</span>
                            {' · '}
                            {formatDate(o.created_at)}
                          </p>
                        </div>
                        <div className="shrink-0 text-right">
                          <p className="text-sm font-bold text-indigo-600">{formatWon(o.total_price)}</p>
                          <p className="text-[11px] text-slate-400">{isOpen ? '접기 ▲' : '상세 ▼'}</p>
                        </div>
                      </button>

                      {/* 주문 상세 (보너스): 상품별 수량·단가·합계 */}
                      {isOpen && (
                        <div className="mt-2 mx-2 rounded-lg bg-slate-50 border border-slate-100 p-3">
                          <ul className="flex flex-col gap-1.5">
                            {o.items.map((it, idx) => (
                              <li key={idx} className="flex items-center justify-between text-xs text-slate-600">
                                <span className="truncate mr-2">
                                  {it.name}
                                  <span className="text-slate-400"> · {formatWon(it.price)} × {it.quantity}</span>
                                </span>
                                <span className="shrink-0 font-semibold text-slate-700">{formatWon(it.subtotal)}</span>
                              </li>
                            ))}
                          </ul>
                          <div className="mt-2 pt-2 border-t border-slate-200 flex items-center justify-between text-xs">
                            <span className="text-slate-500">합계</span>
                            <span className="font-bold text-indigo-600">{formatWon(o.total_price)}</span>
                          </div>
                        </div>
                      )}
                    </li>
                  )
                })}
              </ul>
            )}
          </Card>
        </main>
      )
    }

    // ========================================
    // 💳 결제 뷰 (토스페이먼츠 위젯)
    // ========================================
    function PaymentView({ user, apiFetch, onBack }) {
      const [order, setOrder] = useState(null)      // { orderUid, amount, orderName }
      const [loading, setLoading] = useState(true)  // 주문 생성 중
      const [error, setError] = useState('')
      const [ready, setReady] = useState(false)     // 위젯 렌더 완료
      const [requesting, setRequesting] = useState(false)
      const widgetsRef = useRef(null)
      const renderedRef = useRef(false)             // 위젯 중복 렌더 방지

      // 1) 진입 시 서버에 주문 생성 (금액은 서버가 DB로 재계산)
      useEffect(() => {
        let alive = true
        apiFetch(`${API_BASE_URL}/orders`, { method: 'POST' })
          .then(async (res) => {
            const data = await res.json().catch(() => ({}))
            if (!res.ok) throw new Error(data.error || '주문 생성에 실패했어요')
            return data
          })
          .then((data) => { if (alive) setOrder(data) })
          .catch((err) => { if (alive) setError(err.message) })
          .finally(() => { if (alive) setLoading(false) })
        return () => { alive = false }
      }, [apiFetch])

      // 2) 주문이 만들어지면 토스 위젯을 한 번만 렌더
      useEffect(() => {
        if (!order || renderedRef.current) return
        if (typeof TossPayments === 'undefined') {
          setError('결제 모듈을 불러오지 못했어요 (네트워크 확인)')
          return
        }
        const run = async () => {
          const toss = TossPayments(TOSS_CLIENT_KEY)
          const widgets = toss.widgets({ customerKey: `user-${user.id}` })
          widgetsRef.current = widgets
          await widgets.setAmount({ currency: 'KRW', value: order.amount })
          await widgets.renderPaymentMethods({ selector: '#payment-method', variantKey: 'DEFAULT' })
          await widgets.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' })
          renderedRef.current = true
          setReady(true)
        }
        run().catch((err) => setError('결제 위젯 로딩 실패: ' + (err.message || err)))
      }, [order, user])

      // 3) 결제 요청 (성공 시 토스가 successUrl로 리다이렉트)
      const handlePay = async () => {
        if (!widgetsRef.current || !order || requesting) return
        setRequesting(true)
        setError('')
        const base = window.location.origin + window.location.pathname
        try {
          await widgetsRef.current.requestPayment({
            orderId: order.orderUid,
            orderName: order.orderName,
            successUrl: base + '?view=payment-success',
            failUrl: base + '?view=payment-fail',
            customerName: user.username,
          })
        } catch (err) {
          setRequesting(false)
          // 사용자가 결제창을 닫은 경우(USER_CANCEL)는 조용히 무시
          if (err && err.code !== 'USER_CANCEL') {
            setError(err.message || '결제 요청 중 오류가 발생했어요')
          }
        }
      }

      return (
        <main className="max-w-lg mx-auto px-4 py-8">
          <button
            onClick={onBack}
            className="mb-4 text-sm text-slate-500 hover:text-indigo-600 transition-colors"
          >
            ← 장바구니로
          </button>

          <Card className="p-6">
            <h1 className="text-xl font-bold text-slate-800 mb-1">결제</h1>
            {order && (
              <p className="text-sm text-slate-500 mb-5">
                {order.orderName} · <span className="font-semibold text-indigo-600">{formatWon(order.amount)}</span>
              </p>
            )}

            {loading && <div className="flex justify-center py-10"><Spinner /></div>}

            {error && (
              <div className="mb-4 px-3 py-2 rounded-lg bg-red-50 text-red-700 text-sm border border-red-100">
                ⚠️ {error}
              </div>
            )}

            {/* 토스 위젯이 그려질 자리 */}
            <div id="payment-method" className={order ? '' : 'hidden'} />
            <div id="agreement" className={order ? '' : 'hidden'} />

            {order && (
              <Button
                onClick={handlePay}
                disabled={!ready || requesting}
                className="mt-5 w-full bg-indigo-500 hover:bg-indigo-600 text-white py-3"
              >
                {requesting ? '결제 진행 중…' : `${formatWon(order.amount)} 결제하기`}
              </Button>
            )}

            <p className="mt-4 text-xs text-slate-400 text-center">
              테스트 결제입니다 · 카드번호 아무 16자리, 미래 유효기간, 임의 CVC로 진행하세요
            </p>
          </Card>
        </main>
      )
    }

    // ========================================
    // ✅ 결제 결과 뷰 (successUrl / failUrl 리다이렉트 처리)
    // ========================================
    function PaymentResultView({ apiFetch, onHome, onPaid }) {
      const [state, setState] = useState('confirming') // confirming | success | fail
      const [message, setMessage] = useState('')
      const [info, setInfo] = useState(null)           // { orderName, amount }

      useEffect(() => {
        const params = new URLSearchParams(window.location.search)
        const paymentKey = params.get('paymentKey')
        const orderId = params.get('orderId')
        const amount = params.get('amount')

        // 실패 리다이렉트: paymentKey 없이 code/message가 옴
        if (!paymentKey) {
          setState('fail')
          setMessage(params.get('message') || '결제가 취소되었거나 실패했어요')
          window.history.replaceState({}, '', window.location.pathname)
          return
        }

        // 성공 리다이렉트: 서버에 승인 요청 (금액 검증 + 토스 승인)
        apiFetch(`${API_BASE_URL}/orders/confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentKey, orderId, amount }),
        })
          .then(async (res) => {
            const data = await res.json().catch(() => ({}))
            if (!res.ok) throw new Error(data.error || '결제 승인에 실패했어요')
            return data
          })
          .then((data) => {
            setState('success')
            setInfo(data)
            onPaid && onPaid() // 장바구니 배지 초기화
          })
          .catch((err) => {
            setState('fail')
            setMessage(err.message || '결제 승인에 실패했어요')
          })
          .finally(() => {
            // 재승인 방지: 민감 파라미터를 URL에서 제거
            window.history.replaceState({}, '', window.location.pathname)
          })
      }, [apiFetch, onPaid])

      return (
        <main className="max-w-md mx-auto px-4 py-16">
          <Card className="p-8 text-center">
            {state === 'confirming' && (
              <div className="flex flex-col items-center gap-4">
                <Spinner />
                <p className="text-slate-500 text-sm">결제를 확인하고 있어요…</p>
              </div>
            )}
            {state === 'success' && (
              <div className="flex flex-col items-center gap-3">
                <div className="text-5xl">✅</div>
                <h1 className="text-xl font-bold text-slate-800">결제 완료</h1>
                {info && (
                  <p className="text-sm text-slate-500">
                    {info.orderName} · <span className="font-semibold text-indigo-600">{formatWon(info.amount)}</span>
                  </p>
                )}
                <Button onClick={onHome} className="mt-3 bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-2.5">
                  쇼핑 계속하기
                </Button>
              </div>
            )}
            {state === 'fail' && (
              <div className="flex flex-col items-center gap-3">
                <div className="text-5xl">❌</div>
                <h1 className="text-xl font-bold text-slate-800">결제 실패</h1>
                <p className="text-sm text-slate-500 break-words">{message}</p>
                <Button onClick={onHome} className="mt-3 bg-slate-100 hover:bg-slate-200 text-slate-600 px-6 py-2.5">
                  돌아가기
                </Button>
              </div>
            )}
          </Card>
        </main>
      )
    }

    // ========================================
    // 🧩 헤더 (마켓 이름 + 로그인 상태 + 장바구니)
    // ========================================
    function Header({ user, profileImage, cartCount, onOpenCart, onOpenProfile, onOpenLogin, onLogout, onGoHome }) {
      return (
        <header className="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-100 shadow-sm">
          <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between gap-3">
            {/* 마켓 이름 */}
            <button
              onClick={onGoHome}
              className="flex items-center gap-2 text-lg font-bold tracking-tight text-slate-800 hover:text-indigo-600 transition-colors"
            >
              <span>🛒</span>
              <span>중고테크 마켓</span>
            </button>

            {/* 우측 상태 */}
            <div className="flex items-center gap-2">
              {user ? (
                <>
                  {/* 프로필 아바타(클릭 → 프로필 뷰) */}
                  <button
                    onClick={onOpenProfile}
                    aria-label="프로필 열기"
                    className="flex items-center gap-2 pl-1 pr-2 py-1 rounded-full hover:bg-slate-100 transition-colors"
                  >
                    <span className="w-8 h-8 rounded-full overflow-hidden bg-slate-100 border border-slate-200 flex items-center justify-center">
                      {profileImage ? (
                        <img src={profileImage} alt="프로필" className="w-full h-full object-cover" />
                      ) : (
                        <span className="text-base text-slate-400">👤</span>
                      )}
                    </span>
                    <span className="hidden sm:inline text-sm text-slate-500">
                      <span className="font-semibold text-slate-700">{user.username}</span>님
                    </span>
                  </button>

                  {/* 장바구니 아이콘 + 개수 배지 */}
                  <button
                    onClick={onOpenCart}
                    aria-label="장바구니 열기"
                    className="relative px-3 py-2 rounded-xl text-slate-600 hover:bg-slate-100 transition-colors"
                  >
                    <span className="text-xl">🛒</span>
                    {cartCount > 0 && (
                      <span className="absolute -top-0.5 -right-0.5 min-w-[1.25rem] h-5 px-1
                        flex items-center justify-center rounded-full bg-indigo-500 text-white text-[11px] font-bold">
                        {cartCount > 99 ? '99+' : cartCount}
                      </span>
                    )}
                  </button>

                  <Button
                    onClick={onLogout}
                    className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-2"
                  >
                    로그아웃
                  </Button>
                </>
              ) : (
                <Button
                  onClick={onOpenLogin}
                  className="bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2"
                >
                  로그인
                </Button>
              )}
            </div>
          </div>
        </header>
      )
    }

    // ========================================
    // 🚀 App: 전체 상태 조율 (뷰 전환 / 인증 / 장바구니 개수)
    // ========================================
    function App() {
      // 새로고침해도 유지되도록 localStorage 에서 초기값 로드
      const [user, setUser] = useState(() => authStore.getUser())
      // 토스 결제 후 리다이렉트로 돌아온 경우 결과 뷰로 시작
      const [view, setView] = useState(() => {
        const v = new URLSearchParams(window.location.search).get('view')
        return (v === 'payment-success' || v === 'payment-fail') ? 'payment-result' : 'products'
      }) // 'products' | 'cart' | 'profile' | 'payment' | 'payment-result'
      const [authOpen, setAuthOpen] = useState(false) // 로그인 모달 표시 여부
      const [cartCount, setCartCount] = useState(0)   // 헤더 배지용 총 수량
      const [toast, setToast] = useState(null)        // 담기 피드백 토스트
      const [profileImage, setProfileImage] = useState('') // 헤더 아바타용 프로필 이미지

      // 로그아웃: 토큰 제거 + 상태 초기화 + 상품 화면으로 복귀
      const handleLogout = useCallback(() => {
        authStore.clear()
        setUser(null)
        setCartCount(0)
        setProfileImage('')
        setView('products')
      }, [])

      // 인증 실패(401) 시 자동 로그아웃되는 fetch 래퍼 (user 변동과 무관하게 고정)
      const apiFetch = useMemo(() => createApiFetch(handleLogout), [handleLogout])

      // 토큰 유무로 실제 로그인 판단 (user 정보만 있고 토큰 없는 경우 방지)
      const hasToken = !!authStore.getToken()
      const isLoggedIn = !!user && hasToken

      // 토스트 자동 사라짐
      useEffect(() => {
        if (!toast) return
        const t = setTimeout(() => setToast(null), 2200)
        return () => clearTimeout(t)
      }, [toast])

      // 로그인한 상태에서 장바구니 개수를 한 번 동기화 (새로고침 시 배지 복원)
      useEffect(() => {
        if (!isLoggedIn) return
        apiFetch(`${API_BASE_URL}/cart`)
          .then((res) => (res.ok ? res.json() : []))
          .then((data) => {
            const list = Array.isArray(data) ? data : []
            setCartCount(list.reduce((sum, it) => sum + Number(it.quantity), 0))
          })
          .catch(() => { /* 배지 동기화 실패는 조용히 무시 */ })
      }, [isLoggedIn, apiFetch])

      // 로그인 시 헤더 아바타에 쓸 프로필 이미지를 한 번 불러온다
      useEffect(() => {
        if (!isLoggedIn) return
        apiFetch(`${API_BASE_URL}/profile`)
          .then((res) => (res.ok ? res.json() : null))
          .then((data) => { if (data) setProfileImage(data.image_url || '') })
          .catch(() => { /* 프로필 로드 실패는 조용히 무시 */ })
      }, [isLoggedIn, apiFetch])

      // 로그인 성공: 모달 닫고 user 반영
      const handleAuthSuccess = (u) => {
        setUser(u)
        setAuthOpen(false)
      }

      // 상품 카드에서 담기 완료(or 실패) 콜백
      // product 있으면 성공 → 토스트 + 장바구니 개수 재조회 / 실패면 에러 토스트
      const handleAddedToCart = (product, errMessage) => {
        if (!product) {
          setToast(errMessage ? `⚠️ ${errMessage}` : '담기에 실패했어요')
          return
        }
        setToast(`"${product.name}" 장바구니에 담았어요`)
        // 서버 기준 개수 재조회 (수량 누적 반영)
        apiFetch(`${API_BASE_URL}/cart`)
          .then((res) => (res.ok ? res.json() : []))
          .then((data) => {
            const list = Array.isArray(data) ? data : []
            setCartCount(list.reduce((sum, it) => sum + Number(it.quantity), 0))
          })
          .catch(() => {})
      }

      return (
        <div className="min-h-screen">
          <Header
            user={isLoggedIn ? user : null}
            profileImage={profileImage}
            cartCount={cartCount}
            onOpenCart={() => setView('cart')}
            onOpenProfile={() => setView('profile')}
            onOpenLogin={() => setAuthOpen(true)}
            onLogout={handleLogout}
            onGoHome={() => setView('products')}
          />

          {/* 본문: 로그인 상태 + 현재 뷰에 따라 분기 */}
          {view === 'payment-result' ? (
            <PaymentResultView
              apiFetch={apiFetch}
              onHome={() => setView('products')}
              onPaid={() => setCartCount(0)}
            />
          ) : view === 'payment' && isLoggedIn ? (
            <PaymentView
              user={user}
              apiFetch={apiFetch}
              onBack={() => setView('cart')}
            />
          ) : view === 'cart' && isLoggedIn ? (
            <CartView
              apiFetch={apiFetch}
              onBack={() => setView('products')}
              onCartChange={setCartCount}
              onCheckout={() => setView('payment')}
            />
          ) : view === 'profile' && isLoggedIn ? (
            <ProfileView
              user={user}
              apiFetch={apiFetch}
              onBack={() => setView('products')}
              onProfileImageChange={setProfileImage}
            />
          ) : (
            <ProductListView
              user={isLoggedIn ? user : null}
              apiFetch={apiFetch}
              onRequireLogin={() => setAuthOpen(true)}
              onAddedToCart={handleAddedToCart}
            />
          )}

          {/* 로그인/회원가입 모달 */}
          <Modal isOpen={authOpen} onClose={() => setAuthOpen(false)} title="로그인">
            <AuthForm onAuthSuccess={handleAuthSuccess} onClose={() => setAuthOpen(false)} />
          </Modal>

          {/* 담기 피드백 토스트 */}
          <Toast message={toast} />

          {/* 푸터 */}
          <footer className="max-w-5xl mx-auto px-4 py-8">
            <p className="text-center text-xs text-slate-400">
              장바구니 담기는 로그인 후 이용 가능하며, 토큰(JWT)은 브라우저에 안전하게 저장됩니다.
            </p>
          </footer>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
