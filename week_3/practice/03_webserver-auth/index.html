<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저장된 비밀번호 조회</title>
  <!-- CDN 버전 고정 (webserver-02 와 동일) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React

    // ========================================
    // 📄 메인 페이지 컴포넌트
    // ========================================
    function App() {
      // 서버에서 받아온 결과 ({ password, savedAt })
      const [result, setResult] = useState(null)
      // 요청 진행 중 여부
      const [loading, setLoading] = useState(false)
      // 에러 메시지
      const [error, setError] = useState('')
      // 비밀번호 평문 노출 여부 (보안 학습 포인트 — 기본은 마스킹)
      const [revealed, setRevealed] = useState(false)

      // 버튼 클릭 시 서버에서 비밀번호를 불러온다
      const handleLoad = async () => {
        setLoading(true)
        setError('')
        // 새로 불러올 때마다 다시 마스킹 상태로 초기화
        setRevealed(false)
        try {
          const res = await fetch('/api/password')
          if (!res.ok) {
            throw new Error('서버 응답 오류 (' + res.status + ')')
          }
          const data = await res.json()
          setResult(data)
        } catch (err) {
          setResult(null)
          setError(err.message)
        } finally {
          setLoading(false)
        }
      }

      // 저장 시각을 한국어 로컬 시간 형식으로 변환
      const formatSavedAt = (iso) => {
        const date = new Date(iso)
        return date.toLocaleString('ko-KR', {
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        })
      }

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-xl bg-white rounded-lg shadow-md p-8">
            {/* 제목 + 설명 */}
            <h1 className="text-2xl font-bold text-gray-800">저장된 비밀번호 조회</h1>
            <p className="mt-1 text-gray-500">
              버튼을 누르면 서버에 저장된 비밀번호를 불러옵니다.
            </p>

            {/* 불러오기 버튼 */}
            <button
              onClick={handleLoad}
              disabled={loading}
              className="mt-6 w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed text-white font-medium py-3 rounded-lg transition-colors"
            >
              {loading ? '불러오는 중...' : '비밀번호 불러오기'}
            </button>

            {/* 결과 영역 */}
            <div className="mt-6 border border-gray-200 rounded-lg p-6 bg-gray-50">
              {error ? (
                // 에러 상태
                <p className="text-red-600 font-medium">오류 발생: {error}</p>
              ) : result ? (
                // 정상 결과 상태
                <div>
                  <div className="flex items-center justify-between gap-4">
                    <span className="font-mono text-3xl tracking-wider text-gray-800 break-all">
                      {revealed ? result.password : '••••••'}
                    </span>
                    <button
                      onClick={() => setRevealed((prev) => !prev)}
                      className="shrink-0 text-sm text-blue-600 hover:text-blue-700 border border-blue-200 rounded-md px-3 py-1.5 transition-colors"
                    >
                      👁 {revealed ? '숨기기' : '표시'}
                    </button>
                  </div>
                  <p className="mt-3 text-xs text-gray-400">
                    저장 시각: {formatSavedAt(result.savedAt)}
                  </p>
                </div>
              ) : (
                // 아직 불러오지 않은 placeholder 상태
                <p className="text-gray-400">여기에 비밀번호가 표시됩니다.</p>
              )}
            </div>
          </div>
        </div>
      )
    }

    // ========================================
    // 🚀 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
