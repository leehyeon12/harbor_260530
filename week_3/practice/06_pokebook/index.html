<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포켓몬 도감 / Pokébook</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ 모든 CDN은 버전을 명시적으로 고정한다. 미고정 시 @babel/standalone 이
       최신(8.x)으로 올라가 type="text/babel" 인라인 변환이 통째로 깨진다.
       Babel 은 반드시 7.x 로 고정한다 (8.x 미지원). React/ReactDOM 도 정확히 핀. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    /* Tailwind 으로 표현하기 어려운 커스텀 애니메이션만 정의한다 */
    @keyframes floatUp {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .animate-floatUp { animation: floatUp 0.25s ease-out; }

    @keyframes modalPop {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .animate-modalPop { animation: modalPop 0.2s ease-out; }

    @keyframes barGrow {
      from { width: 0; }
    }
    .animate-barGrow { animation: barGrow 0.6s ease-out; }

    /* 스탯 막대 등 부드러운 전환 */
    .stat-bar { transition: width 0.6s ease-out; }

    /* 불확정 로딩 바: 좌우로 미끄러지는 인디케이터 */
    @keyframes loadingSlide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
    .animate-loadingSlide { animation: loadingSlide 1.1s ease-in-out infinite; }

    /* 카드 스켈레톤 펄스 */
    @keyframes skelPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.45; }
    }
    .animate-skel { animation: skelPulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ========================================
    // 🌐 PokeAPI 연동 설정 (전국도감 전체 / 2단계 로딩)
    // ========================================
    // [성능 설계]
    //   1단계: GraphQL 1회 호출로 전체 종(species)의 id·영문slug·한글명·대표타입을 가볍게 로드
    //          → 이 데이터만으로 카드 + 검색 + 타입 필터가 전부 동작.
    //   2단계: 키·몸무게·종족값·설명 같은 상세는 모달을 열 때만 REST 2건으로 lazy 로드 + 캐시.
    //   렌더링: 카드 1000개+ 이므로 "더 보기" 버튼으로 PAGE_SIZE 만큼 점진 렌더링.
    const POKE_API = 'https://pokeapi.co/api/v2';
    const GRAPHQL_URL = 'https://beta.pokeapi.co/graphql/v1beta';
    // 이미지: id 로 URL 직접 구성 (추가 요청 0)
    const ARTWORK_URL = (id) =>
      `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
    const PAGE_SIZE = 60;        // "더 보기" 한 번에 추가로 렌더링할 카드 수
    const SPECIES_FALLBACK_LIMIT = 100000; // REST 폴백: 전체 species 목록 한 번에

    // 타입 영문 → 한글 매핑 (18종)
    const TYPE_KO = {
      normal: '노말', fire: '불꽃', water: '물', electric: '전기', grass: '풀',
      ice: '얼음', fighting: '격투', poison: '독', ground: '땅', flying: '비행',
      psychic: '에스퍼', bug: '벌레', rock: '바위', ghost: '고스트', dragon: '드래곤',
      dark: '악', steel: '강철', fairy: '페어리',
    };
    const toTypeKo = (en) => TYPE_KO[en] || en;

    // ========================================
    // 🎨 타입별 색상 테마 & 메타 정보 (18종)
    // ========================================
    const TYPE_THEME = {
      '노말':   { badge: 'bg-stone-400 text-white',   soft: 'from-stone-100 to-stone-50',     ring: 'ring-stone-300',   bar: 'bg-stone-400',   emoji: '⭐' },
      '불꽃':   { badge: 'bg-orange-500 text-white',  soft: 'from-orange-100 to-orange-50',   ring: 'ring-orange-300',  bar: 'bg-orange-500',  emoji: '🔥' },
      '물':     { badge: 'bg-blue-500 text-white',    soft: 'from-blue-100 to-blue-50',       ring: 'ring-blue-300',    bar: 'bg-blue-500',    emoji: '💧' },
      '전기':   { badge: 'bg-yellow-400 text-yellow-900', soft: 'from-yellow-100 to-yellow-50', ring: 'ring-yellow-300', bar: 'bg-yellow-400', emoji: '⚡' },
      '풀':     { badge: 'bg-green-500 text-white',    soft: 'from-green-100 to-green-50',     ring: 'ring-green-300',   bar: 'bg-green-500',   emoji: '🌿' },
      '얼음':   { badge: 'bg-cyan-400 text-cyan-900',  soft: 'from-cyan-100 to-cyan-50',       ring: 'ring-cyan-300',    bar: 'bg-cyan-400',    emoji: '❄️' },
      '격투':   { badge: 'bg-red-600 text-white',      soft: 'from-red-100 to-red-50',         ring: 'ring-red-300',     bar: 'bg-red-600',     emoji: '🥊' },
      '독':     { badge: 'bg-fuchsia-600 text-white',  soft: 'from-fuchsia-100 to-fuchsia-50', ring: 'ring-fuchsia-300', bar: 'bg-fuchsia-600', emoji: '☠️' },
      '땅':     { badge: 'bg-amber-600 text-white',    soft: 'from-amber-100 to-amber-50',     ring: 'ring-amber-300',   bar: 'bg-amber-600',   emoji: '⛰️' },
      '비행':   { badge: 'bg-sky-400 text-sky-900',    soft: 'from-sky-100 to-sky-50',         ring: 'ring-sky-300',     bar: 'bg-sky-400',     emoji: '🪽' },
      '에스퍼': { badge: 'bg-pink-500 text-white',     soft: 'from-pink-100 to-pink-50',       ring: 'ring-pink-300',    bar: 'bg-pink-500',    emoji: '🔮' },
      '벌레':   { badge: 'bg-lime-500 text-white',     soft: 'from-lime-100 to-lime-50',       ring: 'ring-lime-300',    bar: 'bg-lime-500',    emoji: '🐛' },
      '바위':   { badge: 'bg-yellow-700 text-white',   soft: 'from-yellow-100 to-yellow-50',   ring: 'ring-yellow-400',  bar: 'bg-yellow-700',  emoji: '🪨' },
      '고스트': { badge: 'bg-purple-600 text-white',   soft: 'from-purple-100 to-purple-50',   ring: 'ring-purple-300',  bar: 'bg-purple-600',  emoji: '👻' },
      '드래곤': { badge: 'bg-indigo-600 text-white',   soft: 'from-indigo-100 to-indigo-50',   ring: 'ring-indigo-300',  bar: 'bg-indigo-600',  emoji: '🐉' },
      '악':     { badge: 'bg-neutral-700 text-white',  soft: 'from-neutral-200 to-neutral-100',ring: 'ring-neutral-400', bar: 'bg-neutral-700', emoji: '🌑' },
      '강철':   { badge: 'bg-slate-500 text-white',    soft: 'from-slate-200 to-slate-100',    ring: 'ring-slate-400',   bar: 'bg-slate-500',   emoji: '⚙️' },
      '페어리': { badge: 'bg-rose-400 text-white',     soft: 'from-rose-100 to-rose-50',       ring: 'ring-rose-300',    bar: 'bg-rose-400',    emoji: '✨' },
    };
    // 알 수 없는 타입 기본 테마
    const DEFAULT_THEME = { badge: 'bg-slate-400 text-white', soft: 'from-slate-100 to-slate-50', ring: 'ring-slate-300', bar: 'bg-slate-400', emoji: '❓' };

    const getTheme = (type) => TYPE_THEME[type] || DEFAULT_THEME;
    // 대표 타입(첫 번째)으로 카드 배경 테마를 정한다
    const getPrimaryTheme = (pokemon) => getTheme(pokemon.types[0]);

    // ========================================
    // 📡 PokeAPI 데이터 로딩 유틸
    // ========================================
    // flavor_text 의 줄바꿈/제어문자(\n \f 등)를 공백으로 정리
    const cleanFlavor = (text) =>
      (text || '').replace(/[\n\f\r]+/g, ' ').replace(/\s+/g, ' ').trim();

    const capitalize = (s) => (s ? s.charAt(0).toUpperCase() + s.slice(1) : s);

    // ----------------------------------------
    // [1단계] 전체 목록 + 한글이름 + 대표타입 일괄 로드 (가볍게)
    // ----------------------------------------
    // GraphQL 쿼리: 버전에 따라 필드명이 pokemon_v2_ 접두사일 수 있다.
    // 우선 접두사 없는 형태로 시도하고, 실패하면 접두사 버전으로 폴백한다.

    // 접두사 없는 형태 (일부 인스턴스)
    const GQL_PLAIN = `query AllSpecies {
      pokemonspecies(order_by: {id: asc}) {
        id
        name
        pokemonspeciesnames(where: {language_id: {_eq: 3}}) { name }
        pokemons(where: {is_default: {_eq: true}}, limit: 1) {
          pokemontypes(order_by: {slot: asc}) { type { name } }
        }
      }
    }`;

    // 접두사 있는 형태 (현행 beta 스키마)
    const GQL_PREFIXED = `query AllSpecies {
      pokemon_v2_pokemonspecies(order_by: {id: asc}) {
        id
        name
        pokemon_v2_pokemonspeciesnames(where: {language_id: {_eq: 3}}) { name }
        pokemon_v2_pokemons(where: {is_default: {_eq: true}}, limit: 1) {
          pokemon_v2_pokemontypes(order_by: {slot: asc}) { pokemon_v2_type { name } }
        }
      }
    }`;

    async function runGraphQL(query) {
      const res = await fetch(GRAPHQL_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      if (!res.ok) throw new Error(`GraphQL HTTP ${res.status}`);
      const json = await res.json();
      if (json.errors) throw new Error((json.errors[0] && json.errors[0].message) || 'GraphQL 오류');
      return json.data;
    }

    // GraphQL 응답(접두사 유무 모두)을 표준 목록 형태로 정규화
    function normalizeSpeciesRow(row, prefixed) {
      const namesArr = prefixed ? row.pokemon_v2_pokemonspeciesnames : row.pokemonspeciesnames;
      const pokemonsArr = prefixed ? row.pokemon_v2_pokemons : row.pokemons;
      const koName = (namesArr && namesArr[0] && namesArr[0].name) || capitalize(row.name);
      const firstPokemon = pokemonsArr && pokemonsArr[0];
      const typeRows = (firstPokemon &&
        (prefixed ? firstPokemon.pokemon_v2_pokemontypes : firstPokemon.pokemontypes)) || [];
      const types = typeRows.map((t) =>
        toTypeKo(prefixed ? t.pokemon_v2_type.name : t.type.name)
      );
      return {
        id: row.id,
        nameKo: koName,
        nameEn: capitalize(row.name),
        types: types.length ? types : ['노말'], // 타입 누락 방어
        image: ARTWORK_URL(row.id),
      };
    }

    // 1단계 메인: GraphQL(접두사 없음) → GraphQL(접두사) → REST 폴백 순으로 시도.
    // 반환: { list, source }  (source: 'graphql' | 'rest')
    async function loadSpeciesList() {
      // (1) 접두사 없는 GraphQL
      try {
        const data = await runGraphQL(GQL_PLAIN);
        const rows = data && data.pokemonspecies;
        if (rows && rows.length) {
          return { list: rows.map((r) => normalizeSpeciesRow(r, false)), source: 'graphql' };
        }
      } catch (e) { /* 접두사 버전으로 폴백 */ }

      // (2) 접두사 있는 GraphQL
      try {
        const data = await runGraphQL(GQL_PREFIXED);
        const rows = data && data.pokemon_v2_pokemonspecies;
        if (rows && rows.length) {
          return { list: rows.map((r) => normalizeSpeciesRow(r, true)), source: 'graphql' };
        }
      } catch (e) { /* REST 폴백 */ }

      // (3) REST 폴백: id, 영문명만 확보. 한글명/타입은 2단계 lazy 로 보완.
      const res = await fetch(`${POKE_API}/pokemon-species?limit=${SPECIES_FALLBACK_LIMIT}`);
      if (!res.ok) throw new Error(`species 목록 HTTP ${res.status}`);
      const json = await res.json();
      const list = (json.results || []).map((r) => {
        const m = r.url.match(/\/(\d+)\/?$/);  // url 끝의 id 추출
        const id = m ? Number(m[1]) : null;
        return {
          id,
          nameKo: capitalize(r.name),  // 폴백에선 한글명 미확보 -> 영문 표기
          nameEn: capitalize(r.name),
          types: [],                   // 타입 미확보 -> 상세 열면 채워짐
          image: id ? ARTWORK_URL(id) : null,
        };
      }).filter((p) => p.id != null);
      list.sort((a, b) => a.id - b.id);
      return { list, source: 'rest' };
    }

    // ----------------------------------------
    // [2단계] 상세 lazy 로드 (모달 열 때만) + 메모리 캐시
    // ----------------------------------------
    const detailCache = new Map(); // id -> 상세 객체

    async function fetchDetail(id) {
      if (detailCache.has(id)) return detailCache.get(id);

      const [pRes, sRes] = await Promise.all([
        fetch(`${POKE_API}/pokemon/${id}`),
        fetch(`${POKE_API}/pokemon-species/${id}`),
      ]);
      if (!pRes.ok || !sRes.ok) throw new Error(`#${id} 상세 응답 오류`);
      const p = await pRes.json();
      const s = await sRes.json();

      const koName = (s.names.find((n) => n.language.name === 'ko') || {}).name || null;
      const koFlavor =
        (s.flavor_text_entries.find((f) => f.language.name === 'ko') ||
         s.flavor_text_entries.find((f) => f.language.name === 'en') || {}).flavor_text;

      const statMap = {};
      p.stats.forEach((st) => {
        const key = {
          hp: 'hp', attack: 'atk', defense: 'def',
          'special-attack': 'spa', 'special-defense': 'spd', speed: 'spe',
        }[st.stat.name];
        if (key) statMap[key] = st.base_stat;
      });

      const types = p.types
        .slice()
        .sort((a, b) => a.slot - b.slot)
        .map((t) => toTypeKo(t.type.name));

      const detail = {
        nameKo: koName,           // 폴백 목록에서 한글명을 못 받았으면 여기서 보강
        height: p.height / 10,    // 데시미터 -> m
        weight: p.weight / 10,    // 헥토그램 -> kg
        desc: cleanFlavor(koFlavor) || '설명 정보가 없습니다.',
        stats: statMap,
        types,
      };
      detailCache.set(id, detail);
      return detail;
    }

    const STAT_META = [
      { key: 'hp',  label: 'HP' },
      { key: 'atk', label: '공격' },
      { key: 'def', label: '방어' },
      { key: 'spa', label: '특공' },
      { key: 'spd', label: '특방' },
      { key: 'spe', label: '스피드' },
    ];
    const STAT_MAX = 150; // 막대그래프 정규화 기준 (최대 종족값 ~130 고려)

    const pad3 = (n) => String(n).padStart(3, '0');

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // 타입 뱃지 (순수 표현 컴포넌트)
    function TypeBadge({ type, className = '' }) {
      const theme = getTheme(type);
      return (
        <span
          className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-bold shadow-sm ${theme.badge} ${className}`}
        >
          <span aria-hidden="true">{theme.emoji}</span>
          {type}
        </span>
      );
    }

    // 아트워크 이미지 (이미지 누락/로드 실패 시 회색 박스 + 이모지 플레이스홀더)
    function PokemonImage({ pokemon, className = '', imgClassName = '' }) {
      const [errored, setErrored] = useState(false);
      const theme = getPrimaryTheme(pokemon);

      // image 가 없거나(API 누락) 로드에 실패하면 플레이스홀더
      if (errored || !pokemon.image) {
        return (
          <div
            className={`flex items-center justify-center bg-slate-200 text-slate-400 ${className}`}
            role="img"
            aria-label={`${pokemon.nameKo} 이미지 없음`}
          >
            <span className="text-4xl" aria-hidden="true">{theme.emoji}</span>
          </div>
        );
      }
      return (
        <img
          src={pokemon.image}
          alt={`${pokemon.nameKo} (${pokemon.nameEn}) 공식 아트워크`}
          loading="lazy"
          onError={() => setErrored(true)}
          className={`${className} ${imgClassName}`}
        />
      );
    }

    // 필터 칩 버튼
    function FilterChip({ active, onClick, children, theme }) {
      const base = 'px-4 py-1.5 rounded-full text-sm font-semibold transition-all duration-150 border';
      const activeCls = theme
        ? `${theme.badge} border-transparent shadow-md scale-105`
        : 'bg-slate-800 text-white border-transparent shadow-md scale-105';
      const idleCls = 'bg-white text-slate-600 border-slate-200 hover:border-slate-400 hover:shadow';
      return (
        <button
          type="button"
          onClick={onClick}
          aria-pressed={active}
          className={`${base} ${active ? activeCls : idleCls}`}
        >
          {children}
        </button>
      );
    }

    // 검색 입력창 (돋보기 아이콘 + 지우기 버튼)
    function SearchBar({ value, onChange, onClear }) {
      return (
        <div className="relative">
          {/* 돋보기 아이콘 */}
          <span
            className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"
            aria-hidden="true"
          >
            🔍
          </span>
          <input
            type="text"
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder="포켓몬 이름 검색 (예: 피카츄, pikachu)"
            aria-label="포켓몬 이름 검색"
            className="w-full rounded-2xl border border-slate-200 bg-white pl-11 pr-11 py-3 text-sm font-medium
                       text-slate-700 shadow-sm placeholder:text-slate-400
                       focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-transparent transition"
          />
          {/* 지우기(×) 버튼: 입력값이 있을 때만 표시 */}
          {value && (
            <button
              type="button"
              onClick={onClear}
              aria-label="검색어 지우기"
              className="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full
                         bg-slate-100 hover:bg-slate-200 text-slate-500 font-bold
                         flex items-center justify-center transition"
            >
              ✕
            </button>
          )}
        </div>
      );
    }

    // 종족값 가로 막대 한 줄
    function StatBar({ label, value }) {
      const pct = Math.min(100, Math.round((value / STAT_MAX) * 100));
      // 값에 따라 색을 달리해 가독성 향상
      const color =
        value >= 100 ? 'bg-emerald-500' :
        value >= 70  ? 'bg-lime-500' :
        value >= 50  ? 'bg-amber-400' :
                       'bg-rose-400';
      return (
        <div className="flex items-center gap-3">
          <span className="w-12 shrink-0 text-xs font-semibold text-slate-500 text-right">{label}</span>
          <span className="w-9 shrink-0 text-sm font-bold text-slate-700 tabular-nums">{value}</span>
          <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden">
            <div
              className={`stat-bar animate-barGrow h-full rounded-full ${color}`}
              style={{ width: `${pct}%` }}
              role="progressbar"
              aria-valuenow={value}
              aria-valuemin={0}
              aria-valuemax={STAT_MAX}
              aria-label={`${label} ${value}`}
            />
          </div>
        </div>
      );
    }

    // 모달 (isOpen / onClose / children)
    function Modal({ isOpen, onClose, children }) {
      // ESC 로 닫기 + 열렸을 때 스크롤 잠금
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => {
          document.removeEventListener('keydown', onKey);
          document.body.style.overflow = prev;
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;
      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
          onClick={onClose}
          role="dialog"
          aria-modal="true"
        >
          <div
            className="animate-modalPop w-full max-w-lg max-h-[90vh] overflow-y-auto bg-white rounded-3xl shadow-2xl"
            onClick={(e) => e.stopPropagation()}
          >
            {children}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Common / Layout Components
    // ========================================
    function Header({ count, total }) {
      return (
        <header className="bg-gradient-to-r from-rose-500 via-red-500 to-orange-500 text-white shadow-lg">
          <div className="max-w-6xl mx-auto px-4 py-6 flex items-center justify-between gap-4">
            <div className="flex items-center gap-3">
              <div className="w-11 h-11 rounded-full bg-white flex items-center justify-center shadow-inner border-4 border-slate-800 relative">
                <div className="absolute inset-x-0 top-1/2 h-1 bg-slate-800 -translate-y-1/2"></div>
                <div className="w-3 h-3 rounded-full bg-white border-[3px] border-slate-800 z-10"></div>
              </div>
              <div>
                <h1 className="text-2xl sm:text-3xl font-black tracking-tight leading-none">포켓몬 도감</h1>
                <p className="text-sm font-medium text-white/80">Pokébook</p>
              </div>
            </div>
            <div className="text-right">
              <span className="inline-block bg-white/20 rounded-full px-4 py-1.5 text-sm font-bold backdrop-blur tabular-nums">
                전국도감 {count}{total ? ` / ${total}` : ''}마리
              </span>
            </div>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="text-center text-xs text-slate-400 py-8">
          하버스쿨 week_3 퀘스트 · 포켓몬 도감 / Pokébook · 전국도감 전체 · 데이터·이미지 출처 PokeAPI (GraphQL + REST lazy 연동)
        </footer>
      );
    }

    // 로딩 화면: 회전 포켓볼 + 전체 목록 로드 안내 (전국도감 일괄 로드는 단일 요청)
    function LoadingView() {
      return (
        <div className="flex-1 flex flex-col items-center justify-center px-4 py-24 text-center">
          {/* 회전하는 포켓볼 */}
          <div className="w-16 h-16 rounded-full bg-white border-4 border-slate-800 relative animate-spin shadow-lg">
            <div className="absolute inset-x-0 top-1/2 h-1.5 bg-slate-800 -translate-y-1/2"></div>
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-5 h-5 rounded-full bg-white border-4 border-slate-800 z-10"></div>
            <div className="absolute top-0 left-0 w-1/2 h-1/2 rounded-tl-full bg-rose-500/90"></div>
          </div>
          <p className="mt-6 text-lg font-black text-slate-700">전국도감을 불러오는 중...</p>
          <p className="mt-1 text-sm font-medium text-slate-400">전체 포켓몬 목록을 한 번에 받아오고 있어요</p>
          {/* 불확정 진행 바 (스트라이프 애니메이션) */}
          <div className="mt-4 w-64 max-w-full h-2.5 bg-slate-200 rounded-full overflow-hidden">
            <div className="h-full w-1/3 bg-gradient-to-r from-rose-500 to-orange-500 rounded-full animate-loadingSlide" />
          </div>
        </div>
      );
    }

    // 에러 화면: 메시지 + 다시 시도 버튼
    function ErrorView({ message, onRetry }) {
      return (
        <div className="flex-1 flex flex-col items-center justify-center px-4 py-24 text-center animate-floatUp">
          <div className="text-6xl mb-4" aria-hidden="true">⚠️</div>
          <p className="text-lg font-bold text-slate-700">불러오기에 실패했어요</p>
          <p className="mt-1 text-sm text-slate-400 max-w-md">{message}</p>
          <button
            type="button"
            onClick={onRetry}
            className="mt-6 inline-flex items-center gap-1.5 rounded-full bg-slate-800 text-white
                       px-6 py-2.5 text-sm font-bold shadow hover:bg-slate-700 transition"
          >
            🔄 다시 시도
          </button>
        </div>
      );
    }

    // ========================================
    // 📄 카드 컴포넌트 (앞면)
    // ========================================
    function PokemonCard({ pokemon, onClick }) {
      const theme = getPrimaryTheme(pokemon);
      return (
        <button
          type="button"
          onClick={onClick}
          className={`group text-left bg-gradient-to-br ${theme.soft} rounded-3xl p-4 shadow-md ring-1 ring-slate-200
                      hover:shadow-2xl hover:-translate-y-1.5 hover:ring-2 ${theme.ring}
                      transition-all duration-200 focus:outline-none focus:ring-2 ${theme.ring}`}
          aria-label={`${pokemon.nameKo} 상세 보기`}
        >
          <div className="flex items-center justify-between mb-1">
            <span className="text-sm font-black text-slate-400 tabular-nums">#{pad3(pokemon.id)}</span>
          </div>
          <div className="aspect-square flex items-center justify-center">
            <PokemonImage
              pokemon={pokemon}
              className="w-full h-full rounded-2xl"
              imgClassName="object-contain drop-shadow-md group-hover:scale-110 transition-transform duration-200"
            />
          </div>
          <div className="mt-2 text-center">
            <h3 className="text-lg font-extrabold text-slate-800 leading-tight">{pokemon.nameKo}</h3>
            <p className="text-xs font-medium text-slate-400">{pokemon.nameEn}</p>
          </div>
          <div className="mt-2 flex flex-wrap justify-center gap-1.5">
            {pokemon.types.map((t) => (
              <TypeBadge key={t} type={t} />
            ))}
          </div>
        </button>
      );
    }

    // 상세 본문 스켈레톤 (lazy 로딩 중 표시)
    function DetailSkeleton() {
      return (
        <div className="p-6 space-y-5" aria-hidden="true">
          <div className="h-20 rounded-2xl bg-slate-100 animate-skel" />
          <div className="grid grid-cols-2 gap-3">
            <div className="h-20 rounded-2xl bg-slate-100 animate-skel" />
            <div className="h-20 rounded-2xl bg-slate-100 animate-skel" />
          </div>
          <div className="space-y-2.5">
            <div className="h-4 w-20 rounded bg-slate-100 animate-skel" />
            {STAT_META.map((s) => (
              <div key={s.key} className="h-3 rounded-full bg-slate-100 animate-skel" />
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 상세 모달 내용
    // ========================================
    // pokemon: 1단계 목록 데이터(번호/이미지/이름/타입)
    // detail:  2단계 lazy 로 받은 상세 (키/몸무게/종족값/설명) — 없으면 로딩/에러 처리
    function PokemonDetail({ pokemon, detail, detailStatus, onRetry, onClose }) {
      // 헤더 타입은 목록 타입을 우선, 없으면(REST 폴백) 상세 타입으로 보강
      const headerTypes =
        (pokemon.types && pokemon.types.length ? pokemon.types : (detail && detail.types)) || [];
      const theme = getTheme(headerTypes[0]);
      // 한글명: 목록값 우선, 폴백 목록이면 상세에서 한글명 보강
      const displayNameKo = (detail && detail.nameKo) || pokemon.nameKo;

      return (
        <div>
          {/* 상단 비주얼 영역 (목록 데이터로 즉시 렌더) */}
          <div className={`relative bg-gradient-to-br ${theme.soft} rounded-t-3xl p-6 pb-4`}>
            <button
              type="button"
              onClick={onClose}
              aria-label="닫기"
              className="absolute top-4 right-4 w-9 h-9 rounded-full bg-white/70 hover:bg-white text-slate-600 font-bold shadow flex items-center justify-center transition"
            >
              ✕
            </button>
            <div className="flex items-center justify-between">
              <span className="text-base font-black text-slate-400 tabular-nums">#{pad3(pokemon.id)}</span>
            </div>
            <div className="flex justify-center my-2">
              <PokemonImage
                pokemon={{ ...pokemon, types: headerTypes.length ? headerTypes : ['노말'] }}
                className="w-44 h-44 rounded-2xl"
                imgClassName="object-contain drop-shadow-xl"
              />
            </div>
            <div className="text-center">
              <h2 className="text-2xl font-black text-slate-800">{displayNameKo}</h2>
              <p className="text-sm font-medium text-slate-400">{pokemon.nameEn}</p>
              <div className="mt-2 flex flex-wrap justify-center gap-1.5">
                {headerTypes.map((t) => (
                  <TypeBadge key={t} type={t} />
                ))}
              </div>
            </div>
          </div>

          {/* 본문: 상세 lazy 로딩 상태에 따라 분기 */}
          {detailStatus === 'loading' && <DetailSkeleton />}

          {detailStatus === 'error' && (
            <div className="p-6 text-center">
              <p className="text-sm font-bold text-slate-600">상세 정보를 불러오지 못했어요</p>
              <button
                type="button"
                onClick={onRetry}
                className="mt-4 inline-flex items-center gap-1.5 rounded-full bg-slate-800 text-white
                           px-5 py-2 text-sm font-bold shadow hover:bg-slate-700 transition"
              >
                🔄 다시 시도
              </button>
            </div>
          )}

          {detailStatus === 'ready' && detail && (
            <div className="p-6 space-y-5">
              {/* 한 줄 설명 */}
              <p className="text-sm text-slate-600 leading-relaxed bg-slate-50 rounded-2xl p-4 border border-slate-100">
                {detail.desc}
              </p>

              {/* 키 / 몸무게 */}
              <div className="grid grid-cols-2 gap-3">
                <div className="rounded-2xl bg-slate-50 border border-slate-100 p-4 text-center">
                  <p className="text-xs font-semibold text-slate-400 mb-1">키</p>
                  <p className="text-xl font-black text-slate-800">{detail.height} m</p>
                </div>
                <div className="rounded-2xl bg-slate-50 border border-slate-100 p-4 text-center">
                  <p className="text-xs font-semibold text-slate-400 mb-1">몸무게</p>
                  <p className="text-xl font-black text-slate-800">{detail.weight} kg</p>
                </div>
              </div>

              {/* 종족값 막대그래프 */}
              <div>
                <h3 className="text-sm font-bold text-slate-700 mb-3">종족값</h3>
                <div className="space-y-2.5">
                  {STAT_META.map((s) => (
                    <StatBar key={s.key} label={s.label} value={detail.stats[s.key] || 0} />
                  ))}
                </div>
                <div className="mt-3 text-right text-xs font-semibold text-slate-400">
                  총합 {Object.values(detail.stats).reduce((a, b) => a + b, 0)}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [selected, setSelected] = useState(null);   // 모달에 표시 중인 목록 항목
      const [filter, setFilter] = useState('전체');
      const [query, setQuery] = useState('');

      // 1단계 목록 데이터 상태
      const [pokemons, setPokemons] = useState([]);
      const [source, setSource] = useState('graphql');  // 'graphql' | 'rest'
      const [status, setStatus] = useState('loading');  // 'loading' | 'ready' | 'error'
      const [errorMsg, setErrorMsg] = useState('');

      // 점진 렌더링(페이징) 상태: 현재 보여줄 카드 수
      const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);

      // 2단계 상세 lazy 로딩 상태
      const [detail, setDetail] = useState(null);
      const [detailStatus, setDetailStatus] = useState('idle'); // 'idle' | 'loading' | 'ready' | 'error'

      // [1단계] 전체 목록 로딩 (재시도 시에도 재사용)
      const load = useCallback(async () => {
        setStatus('loading');
        setErrorMsg('');
        try {
          const { list, source } = await loadSpeciesList();
          if (!list || list.length === 0) throw new Error('데이터를 한 마리도 받지 못했어요.');
          setPokemons(list);
          setSource(source);
          setStatus('ready');
        } catch (e) {
          setErrorMsg(
            (e && e.message ? e.message + ' ' : '') +
            '네트워크 상태를 확인한 뒤 다시 시도해 주세요.'
          );
          setStatus('error');
        }
      }, []);

      // 최초 진입 시 1회 로딩
      useEffect(() => { load(); }, [load]);

      // 데이터에 존재하는 모든 타입(중복 제거, 등장 순서 유지)
      // REST 폴백이면 목록에 타입이 없어 칩이 비는데, 그땐 18종 전체를 노출한다.
      const allTypes = useMemo(() => {
        const set = [];
        pokemons.forEach((p) => p.types.forEach((t) => { if (!set.includes(t)) set.push(t); }));
        if (set.length === 0) return Object.keys(TYPE_THEME); // REST 폴백 대비
        return set;
      }, [pokemons]);

      // 필터 적용: 타입 + 검색어 AND 조건 (전체 집합 기준)
      const filtered = useMemo(() => {
        const q = query.trim().toLowerCase();
        return pokemons.filter((p) => {
          const typeOk = filter === '전체' || (p.types && p.types.includes(filter));
          const searchOk =
            q === '' ||
            (p.nameKo && p.nameKo.toLowerCase().includes(q)) ||
            (p.nameEn && p.nameEn.toLowerCase().includes(q));
          return typeOk && searchOk;
        });
      }, [pokemons, filter, query]);

      // 검색/필터가 바뀌면 페이징을 처음(PAGE_SIZE)으로 리셋
      useEffect(() => { setVisibleCount(PAGE_SIZE); }, [query, filter]);

      // 실제 화면에 렌더링할 카드(점진 렌더링)
      const visible = useMemo(
        () => filtered.slice(0, visibleCount),
        [filtered, visibleCount]
      );
      const hasMore = visibleCount < filtered.length;

      const closeModal = useCallback(() => {
        setSelected(null);
        setDetail(null);
        setDetailStatus('idle');
      }, []);
      const clearSearch = useCallback(() => setQuery(''), []);

      // [2단계] 모달 열린 포켓몬의 상세를 lazy 로 받아온다 (캐시 활용)
      const loadDetail = useCallback(async (id) => {
        setDetailStatus('loading');
        setDetail(null);
        try {
          const d = await fetchDetail(id);
          setDetail(d);
          setDetailStatus('ready');
        } catch (e) {
          setDetailStatus('error');
        }
      }, []);

      // 카드를 클릭해 모달을 열면 해당 id 상세 로딩 시작
      const openPokemon = useCallback((p) => {
        setSelected(p);
        loadDetail(p.id);
      }, [loadDetail]);

      // 로딩 / 에러 상태는 헤더 + 전용 화면만 보여준다
      if (status === 'loading') {
        return (
          <div className="min-h-screen flex flex-col">
            <Header count={0} total={null} />
            <LoadingView />
            <Footer />
          </div>
        );
      }
      if (status === 'error') {
        return (
          <div className="min-h-screen flex flex-col">
            <Header count={0} total={null} />
            <ErrorView message={errorMsg} onRetry={load} />
            <Footer />
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col">
          <Header count={pokemons.length} total={null} />

          <main className="flex-1 max-w-6xl w-full mx-auto px-4 py-6">
            {/* REST 폴백 안내 (한글명/타입이 일부 제한될 때) */}
            {source === 'rest' && (
              <div className="mb-4 rounded-2xl bg-amber-50 border border-amber-200 px-4 py-3 text-sm text-amber-700">
                ⚠️ GraphQL 연결에 실패해 기본 목록(영문명) 으로 표시 중이에요. 상세를 열면 한글 정보가 채워집니다.
              </div>
            )}

            {/* 검색 입력창 */}
            <div className="mb-4">
              <SearchBar value={query} onChange={setQuery} onClear={clearSearch} />
            </div>

            {/* 타입 필터 칩 */}
            <div className="flex flex-wrap gap-2 mb-4">
              <FilterChip active={filter === '전체'} onClick={() => setFilter('전체')}>
                전체
              </FilterChip>
              {allTypes.map((t) => (
                <FilterChip
                  key={t}
                  active={filter === t}
                  theme={getTheme(t)}
                  onClick={() => setFilter(t)}
                >
                  {getTheme(t).emoji} {t}
                </FilterChip>
              ))}
            </div>

            {/* 결과 카운트: 전체 N마리 중 M마리 (그중 현재 렌더 K마리) */}
            <p className="mb-5 text-sm font-semibold text-slate-500">
              전체 {pokemons.length}마리 중{' '}
              <span className="text-rose-500 font-black tabular-nums">{filtered.length}</span>마리
              {hasMore && (
                <span className="text-slate-400"> · 현재 {visible.length}마리 표시</span>
              )}
            </p>

            {/* 카드 그리드: 모바일 2열 → 데스크탑 최대 5열 */}
            {filtered.length === 0 ? (
              <div className="text-center py-20 animate-floatUp">
                <div className="text-6xl mb-4" aria-hidden="true">🔴</div>
                <p className="text-lg font-bold text-slate-600">검색 결과가 없어요</p>
                <p className="mt-1 text-sm text-slate-400">
                  {query.trim()
                    ? `"${query.trim()}" 에 해당하는 포켓몬을 찾지 못했어요.`
                    : '해당 타입의 포켓몬이 없어요.'}
                </p>
                <button
                  type="button"
                  onClick={() => { setQuery(''); setFilter('전체'); }}
                  className="mt-5 inline-flex items-center gap-1.5 rounded-full bg-slate-800 text-white
                             px-5 py-2 text-sm font-bold shadow hover:bg-slate-700 transition"
                >
                  🔄 검색 초기화
                </button>
              </div>
            ) : (
              <React.Fragment>
                <div className="animate-floatUp grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                  {visible.map((p) => (
                    <PokemonCard key={p.id} pokemon={p} onClick={() => openPokemon(p)} />
                  ))}
                </div>

                {/* 더 보기 버튼: 남은 카드가 있을 때만 */}
                {hasMore && (
                  <div className="mt-8 flex justify-center">
                    <button
                      type="button"
                      onClick={() => setVisibleCount((c) => c + PAGE_SIZE)}
                      className="inline-flex items-center gap-2 rounded-full bg-gradient-to-r from-rose-500 to-orange-500
                                 text-white px-8 py-3 text-sm font-black shadow-lg hover:shadow-xl hover:-translate-y-0.5
                                 transition focus:outline-none focus:ring-2 focus:ring-rose-300"
                    >
                      더 보기
                      <span className="bg-white/25 rounded-full px-2 py-0.5 text-xs tabular-nums">
                        +{Math.min(PAGE_SIZE, filtered.length - visible.length)}
                      </span>
                    </button>
                  </div>
                )}
              </React.Fragment>
            )}
          </main>

          <Footer />

          {/* 상세 모달 (상세는 lazy 로딩) */}
          <Modal isOpen={!!selected} onClose={closeModal}>
            {selected && (
              <PokemonDetail
                pokemon={selected}
                detail={detail}
                detailStatus={detailStatus}
                onRetry={() => loadDetail(selected.id)}
                onClose={closeModal}
              />
            )}
          </Modal>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
