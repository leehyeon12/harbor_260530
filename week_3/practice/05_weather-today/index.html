<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 날씨</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ 모든 CDN 버전 고정. @babel/standalone 미고정 시 8.x 로 올라가 text/babel 변환이 깨진다. Babel 은 반드시 7.x. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    /* 가로 스크롤 영역 스크롤바 숨김 (Tailwind 로 표현 불가한 부분만 커스텀) */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* 떠다니는 듯한 부드러운 애니메이션 */
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .animate-floaty { animation: floaty 4s ease-in-out infinite; }
    /* 스켈레톤 깜빡임 */
    @keyframes pulseSoft {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
    .animate-pulse-soft { animation: pulseSoft 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo, useEffect, useCallback } = React;

    // ========================================
    // 🔑 API 설정
    // ⚠️ 제출 시 노출 주의 — 이 키는 공개 저장소에 올라가므로 제출 후 OpenWeatherMap 에서 재발급 권장.
    // ========================================
    const API_KEY = '1d5926b624ef458b103acdefc47d5cbc';
    const API_BASE = 'https://api.openweathermap.org/data/2.5';
    // 위치 권한 거부/실패 시 폴백 도시 (서울)
    const FALLBACK = { lat: 37.5665, lon: 126.9780 };

    // ========================================
    // 🎨 날씨 컨디션 → 아이콘 / 배경 / 라벨 매핑
    // condition 키: clear(맑음) / cloudy(흐림) / rain(비) / snow(눈)
    // ========================================
    const ICONS = {
      clear: '☀️',
      cloudy: '☁️',
      rain: '🌧️',
      snow: '❄️',
    };

    const GRADIENTS = {
      clear: 'from-sky-400 via-blue-500 to-indigo-600',
      cloudy: 'from-slate-400 via-slate-500 to-slate-700',
      rain: 'from-slate-600 via-slate-700 to-blue-900',
      snow: 'from-sky-200 via-blue-300 to-indigo-400',
    };

    const COND_TEXT = {
      clear: '맑음',
      cloudy: '흐림',
      rain: '비',
      snow: '눈',
    };

    // OpenWeatherMap 의 weather[0].main → 내부 condition 키로 변환
    // (Clear / Clouds / Rain / Drizzle / Thunderstorm / Snow / Mist 등)
    function mapCondition(main) {
      switch (main) {
        case 'Clear':
          return 'clear';
        case 'Clouds':
          return 'cloudy';
        case 'Rain':
        case 'Drizzle':
        case 'Thunderstorm':
          return 'rain';
        case 'Snow':
          return 'snow';
        // Mist / Smoke / Haze / Fog / Dust 등 대기 현상은 흐림으로 처리
        default:
          return 'cloudy';
      }
    }

    function Icon({ cond, className = '' }) {
      return <span className={className} role="img" aria-label={COND_TEXT[cond]}>{ICONS[cond]}</span>;
    }

    // ========================================
    // 🛠️ 유틸 — 시간/날짜 포맷
    // ========================================
    // OWM 의 UTC unix(초) + timezone(초) 오프셋을 적용해 현지 시각 텍스트를 만든다.
    function formatLocalTime(unixSec, tzOffsetSec) {
      const d = new Date((unixSec + tzOffsetSec) * 1000);
      const hh = String(d.getUTCHours()).padStart(2, '0');
      const mm = String(d.getUTCMinutes()).padStart(2, '0');
      return `${hh}:${mm}`;
    }

    // 현지 시각 기준 시(hour) 라벨 (예: "15시")
    function localHourLabel(unixSec, tzOffsetSec) {
      const d = new Date((unixSec + tzOffsetSec) * 1000);
      return `${d.getUTCHours()}시`;
    }

    // 현지 기준 요일/날짜 키
    const WEEKDAY = ['일', '월', '화', '수', '목', '금', '토'];
    function localDateInfo(unixSec, tzOffsetSec) {
      const d = new Date((unixSec + tzOffsetSec) * 1000);
      const dateKey = `${d.getUTCFullYear()}-${d.getUTCMonth() + 1}-${d.getUTCDate()}`;
      return { dateKey, weekday: WEEKDAY[d.getUTCDay()] };
    }

    // ========================================
    // 🔄 API 호출 + 응답 가공
    // ========================================
    async function fetchWeather(lat, lon) {
      const common = `lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=kr`;
      const [curRes, fcRes] = await Promise.all([
        fetch(`${API_BASE}/weather?${common}`),
        fetch(`${API_BASE}/forecast?${common}`),
      ]);
      if (!curRes.ok || !fcRes.ok) {
        throw new Error(`날씨 정보를 불러오지 못했습니다 (HTTP ${curRes.status}/${fcRes.status})`);
      }
      const cur = await curRes.json();
      const fc = await fcRes.json();
      return { current: parseCurrent(cur), hourly: parseHourly(fc), weekly: parseWeekly(fc) };
    }

    // 현재 날씨 파싱
    function parseCurrent(cur) {
      const tz = cur.timezone || 0;
      const w = cur.weather && cur.weather[0] ? cur.weather[0] : { main: 'Clouds', description: '흐림' };
      return {
        city: cur.name || '현재 위치',
        // 행정구역 상세는 무료 weather 엔드포인트에서 제공하지 않음 → 국가코드로 대체
        district: cur.sys && cur.sys.country ? cur.sys.country : '',
        condition: mapCondition(w.main),
        conditionText: w.description || COND_TEXT[mapCondition(w.main)],
        temp: Math.round(cur.main.temp),
        feelsLike: Math.round(cur.main.feels_like),
        tempMax: Math.round(cur.main.temp_max),
        tempMin: Math.round(cur.main.temp_min),
        humidity: cur.main.humidity,
        windSpeed: Math.round(cur.wind.speed * 10) / 10,
        // 현재 시점 강수확률은 weather 엔드포인트에 없음 → 예보 첫 항목에서 보강 (App 에서 처리)
        rainChance: null,
        sunrise: cur.sys && cur.sys.sunrise ? formatLocalTime(cur.sys.sunrise, tz) : '-',
        sunset: cur.sys && cur.sys.sunset ? formatLocalTime(cur.sys.sunset, tz) : '-',
        // 무료 2.5 엔드포인트 미제공 항목
        uv: '-',
        airQuality: '-',
      };
    }

    // 시간별 예보 (3시간 간격, 앞쪽 8개 ≈ 24시간)
    function parseHourly(fc) {
      const tz = fc.city && fc.city.timezone ? fc.city.timezone : 0;
      return fc.list.slice(0, 8).map((item, i) => ({
        time: i === 0 ? '지금' : localHourLabel(item.dt, tz),
        cond: mapCondition(item.weather[0].main),
        temp: Math.round(item.main.temp),
        rain: Math.round((item.pop || 0) * 100),
      }));
    }

    // 주간 예보 (같은 날짜끼리 묶어 min/max 집계, 대표 컨디션은 정오에 가까운 항목)
    function parseWeekly(fc) {
      const tz = fc.city && fc.city.timezone ? fc.city.timezone : 0;
      const groups = {};
      const order = [];
      fc.list.forEach((item) => {
        const { dateKey, weekday } = localDateInfo(item.dt, tz);
        if (!groups[dateKey]) {
          groups[dateKey] = { weekday, min: Infinity, max: -Infinity, maxPop: 0, noonItem: null, noonDiff: Infinity };
          order.push(dateKey);
        }
        const g = groups[dateKey];
        g.min = Math.min(g.min, item.main.temp_min);
        g.max = Math.max(g.max, item.main.temp_max);
        g.maxPop = Math.max(g.maxPop, item.pop || 0);
        // 정오(12시)에 가장 가까운 항목을 그날 대표 컨디션으로
        const hour = new Date((item.dt + tz) * 1000).getUTCHours();
        const diff = Math.abs(hour - 12);
        if (diff < g.noonDiff) {
          g.noonDiff = diff;
          g.noonItem = item;
        }
      });

      return order.slice(0, 7).map((key, i) => {
        const g = groups[key];
        return {
          day: i === 0 ? '오늘' : g.weekday,
          cond: mapCondition(g.noonItem.weather[0].main),
          max: Math.round(g.max),
          min: Math.round(g.min),
          rain: Math.round(g.maxPop * 100),
        };
      });
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트
    // ========================================

    // 반투명 유리 카드
    function GlassCard({ children, className = '' }) {
      return (
        <div className={`bg-white/15 backdrop-blur-md rounded-2xl border border-white/20 shadow-lg ${className}`}>
          {children}
        </div>
      );
    }

    // 부가 정보 카드 (체감/습도/풍속/강수확률 등)
    function InfoCard({ icon, label, value, unit }) {
      return (
        <GlassCard className="p-4 flex flex-col gap-1">
          <div className="flex items-center gap-1.5 text-white/70 text-xs sm:text-sm">
            <span aria-hidden="true">{icon}</span>
            <span>{label}</span>
          </div>
          <div className="text-white font-semibold text-lg sm:text-xl">
            {value}
            {unit && <span className="text-sm font-normal text-white/70 ml-0.5">{unit}</span>}
          </div>
        </GlassCard>
      );
    }

    // ========================================
    // 🧩 화면 섹션 컴포넌트
    // ========================================

    // 상단: 위치 + 날짜
    function LocationHeader({ city, district, dateText }) {
      return (
        <header className="text-center text-white pt-4">
          <div className="flex items-center justify-center gap-1.5 text-lg sm:text-xl font-semibold">
            <span aria-hidden="true">📍</span>
            <span>{city}{district ? ` · ${district}` : ''}</span>
          </div>
          <p className="text-white/70 text-sm mt-1">{dateText}</p>
        </header>
      );
    }

    // 메인: 큰 기온 + 상태 + 아이콘
    function CurrentWeather({ data }) {
      return (
        <section className="text-center text-white py-6">
          <Icon cond={data.condition} className="text-7xl sm:text-8xl inline-block animate-floaty" />
          <div className="mt-2 flex items-start justify-center">
            <span className="text-7xl sm:text-8xl font-extralight leading-none">{data.temp}</span>
            <span className="text-3xl sm:text-4xl font-light mt-2">°</span>
          </div>
          <p className="text-xl sm:text-2xl font-medium mt-1 capitalize">{data.conditionText}</p>
          <p className="text-white/80 text-sm sm:text-base mt-1">
            최고 {data.tempMax}° · 최저 {data.tempMin}° · 체감 {data.feelsLike}°
          </p>
        </section>
      );
    }

    // 부가 정보 그리드
    function DetailGrid({ data }) {
      const items = [
        { icon: '🌡️', label: '체감온도', value: data.feelsLike, unit: '°' },
        { icon: '💧', label: '습도', value: data.humidity, unit: '%' },
        { icon: '🌬️', label: '풍속', value: data.windSpeed, unit: 'm/s' },
        { icon: '☔', label: '강수확률', value: data.rainChance == null ? '-' : data.rainChance, unit: data.rainChance == null ? '' : '%' },
        { icon: '🔆', label: '자외선', value: data.uv, unit: '' },
        { icon: '😷', label: '미세먼지', value: data.airQuality, unit: '' },
        { icon: '🌅', label: '일출', value: data.sunrise, unit: '' },
        { icon: '🌇', label: '일몰', value: data.sunset, unit: '' },
      ];
      return (
        <section className="grid grid-cols-2 sm:grid-cols-4 gap-3">
          {items.map((it) => (
            <InfoCard key={it.label} {...it} />
          ))}
        </section>
      );
    }

    // 시간별 예보 (가로 스크롤)
    function HourlyForecast({ list }) {
      // 주간 막대 정규화에 쓸 전체 범위
      return (
        <GlassCard className="p-4">
          <h2 className="text-white/80 text-sm font-medium mb-3 flex items-center gap-1.5">
            <span aria-hidden="true">🕒</span> 시간별 예보 <span className="text-white/40 text-xs">(3시간 간격)</span>
          </h2>
          <div className="flex gap-3 overflow-x-auto no-scrollbar pb-1">
            {list.map((h, i) => (
              <div
                key={i}
                className="flex-shrink-0 w-16 flex flex-col items-center gap-1.5 text-white"
              >
                <span className="text-xs text-white/70">{h.time}</span>
                <Icon cond={h.cond} className="text-2xl" />
                <span className="text-base font-semibold">{h.temp}°</span>
                <span className="text-[11px] text-sky-200 flex items-center gap-0.5">
                  <span aria-hidden="true">💧</span>{h.rain}%
                </span>
              </div>
            ))}
          </div>
        </GlassCard>
      );
    }

    // 주간 예보 막대 (최저~최고 기온을 시각화)
    function TempBar({ min, max, weekMin, weekMax }) {
      const total = weekMax - weekMin || 1;
      const left = ((min - weekMin) / total) * 100;
      const width = ((max - min) / total) * 100;
      return (
        <div className="relative h-1.5 rounded-full bg-white/20 w-full">
          <div
            className="absolute h-1.5 rounded-full bg-gradient-to-r from-sky-300 to-amber-300"
            style={{ left: `${left}%`, width: `${Math.max(width, 6)}%` }}
          />
        </div>
      );
    }

    // 주간 예보 리스트
    function WeeklyForecast({ list }) {
      const weekMin = Math.min(...list.map((d) => d.min));
      const weekMax = Math.max(...list.map((d) => d.max));
      return (
        <GlassCard className="p-4">
          <h2 className="text-white/80 text-sm font-medium mb-3 flex items-center gap-1.5">
            <span aria-hidden="true">📅</span> 주간 예보
          </h2>
          <ul className="flex flex-col gap-2.5">
            {list.map((d, i) => (
              <li key={i} className="flex items-center gap-3 text-white">
                <span className="w-10 text-sm font-medium">{d.day}</span>
                <span className="text-[11px] text-sky-200 w-9 flex items-center gap-0.5">
                  <span aria-hidden="true">💧</span>{d.rain}%
                </span>
                <Icon cond={d.cond} className="text-xl w-6 text-center" />
                <span className="text-sm text-white/60 w-8 text-right">{d.min}°</span>
                <div className="flex-1"><TempBar min={d.min} max={d.max} weekMin={weekMin} weekMax={weekMax} /></div>
                <span className="text-sm font-semibold w-8">{d.max}°</span>
              </li>
            ))}
          </ul>
        </GlassCard>
      );
    }

    // ========================================
    // ⏳ 로딩 / ❗ 에러 상태 컴포넌트
    // ========================================
    function LoadingScreen() {
      return (
        <div className="min-h-screen bg-gradient-to-b from-sky-400 via-blue-500 to-indigo-600 flex items-center justify-center">
          <div className="max-w-md w-full mx-auto px-4 flex flex-col items-center gap-5 text-white">
            {/* 스피너 */}
            <div className="w-12 h-12 border-4 border-white/30 border-t-white rounded-full animate-spin" role="status" aria-label="불러오는 중"></div>
            <p className="text-white/80 text-sm">현재 위치의 날씨를 불러오는 중…</p>
            {/* 스켈레톤 카드 */}
            <div className="w-full grid grid-cols-2 sm:grid-cols-4 gap-3 mt-2">
              {Array.from({ length: 4 }).map((_, i) => (
                <div key={i} className="h-20 rounded-2xl bg-white/15 animate-pulse-soft" />
              ))}
            </div>
          </div>
        </div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <div className="min-h-screen bg-gradient-to-b from-slate-600 via-slate-700 to-blue-900 flex items-center justify-center px-4">
          <GlassCard className="p-8 max-w-sm w-full text-center text-white flex flex-col items-center gap-4">
            <span className="text-5xl" aria-hidden="true">⚠️</span>
            <div>
              <h2 className="text-lg font-semibold mb-1">날씨를 불러오지 못했어요</h2>
              <p className="text-white/70 text-sm">{message}</p>
            </div>
            <button
              onClick={onRetry}
              className="mt-2 px-5 py-2.5 rounded-xl bg-white/20 hover:bg-white/30 active:scale-95 transition border border-white/30 font-medium"
            >
              🔄 다시 시도
            </button>
          </GlassCard>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [weather, setWeather] = useState(null); // { current, hourly, weekly }
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [now, setNow] = useState(() => new Date()); // 현재 시각(30초마다 갱신)

      // "지금" 표시를 위해 30초마다 현재 시각 갱신
      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 30000);
        return () => clearInterval(id);
      }, []);

      // 위치 확보 → 날씨 로드. 위치 거부/실패 시 서울로 폴백.
      const load = useCallback(() => {
        setLoading(true);
        setError(null);

        const run = async (lat, lon) => {
          try {
            const result = await fetchWeather(lat, lon);
            // 현재 강수확률은 예보 첫 항목 pop 으로 보강
            if (result.hourly && result.hourly.length > 0) {
              result.current.rainChance = result.hourly[0].rain;
            }
            setWeather(result);
          } catch (e) {
            setError(e.message || '알 수 없는 오류가 발생했습니다.');
          } finally {
            setLoading(false);
          }
        };

        if (!navigator.geolocation) {
          // Geolocation 미지원 → 폴백
          run(FALLBACK.lat, FALLBACK.lon);
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => run(pos.coords.latitude, pos.coords.longitude),
          () => run(FALLBACK.lat, FALLBACK.lon), // 권한 거부/실패 → 서울 폴백
          { timeout: 8000, maximumAge: 600000 }
        );
      }, []);

      useEffect(() => {
        load();
      }, [load]);

      // 오늘 날짜 텍스트 — 사용자 OS 시간대와 무관하게 항상 한국시간(KST = UTC+9) 기준
      const dateText = useMemo(() => {
        // 로컬 시각 → UTC → KST(+9h) 보정
        const kst = new Date(now.getTime() + (now.getTimezoneOffset() + 540) * 60000);
        return `${kst.getFullYear()}년 ${kst.getMonth() + 1}월 ${kst.getDate()}일 (${WEEKDAY[kst.getDay()]}) ${String(kst.getHours()).padStart(2, '0')}:${String(kst.getMinutes()).padStart(2, '0')} (KST) 기준`;
      }, [now]);

      if (loading) return <LoadingScreen />;
      if (error) return <ErrorScreen message={error} onRetry={load} />;
      if (!weather) return <ErrorScreen message="데이터가 없습니다." onRetry={load} />;

      const { current, hourly, weekly } = weather;
      const gradient = GRADIENTS[current.condition] || GRADIENTS.clear;

      return (
        <div className={`min-h-screen bg-gradient-to-b ${gradient} transition-colors duration-700`}>
          <main className="max-w-md mx-auto px-4 pb-8 flex flex-col gap-5">
            <LocationHeader city={current.city} district={current.district} dateText={dateText} />
            <CurrentWeather data={current} />
            <DetailGrid data={current} />
            <HourlyForecast list={hourly} />
            <WeeklyForecast list={weekly} />
            <footer className="text-center text-white/50 text-xs pt-2 leading-relaxed">
              OpenWeatherMap 실시간 데이터 · 자외선/미세먼지는 무료 플랜 미제공(-)
            </footer>
          </main>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
