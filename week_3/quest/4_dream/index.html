<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌙 꿈해몽 — 신비로운 점술가</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ CDN 버전 전부 고정. Babel은 반드시 7.x (8.x로 올라가면 text/babel 변환이 깨진다) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    /* ✨ 별이 반짝이는 효과 — Tailwind animate-pulse로도 가능하지만
       속도/딜레이를 제각각 주려고 커스텀 keyframes를 쓴다 */
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
    .twinkle { animation: twinkle 3s ease-in-out infinite; }

    /* 🔮 결과 카드가 부드럽게 떠오르는 등장 애니메이션 */
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rise { animation: rise 0.6s ease-out; }

    /* 🌙 로딩 달이 천천히 회전 + 맥동 */
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-8px) rotate(8deg); }
    }
    .float { animation: float 2.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React

    // ============================================================
    // 🌐 백엔드 API 계약
    // 프론트는 외부 AI API를 직접 부르지 않고, 오직 내 서버의 /api/dream만 호출한다.
    //   요청 : POST /api/dream  { dream: "꿈 내용" }
    //   성공 : { summary, keywords[], fortune("길몽"|"흉몽"|"반길몽"), advice, luck(0~100) }
    //   실패 : { error: "메시지" }  (HTTP 200이 아닐 수 있음 → res.ok로 분기)
    // ============================================================
    const DREAM_URL = '/api/dream'

    // ============================================================
    // ✨ 배경 별 — 점술 분위기를 위한 장식 (랜덤 위치/크기/딜레이)
    // 컴포넌트 밖에서 한 번만 생성해 리렌더마다 위치가 안 바뀌게 한다.
    // ============================================================
    const STARS = Array.from({ length: 40 }, () => ({
      top: Math.random() * 100,
      left: Math.random() * 100,
      size: Math.random() * 2 + 1,
      delay: Math.random() * 3,
    }))

    function StarField() {
      return (
        <div className="pointer-events-none fixed inset-0 overflow-hidden">
          {STARS.map((s, i) => (
            <span
              key={i}
              className="twinkle absolute rounded-full bg-white"
              style={{
                top: `${s.top}%`,
                left: `${s.left}%`,
                width: `${s.size}px`,
                height: `${s.size}px`,
                animationDelay: `${s.delay}s`,
              }}
            />
          ))}
        </div>
      )
    }

    // ============================================================
    // 🏷️ 길몽/흉몽 배지 — fortune 값에 따라 색을 분기
    // (3_coin의 badgeStyle 색상 분기 패턴을 그대로 차용)
    //   길몽   = 초록 계열
    //   흉몽   = 빨강 계열
    //   반길몽 = 노랑/회색 계열
    // ============================================================
    function FortuneBadge({ fortune }) {
      const map = {
        '길몽':   { cls: 'bg-emerald-500/20 text-emerald-300 border-emerald-400/40', icon: '🍀' },
        '흉몽':   { cls: 'bg-rose-500/20 text-rose-300 border-rose-400/40',          icon: '🌑' },
        '반길몽': { cls: 'bg-amber-500/20 text-amber-200 border-amber-400/40',       icon: '🌗' },
      }
      // 계약 외 값이 와도 깨지지 않도록 회색 폴백
      const style = map[fortune] || { cls: 'bg-slate-500/20 text-slate-300 border-slate-400/40', icon: '🔮' }
      return (
        <span className={`inline-flex items-center gap-1.5 text-base font-bold px-4 py-1.5 rounded-full border ${style.cls}`}>
          <span>{style.icon}</span>{fortune}
        </span>
      )
    }

    // ============================================================
    // 🍀 행운지수 게이지 — 0~100 숫자 + 진행바
    // luck 값에 따라 게이지 색을 부드럽게 바꿔준다.
    // ============================================================
    function LuckGauge({ luck }) {
      // 0~100 범위로 안전하게 클램프
      const value = Math.max(0, Math.min(100, Math.round(luck)))
      // 낮으면 보라, 보통이면 인디고, 높으면 밝은 청록 — 신비로운 톤 유지
      const barColor =
        value >= 70 ? 'from-cyan-400 to-emerald-400'
        : value >= 40 ? 'from-indigo-400 to-purple-400'
        : 'from-purple-500 to-fuchsia-500'

      return (
        <div>
          <div className="flex items-end justify-between mb-2">
            <span className="text-sm text-purple-200/80">🍀 오늘의 행운지수</span>
            <span className="text-2xl font-extrabold text-white">{value}<span className="text-sm font-normal text-purple-200/60 ml-0.5">/100</span></span>
          </div>
          <div className="w-full h-3 rounded-full bg-white/10 overflow-hidden">
            <div
              className={`h-full rounded-full bg-gradient-to-r ${barColor} transition-all duration-700`}
              style={{ width: `${value}%` }}
            />
          </div>
        </div>
      )
    }

    // ============================================================
    // 🔮 결과 카드 — 캡처해서 공유하고 싶은 핵심 화면
    //   ① 한 줄 요약(summary)  ② 상징 키워드(keywords)
    //   ③ 길몽/흉몽(fortune)   ④ 오늘의 조언(advice)
    //   ⑤ 행운지수(luck)
    // ============================================================
    function ResultCard({ result, onReset }) {
      return (
        <div className="rise relative rounded-3xl border border-purple-300/20 bg-white/5 backdrop-blur-md shadow-2xl shadow-purple-900/40 p-7 sm:p-9">
          {/* 카드 상단 점술 소품 */}
          <div className="text-center mb-6">
            <div className="text-3xl mb-2">🔮</div>
            <p className="text-xs tracking-[0.3em] text-purple-300/70 uppercase">Dream Oracle</p>
          </div>

          {/* ✨ 개인화 해몽(personal) — 생년월일을 입력했을 때만, 빈 문자열이면 렌더링 안 함 */}
          {result.personal && result.personal.trim() && (
            <div className="flex justify-center mb-5">
              <span className="inline-flex items-center gap-1.5 text-sm px-4 py-1.5 rounded-full bg-fuchsia-400/15 text-fuchsia-100 border border-fuchsia-300/30 shadow-inner">
                <span>✨</span>{result.personal}
              </span>
            </div>
          )}

          {/* ① 한 줄 요약 — 가장 크게 강조 */}
          <p className="text-center text-2xl sm:text-3xl font-bold leading-snug text-white mb-7">
            “{result.summary}”
          </p>

          {/* ③ 길몽/흉몽 배지 (요약 바로 아래 가운데) */}
          <div className="flex justify-center mb-7">
            <FortuneBadge fortune={result.fortune} />
          </div>

          {/* ② 상징 키워드 — 칩 형태 */}
          <div className="mb-7">
            <p className="text-sm text-purple-200/70 mb-2">✨ 상징 키워드</p>
            <div className="flex flex-wrap gap-2">
              {result.keywords && result.keywords.length > 0 ? (
                result.keywords.map((k, i) => (
                  <span
                    key={i}
                    className="text-sm px-3 py-1 rounded-full bg-purple-400/15 text-purple-100 border border-purple-300/20"
                  >
                    #{k}
                  </span>
                ))
              ) : (
                <span className="text-sm text-purple-200/40">키워드 없음</span>
              )}
            </div>
          </div>

          {/* ④ 오늘의 조언 */}
          <div className="mb-7 rounded-2xl bg-indigo-500/10 border border-indigo-300/20 p-4">
            <p className="text-sm text-indigo-200/70 mb-1">🌟 오늘의 조언</p>
            <p className="text-base leading-relaxed text-indigo-50">{result.advice}</p>
          </div>

          {/* ⑤ 행운지수 게이지 */}
          <div className="mb-7">
            <LuckGauge luck={result.luck} />
          </div>

          {/* 다시 보기 버튼 */}
          <div className="text-center">
            <button
              onClick={onReset}
              className="text-sm px-5 py-2 rounded-full bg-white/10 hover:bg-white/20 text-purple-100 border border-purple-300/20 transition-colors"
            >
              🌙 다른 꿈 해몽하기
            </button>
          </div>

          <p className="text-center text-[11px] text-purple-300/40 mt-5">
            화면을 캡처해 친구에게 공유해 보세요 ✨
          </p>
        </div>
      )
    }

    // ============================================================
    // 🚀 App
    // ============================================================
    function App() {
      const [dream, setDream]     = useState('')    // 입력한 꿈 내용
      const [birth, setBirth]     = useState('')    // 생년월일 "YYYY-MM-DD" (선택값 — 없어도 됨)
      const [result, setResult]   = useState(null)  // 해몽 결과 (성공 시 객체)
      const [loading, setLoading] = useState(false) // 점괘 보는 중 여부
      const [error, setError]     = useState(null)  // 에러 메시지

      // 입력이 비어있으면 버튼 비활성
      const canSubmit = dream.trim().length > 0 && !loading

      // 🔮 해몽 요청 — 3_coin의 try/catch/finally 비동기 패턴을 그대로 따른다
      async function interpretDream() {
        if (!canSubmit) return
        setLoading(true)
        setError(null)
        setResult(null)
        try {
          const res = await fetch(DREAM_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            // birth는 선택값 — 비어있어도 그대로 보내고 서버가 알아서 처리한다
            body: JSON.stringify({ dream: dream.trim(), birth }),
          })
          // HTTP 200이 아닐 수 있다 → res.ok로 분기, 본문의 error 메시지 사용
          const data = await res.json().catch(() => ({}))
          if (!res.ok) {
            throw new Error(data.error || '점괘를 받아오지 못했습니다.')
          }
          setResult(data)
        } catch (e) {
          setError(e.message || '알 수 없는 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.')
        } finally {
          setLoading(false)
        }
      }

      // 결과/에러를 지우고 다시 입력 화면으로
      function reset() {
        setResult(null)
        setError(null)
      }

      return (
        // 🌌 밤하늘 그라데이션 배경 (보라 ~ 남색) — 다크 무드 고정
        <div className="relative min-h-screen bg-gradient-to-b from-[#1a0b2e] via-[#16213e] to-[#0b1026] text-white overflow-hidden">
          <StarField />

          <main className="relative max-w-xl mx-auto px-4 py-10 sm:py-14">
            {/* 상단: 타이틀 + 안내 문구 */}
            <header className="text-center mb-8">
              <div className="text-5xl mb-3 float inline-block">🌙</div>
              <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight">
                꿈해몽 <span className="text-purple-300">— 신비로운 점술가</span>
              </h1>
              <p className="mt-3 text-sm sm:text-base text-purple-200/70">
                어젯밤 꾼 꿈을 들려주세요. 별과 달의 기운으로 그 의미를 풀어드립니다. 🔮
              </p>
            </header>

            {/* 입력 영역 — 결과/로딩이 아닐 때만 보여서 화면이 깔끔하게 전환된다 */}
            {!result && (
              <div className="rounded-3xl border border-purple-300/20 bg-white/5 backdrop-blur-md p-6 shadow-xl shadow-purple-900/30 mb-6">
                <label className="block text-sm text-purple-200/80 mb-2">
                  ✍️ 어젯밤 꿈 이야기
                </label>
                <textarea
                  value={dream}
                  onChange={(e) => setDream(e.target.value)}
                  disabled={loading}
                  rows={5}
                  placeholder="예) 높은 산을 오르다가 갑자기 하늘을 나는 꿈을 꿨어요..."
                  className="w-full resize-none rounded-2xl border border-purple-300/20 bg-[#0b1026]/60 px-4 py-3 text-base text-white placeholder-purple-300/40 focus:outline-none focus:ring-2 focus:ring-purple-400/60 disabled:opacity-50"
                  aria-label="꿈 내용 입력"
                />

                {/* 🎂 생년월일 (선택) — 입력하면 개인화 해몽(personal)을 받는다 */}
                <label className="block text-sm text-purple-200/80 mt-4 mb-2">
                  🎂 생년월일 <span className="text-purple-300/50">(선택)</span>
                </label>
                <input
                  type="date"
                  value={birth}
                  onChange={(e) => setBirth(e.target.value)}
                  disabled={loading}
                  className="w-full rounded-2xl border border-purple-300/20 bg-[#0b1026]/60 px-4 py-3 text-base text-white placeholder-purple-300/40 focus:outline-none focus:ring-2 focus:ring-purple-400/60 disabled:opacity-50 [color-scheme:dark]"
                  aria-label="생년월일 입력 (선택)"
                />
                <p className="mt-1.5 text-xs text-purple-300/40">
                  생년월일을 넣으면 사주 기운을 더한 개인화 해몽을 받아볼 수 있어요. ✨
                </p>

                <button
                  onClick={interpretDream}
                  disabled={!canSubmit}
                  className="mt-4 w-full py-3 rounded-2xl font-bold text-base bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-400 hover:to-indigo-400 shadow-lg shadow-purple-900/40 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                >
                  {loading ? '점괘를 보는 중…' : '🔮 해몽하기'}
                </button>

                {/* 입력이 비어있을 때 안내 */}
                {!loading && dream.trim().length === 0 && (
                  <p className="mt-3 text-center text-xs text-purple-300/50">
                    꿈 내용을 입력하면 해몽을 시작할 수 있어요.
                  </p>
                )}
              </div>
            )}

            {/* 상태별 화면 분기: 로딩 / 에러 / 결과 */}
            {loading ? (
              // 🌙 로딩 — 몽환적인 달 애니메이션 + 문구
              <div className="flex flex-col items-center justify-center text-purple-200/80 py-12 gap-4">
                <div className="text-5xl float">🌙</div>
                <span className="tracking-widest text-sm animate-pulse">점괘를 보는 중…</span>
                <span className="text-xs text-purple-300/40">별들이 답을 속삭이고 있어요 ✨</span>
              </div>
            ) : error ? (
              // ⚠️ 에러 — 친절한 메시지 카드
              <div className="rise rounded-3xl border border-rose-400/30 bg-rose-500/10 backdrop-blur-md p-6 text-center">
                <div className="text-3xl mb-2">🌫️</div>
                <p className="text-rose-200 font-semibold mb-1">점괘를 읽지 못했어요</p>
                <p className="text-sm text-rose-200/70 mb-4">{error}</p>
                <button
                  onClick={() => setError(null)}
                  className="text-sm px-5 py-2 rounded-full bg-white/10 hover:bg-white/20 text-rose-100 border border-rose-300/20 transition-colors"
                >
                  다시 시도하기
                </button>
              </div>
            ) : result ? (
              // 🔮 결과 카드
              <ResultCard result={result} onReset={reset} />
            ) : null}

            <footer className="text-center text-purple-300/40 text-xs mt-10">
              🔮 AI 꿈해몽 · 재미로 보는 점술 콘텐츠입니다
            </footer>
          </main>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
