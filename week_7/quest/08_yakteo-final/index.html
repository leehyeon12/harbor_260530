<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신규 개원 의원 지도 (2026)</title>

  <!-- ⚠️ 모든 CDN은 버전을 명시적으로 고정한다. (미고정 시 메이저 버전이 올라가 깨질 수 있음) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <!-- proj4: TM 중부원점(EPSG:5174) → WGS84 위경도 변환용 -->
  <script src="https://cdn.jsdelivr.net/npm/proj4@2.11.0/dist/proj4.js"></script>
  <!-- Supabase Auth (카카오 로그인) — DB 쿼리는 서버(/api/favorites)가 담당, 클라는 Auth만 사용 -->

  <style>
    /* 지도가 화면을 꽉 채우도록 */
    html, body, #root { height: 100%; margin: 0; }

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React 훅 구조분해
    // ========================================
    const { useState, useEffect, useRef, useMemo, useCallback } = React

    // ========================================
    // 상수 / 설정
    // ========================================
    // ↓↓↓ 여기에만 카카오 JavaScript 키를 입력하면 됩니다 ↓↓↓
    const KAKAO_JS_KEY = '3f6bba84a45e001f7856864131a1a31a' // ← 카카오 JavaScript 키 (도메인 제한으로 보호됨)

    // 📡 공공데이터 호출은 이제 server.js 프록시(/api/clinics)가 담당한다.
    //    serviceKey·페이지네이션은 서버 뒤(.env)에 있고 클라이언트에는 노출되지 않는다.

    // 서울 시청 근처(지도 초기 중심)
    const SEOUL_CENTER = { lat: 37.5665, lng: 126.9780 }

    // EPSG:5174 (한국 TM 중부원점, bessel) 정의
    const EPSG5174 =
      '+proj=tmerc +lat_0=38 +lon_0=127.0028902777778 +k=1 +x_0=200000 +y_0=500000 ' +
      '+ellps=bessel +towgs84=-115.8,474.99,674.11,1.16,-2.31,-1.63,6.43 +units=m +no_defs'

    // proj4에 좌표계 등록
    proj4.defs('EPSG:5174', EPSG5174)

    // TM(x,y) → WGS84 위경도 변환. 반환: { lat, lng } 또는 null
    function tmToWgs84(x, y) {
      if (x == null || y == null) return null
      try {
        const [lng, lat] = proj4('EPSG:5174', 'EPSG:4326', [x, y])
        if (!isFinite(lat) || !isFinite(lng)) return null
        return { lat, lng }
      } catch (e) {
        return null
      }
    }

    // 약국 입지 관점에서 처방이 많은(중요한) 진료과 빠른 필터 칩
    const QUICK_SUBJECTS = ['내과', '소아청소년과', '이비인후과', '정형외과', '피부과', '정신건강의학과', '안과', '가정의학과']

    // ========================================
    // 💊 진료과목별 처방 가중치 (색상 분류)
    // ========================================
    // 약국 매출은 처방전 수에 비례 → 진료과로 처방 기대도를 3단계로 분류한다.
    // 한 의원이 여러 과를 가지면 "가장 높은 가중치"를 그 의원 등급으로 사용(고>중>저).
    // - dot/badge : Tailwind 색 클래스(리스트·범례용)
    // - marker    : 카카오 핀 마커 색(키 있을 때)
    // - bucket    : 등급 필터에서 묶이는 버킷(미분류 etc 는 중처방 버킷으로 합류)
    const RX_GRADES = {
      high: { key: 'high', bucket: 'high', weight: 3, label: '고처방',
              dot: 'bg-red-500',    badge: 'bg-red-100 text-red-700 border border-red-200',       marker: '#ef4444' },
      mid:  { key: 'mid',  bucket: 'mid',  weight: 2, label: '중처방',
              dot: 'bg-amber-500',  badge: 'bg-amber-100 text-amber-700 border border-amber-200', marker: '#f59e0b' },
      low:  { key: 'low',  bucket: 'low',  weight: 1, label: '저처방',
              dot: 'bg-slate-400',  badge: 'bg-slate-100 text-slate-600 border border-slate-200', marker: '#94a3b8' },
      // 미분류: 가중치는 중처방과 동일(2)하게 두되, 회색 톤으로 구분 표시
      etc:  { key: 'etc',  bucket: 'mid',  weight: 2, label: '미분류',
              dot: 'bg-gray-400',   badge: 'bg-gray-100 text-gray-500 border border-gray-200',    marker: '#9ca3af' },
    }

    // 등급 판정 키워드 (진료과 토큰 문자열에 포함되는지로 판정)
    const RX_KEYWORDS = {
      high: ['내과', '소아청소년과', '소아과', '이비인후과', '가정의학과', '정신건강의학과', '신경과'],
      mid:  ['정형외과', '안과', '비뇨의학과', '비뇨기과', '외과', '신경외과', '재활의학과', '산부인과'],
      low:  ['성형외과', '피부과', '마취통증의학과', '영상의학과', '진단검사'],
    }

    // 단일 진료과 토큰 → 등급 키('high'|'mid'|'low'|null)
    // ⚠️ "성형외과"는 중처방 키워드 "외과"도 부분 포함하므로,
    //    가장 긴(구체적인) 키워드가 이기도록 해서 오분류를 막는다.
    function gradeOfSpecialty(token) {
      let best = null // { grade, len }
      ;['high', 'mid', 'low'].forEach((grade) => {
        RX_KEYWORDS[grade].forEach((kw) => {
          if (token.includes(kw) && (!best || kw.length > best.len)) {
            best = { grade, len: kw.length }
          }
        })
      })
      return best ? best.grade : null
    }

    // subject 전체 문자열 → 의원 등급 키('high'|'mid'|'low'|'etc')
    // 콤마/슬래시/가운뎃점/공백으로 과를 나눠 각각 판정 후 가장 높은 가중치 채택.
    function getRxGrade(subject) {
      const tokens = String(subject || '').split(/[,/·]|\s+/).map((t) => t.trim()).filter(Boolean)
      let best = null     // 등급 키
      let matched = false
      tokens.forEach((t) => {
        const g = gradeOfSpecialty(t)
        if (g) {
          matched = true
          if (!best || RX_GRADES[g].weight > RX_GRADES[best].weight) best = g
        }
      })
      return matched ? best : 'etc' // 어떤 키워드도 안 걸리면 미분류(중처방·회색)
    }

    // ========================================
    // ⭐ 즐겨찾기 저장소 (어댑터로 분리)
    // ========================================
    // React 쪽은 이 인터페이스(list/add/remove/has — 전부 동기)에만 의존한다.
    // 구현체: 서버(/api/favorites → Supabase Postgres) + 메모리 캐시.
    //  - 로그인 시 syncFromServer()로 캐시를 채우고, 이후 has/list 는 캐시에서 동기 응답
    //    (지도 오버레이 등 비-React 코드가 동기로 호출하기 때문)
    //  - add/remove 는 캐시 즉시 반영(optimistic) 후 서버에 비동기 반영
    //  - 비로그인: 캐시 비움 — 즐겨찾기는 로그인 사용자만 (localStorage 마이그레이션 없음 · DEV.md 확정)
    const favoritesStore = {
      _cache: [],
      _token: null,
      setAuth(token) {
        this._token = token || null
        if (!this._token) this._cache = []
      },
      _headers(json) {
        const h = { Authorization: 'Bearer ' + this._token }
        if (json) h['Content-Type'] = 'application/json'
        return h
      },
      // 서버 → 캐시 동기화 (로그인/새로고침 시 1회)
      async syncFromServer() {
        if (!this._token) { this._cache = []; return this._cache }
        try {
          const r = await fetch('/api/favorites', { headers: this._headers() })
          if (r.ok) {
            const data = await r.json()
            this._cache = Array.isArray(data.items) ? data.items : []
          }
        } catch (e) { console.warn('즐겨찾기 동기화 실패:', e.message) }
        return this._cache
      },
      // 즐겨찾기 객체 배열 반환 — {id,name,addr,subject,openDate,tel,lat,lng,score,scoreDetail}
      list() { return this._cache },
      has(id) { return this._cache.some((f) => f.id === id) },
      add(item) {
        if (!this._token) return this._cache
        if (!this._cache.some((f) => f.id === item.id)) {
          // 저장 시점 스냅샷 — 임장 점수는 조회 시점 데이터라 나중에 재계산하면 달라진다 (DEV.md 확정)
          const snap = {
            id: item.id, name: item.name, addr: item.addr,
            subject: item.subject, openDate: item.openDate, tel: item.tel,
            lat: item.lat != null ? item.lat : null,
            lng: item.lng != null ? item.lng : null,
            score: item.score != null ? item.score : null,
            scoreDetail: item.sP != null ? { sP: item.sP, sG: item.sG, sD: item.sD, sB: item.sB } : null,
          }
          this._cache = [...this._cache, snap] // optimistic
          fetch('/api/favorites', { method: 'POST', headers: this._headers(true), body: JSON.stringify(snap) })
            .catch((e) => console.warn('즐겨찾기 저장 실패:', e.message))
        }
        return this._cache
      },
      remove(id) {
        if (!this._token) return this._cache
        this._cache = this._cache.filter((f) => f.id !== id)
        fetch('/api/favorites?id=' + encodeURIComponent(id), { method: 'DELETE', headers: this._headers() })
          .catch((e) => console.warn('즐겨찾기 삭제 실패:', e.message))
        return this._cache
      },
    }

    // ========================================
    // 🗺️ 전국 17개 시/도 + 시군구 (도로명주소 표기 기준)
    //  - sido: 도로명주소가 시작하는 풀네임 (예: 서울특별시, 경기도)
    //  - gu  : 표준 행정구역 시군구 목록
    //  - 세종특별자치시는 단층(시군구 없음) → gu 빈 배열
    // ========================================
    const REGIONS = [
      { sido: '서울특별시', gu: ['종로구', '중구', '용산구', '성동구', '광진구', '동대문구', '중랑구', '성북구', '강북구', '도봉구', '노원구', '은평구', '서대문구', '마포구', '양천구', '강서구', '구로구', '금천구', '영등포구', '동작구', '관악구', '서초구', '강남구', '송파구', '강동구'] },
      { sido: '부산광역시', gu: ['중구', '서구', '동구', '영도구', '부산진구', '동래구', '남구', '북구', '해운대구', '사하구', '금정구', '강서구', '연제구', '수영구', '사상구', '기장군'] },
      { sido: '대구광역시', gu: ['중구', '동구', '서구', '남구', '북구', '수성구', '달서구', '달성군', '군위군'] },
      { sido: '인천광역시', gu: ['중구', '동구', '미추홀구', '연수구', '남동구', '부평구', '계양구', '서구', '강화군', '옹진군'] },
      { sido: '광주광역시', gu: ['동구', '서구', '남구', '북구', '광산구'] },
      { sido: '대전광역시', gu: ['동구', '중구', '서구', '유성구', '대덕구'] },
      { sido: '울산광역시', gu: ['중구', '남구', '동구', '북구', '울주군'] },
      { sido: '세종특별자치시', gu: [] },
      { sido: '경기도', gu: ['수원시', '성남시', '의정부시', '안양시', '부천시', '광명시', '평택시', '동두천시', '안산시', '고양시', '과천시', '구리시', '남양주시', '오산시', '시흥시', '군포시', '의왕시', '하남시', '용인시', '파주시', '이천시', '안성시', '김포시', '화성시', '광주시', '양주시', '포천시', '여주시', '연천군', '가평군', '양평군'] },
      { sido: '강원특별자치도', gu: ['춘천시', '원주시', '강릉시', '동해시', '태백시', '속초시', '삼척시', '홍천군', '횡성군', '영월군', '평창군', '정선군', '철원군', '화천군', '양구군', '인제군', '고성군', '양양군'] },
      { sido: '충청북도', gu: ['청주시', '충주시', '제천시', '보은군', '옥천군', '영동군', '증평군', '진천군', '괴산군', '음성군', '단양군'] },
      { sido: '충청남도', gu: ['천안시', '공주시', '보령시', '아산시', '서산시', '논산시', '계룡시', '당진시', '금산군', '부여군', '서천군', '청양군', '홍성군', '예산군', '태안군'] },
      { sido: '전북특별자치도', gu: ['전주시', '군산시', '익산시', '정읍시', '남원시', '김제시', '완주군', '진안군', '무주군', '장수군', '임실군', '순창군', '고창군', '부안군'] },
      { sido: '전라남도', gu: ['목포시', '여수시', '순천시', '나주시', '광양시', '담양군', '곡성군', '구례군', '고흥군', '보성군', '화순군', '장흥군', '강진군', '해남군', '영암군', '무안군', '함평군', '영광군', '장성군', '완도군', '진도군', '신안군'] },
      { sido: '경상북도', gu: ['포항시', '경주시', '김천시', '안동시', '구미시', '영주시', '영천시', '상주시', '문경시', '경산시', '의성군', '청송군', '영양군', '영덕군', '청도군', '고령군', '성주군', '칠곡군', '예천군', '봉화군', '울진군', '울릉군'] },
      { sido: '경상남도', gu: ['창원시', '진주시', '통영시', '사천시', '김해시', '밀양시', '거제시', '양산시', '의령군', '함안군', '창녕군', '고성군', '남해군', '하동군', '산청군', '함양군', '거창군', '합천군'] },
      { sido: '제주특별자치도', gu: ['제주시', '서귀포시'] },
    ]

    // ========================================
    // 📡 데이터 호출 — server.js 프록시(/api/clinics)
    // ========================================
    // serviceKey·고정조건·페이지네이션은 모두 서버가 처리한다.
    // 서버 응답: { items: [...원본 item 배열...], totalCount: N }
    // (원본 필드 BPLC_NM/ROAD_NM_ADDR/MDEXM_SBJCT_CN_NM/... 를 그대로 유지하므로
    //  아래 mapClinics 매핑 로직은 변경 없이 그대로 동작한다.)
    async function fetchAllClinics(regionLike, sinceMonths, signal) {
      const res = await fetch(
        '/api/clinics?region=' + encodeURIComponent(regionLike) + '&since=' + encodeURIComponent(sinceMonths),
        { signal }
      )
      if (!res.ok) {
        // 서버가 내려준 에러 메시지(JSON.error)를 우선 사용
        let msg = 'API 요청 실패 (' + res.status + ')'
        try {
          const errJson = await res.json()
          if (errJson && errJson.error) msg = errJson.error
        } catch (e) { /* 본문이 JSON이 아니면 기본 메시지 유지 */ }
        throw new Error(msg)
      }
      const json = await res.json()
      return { total: Number(json.totalCount ?? 0), items: json.items || [] }
    }

    // API 원소 → 앱 내부 형태로 매핑 + 좌표 변환
    // 반환: { mapped: [...], noCoord: N, noCoordItems: [...] }
    // noCoordItems = 좌표(TM)가 없어 제외된 의원들(주소는 있음) → 이후 주소로 지오코딩해 복구.
    function mapClinics(items) {
      let noCoord = 0
      const mapped = []
      const noCoordItems = []
      items.forEach((o) => {
        const name = o.BPLC_NM
        const addr = o.ROAD_NM_ADDR
        const subject = o.MDEXM_SBJCT_CN_NM
        // 고유 식별자: 관리번호(MNG_NO) 우선, 없으면 병원명+주소 조합으로 폴백
        const id = (o.MNG_NO != null && o.MNG_NO !== '')
          ? String(o.MNG_NO)
          : `${name || ''}|${addr || ''}`
        const base = {
          id,
          name,
          addr,
          subject,
          openDate: o.LCPMT_YMD,
          tel: o.TELNO,
          grade: getRxGrade(subject), // 처방 가중치 등급 키('high'|'mid'|'low'|'etc')
        }
        const xs = o.CRD_INFO_X, ys = o.CRD_INFO_Y
        // 좌표(TM)가 빈 문자열/null이면 마커 제외 대상
        const x = (xs === '' || xs == null) ? null : parseFloat(xs)
        const y = (ys === '' || ys == null) ? null : parseFloat(ys)
        const wgs = (x == null || y == null || !isFinite(x) || !isFinite(y)) ? null : tmToWgs84(x, y)
        if (!wgs) { noCoord++; if (base.addr) noCoordItems.push(base); return }
        mapped.push({ ...base, lat: wgs.lat, lng: wgs.lng })
      })
      return { mapped, noCoord, noCoordItems }
    }

    // 📍 주소 1건 → WGS84 좌표(Kakao Geocoder). 실패 시 null. (kakao.maps.services 필요)
    function geocodeAddress(geocoder, addr) {
      return new Promise((resolve) => {
        if (!addr) return resolve(null)
        geocoder.addressSearch(addr, (res, status) => {
          if (status === window.kakao.maps.services.Status.OK && res && res[0]) {
            resolve({ lat: parseFloat(res[0].y), lng: parseFloat(res[0].x) })
          } else resolve(null)
        })
      })
    }

    // 📍 좌표없음 의원들을 주소로 지오코딩해 좌표 부여(동시 4개 제한). 복구분에 approx:true 표시.
    // kakao SDK(services 포함)가 ready 된 뒤 호출되어야 한다.
    async function geocodeClinics(items) {
      const kakao = window.kakao
      if (!kakao || !kakao.maps || !kakao.maps.services || !items.length) return []
      const geocoder = new kakao.maps.services.Geocoder()
      const out = []
      let i = 0
      const worker = async () => {
        while (i < items.length) {
          const c = items[i++]
          const wgs = await geocodeAddress(geocoder, c.addr)
          if (wgs) out.push({ ...c, lat: wgs.lat, lng: wgs.lng, approx: true })
        }
      }
      await Promise.all(Array.from({ length: Math.min(4, items.length) }, worker))
      return out
    }

    // 📡 약국(경쟁 레이어) 조회 — /api/pharmacies. 응답 형태는 의원과 동일.
    // 약국 활용신청 전이면 서버가 503 + needsApply 로 내려준다(에러 메시지 그대로 노출).
    async function fetchAllPharmacies(regionLike, signal) {
      const res = await fetch('/api/pharmacies?region=' + encodeURIComponent(regionLike), { signal })
      if (!res.ok) {
        let msg = '약국 API 요청 실패 (' + res.status + ')'
        try {
          const errJson = await res.json()
          if (errJson && errJson.error) msg = errJson.error
        } catch (e) { /* JSON 아니면 기본 메시지 */ }
        throw new Error(msg)
      }
      const json = await res.json()
      return { total: Number(json.totalCount ?? 0), items: json.items || [] }
    }

    // 약국 원소 → 지도 점 형태로 매핑(+ 좌표 변환). 의원보다 단순(등급·진료과 없음).
    function mapPharmacies(items) {
      let noCoord = 0
      const mapped = []
      items.forEach((o) => {
        const name = o.BPLC_NM
        const addr = o.ROAD_NM_ADDR
        const id = (o.MNG_NO != null && o.MNG_NO !== '')
          ? String(o.MNG_NO)
          : `${name || ''}|${addr || ''}`
        const xs = o.CRD_INFO_X, ys = o.CRD_INFO_Y
        const x = (xs === '' || xs == null) ? null : parseFloat(xs)
        const y = (ys === '' || ys == null) ? null : parseFloat(ys)
        const wgs = (x == null || y == null || !isFinite(x) || !isFinite(y)) ? null : tmToWgs84(x, y)
        if (!wgs) { noCoord++; return }
        mapped.push({ id, name, addr, lat: wgs.lat, lng: wgs.lng })
      })
      return { mapped, noCoord }
    }

    // 두 WGS84 좌표 간 거리(m) — Haversine
    function distMeters(aLat, aLng, bLat, bLng) {
      const R = 6371000
      const toRad = (d) => (d * Math.PI) / 180
      const dLat = toRad(bLat - aLat)
      const dLng = toRad(bLng - aLng)
      const s = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(aLat)) * Math.cos(toRad(bLat)) * Math.sin(dLng / 2) ** 2
      return 2 * R * Math.asin(Math.sqrt(s))
    }

    // ⭐ "기회 자리"(약국 공백) 의원 id 집합 — 반경 thresholdM 내 약국이 하나도 없는 신규 의원.
    //  약국 데이터가 없으면 빈 집합(경쟁 정보가 없으면 기회 판단 불가).
    function computeOpportunityIds(clinics, pharmacies, thresholdM) {
      const out = new Set()
      if (!pharmacies || pharmacies.length === 0) return out
      const latPad = thresholdM / 111000 + 0.0005 // 위도 1도≈111km — 먼 약국 빠른 스킵용
      for (const c of clinics) {
        let near = false
        for (const p of pharmacies) {
          if (Math.abs(p.lat - c.lat) > latPad) continue // 위도만으로 명백히 먼 건 스킵
          if (distMeters(c.lat, c.lng, p.lat, p.lng) <= thresholdM) { near = true; break }
        }
        if (!near) out.add(c.id)
      }
      return out
    }

    // 빈 집합(약국 로딩 중 등 기회 판정 미적용 시) — 참조가 고정돼야 불필요한 재렌더를 막는다.
    const EMPTY_IDS = new Set()

    // 의원 → 가장 가까운 약국까지 거리(m). 약국이 없으면 Infinity. (위도 1.1km 밖은 빠른 스킵)
    function nearestPharmDist(clinic, pharmacies) {
      let best = Infinity
      for (const p of pharmacies) {
        if (Math.abs(p.lat - clinic.lat) > 0.01) continue
        const d = distMeters(clinic.lat, clinic.lng, p.lat, p.lng)
        if (d < best) best = d
      }
      return best
    }

    // 도로명 주소 → 건물 단위 키(상세 동/층/호 제거). 같은 건물 = 메디컬 빌딩 판정용.
    function buildingKey(addr) {
      if (!addr) return null
      return addr.split(',')[0].trim() // "…도산대로 117, 4, 5층" → "…도산대로 117"
    }

    // 의원 목록 → 건물키별 의원 수 Map. 한 건물에 의원이 여럿이면 메디컬 빌딩.
    function computeMedicalBuildings(clinics) {
      const m = new Map()
      for (const c of clinics) {
        const k = buildingKey(c.addr)
        if (!k) continue
        m.set(k, (m.get(k) || 0) + 1)
      }
      return m
    }

    // 약국 공백 점수(0~3) — 가장 가까운 약국이 멀수록 기회. 처방약국은 "문전"이 핵심이라 거리에 민감.
    function gapScore(distM) {
      if (!isFinite(distM)) return 3   // 인근에 약국 자체가 없음 = 최고 공백
      if (distM >= 200) return 3
      if (distM >= 150) return 2
      if (distM >= 100) return 1
      if (distM >= 50) return 0.5
      return 0
    }

    // 🎯 임장 점수 = 처방수요(1~3) + 약국공백(0~3) + 의사규모(0~3) + 메디컬빌딩(0~2). 근거도 분해 반환.
    //  hasPharm=false(시/도 전체 등 약국데이터 없음)면 공백점수는 0으로 두고 처방·빌딩만 반영.
    function scoreClinic(c, distM, buildingCount, hasPharm) {
      const sP = (RX_GRADES[c.grade] || RX_GRADES.etc).weight          // 1~3
      const sG = hasPharm ? gapScore(distM) : 0                        // 0~3
      const dr = c.dr || 0
      const sD = Math.round(Math.min(dr, 10) * 0.3 * 10) / 10          // 0~3 (의사 10명+ 만점)
      const sB = buildingCount >= 2 ? Math.min((buildingCount - 1) * 0.7, 2) : 0 // 0~2
      const score = Math.round((sP + sG + sD + sB) * 10) / 10
      return { score, sP, sG, sD, sB }
    }

    // 약국 단일 페이지 조회(점진 로딩용) — { items, totalCount, totalPages }
    async function fetchPharmaciesPage(regionLike, pageNo, signal) {
      const res = await fetch(
        '/api/pharmacies?region=' + encodeURIComponent(regionLike) + '&pageNo=' + pageNo,
        { signal }
      )
      if (!res.ok) {
        let msg = '약국 API 요청 실패 (' + res.status + ')'
        try {
          const errJson = await res.json()
          if (errJson && errJson.error) msg = errJson.error
        } catch (e) { /* JSON 아니면 기본 메시지 */ }
        throw new Error(msg)
      }
      const json = await res.json()
      return {
        items: json.items || [],
        totalCount: Number(json.totalCount ?? 0),
        totalPages: Number(json.totalPages ?? 1),
      }
    }

    // 의원명 정규화(HIRA 의사수 매칭 키) — 백엔드 normClinicName과 동일 규칙(공백·괄호·'의원' 제거).
    function normClinicName(s) {
      return String(s || '').replace(/\s|의원|\(.*?\)/g, '').trim()
    }

    // HIRA 의사수 맵 조회 — { 정규화명: { drTotCnt, sdrCnt } }. 구 미선택/실패 시 {} (보강은 best-effort).
    async function fetchDoctorMap(regionLike, signal) {
      const res = await fetch('/api/clinic-doctors?region=' + encodeURIComponent(regionLike), { signal })
      if (!res.ok) return {}
      const json = await res.json()
      return json.map || {}
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 표현용)
