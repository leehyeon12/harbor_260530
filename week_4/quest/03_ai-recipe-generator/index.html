<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냉장고 재료 & AI 레시피 생성</title>

  <!-- Tailwind CSS (버전 고정) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>

  <!--
    ⚠️ 모든 CDN은 버전을 명시적으로 고정한다.
    미고정 시 @babel/standalone 이 최신(8.x)으로 올라가 type="text/babel"
    인라인 변환이 통째로 깨진다. Babel 은 반드시 7.x 로 고정.
  -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks 추출
    // ========================================
    const { useState, useEffect, useMemo } = React

    // 같은 출처(same-origin)로 서빙되므로 상대경로 사용 (localhost 하드코딩 금지)
    const API_BASE_URL = '/api'

    // 재료 카테고리 옵션 (필터 버튼 & 입력 폼 공용)
    const CATEGORIES = ['냉장', '실온', '냉동']

    // 카테고리별 배지 색상
    const CATEGORY_STYLE = {
      냉장: 'bg-sky-100 text-sky-700',
      실온: 'bg-amber-100 text-amber-700',
      냉동: 'bg-indigo-100 text-indigo-700',
    }

    // AI 레시피 스타일 옵션 (기본은 빈 값 = 스타일 지정 없음)
    // value: 서버로 보낼 값 / label: 버튼에 표시할 문구
    const RECIPE_STYLES = [
      { value: '', label: '기본' },
      { value: '간단요리', label: '간단요리' },
      { value: '다이어트', label: '다이어트' },
      { value: '야식', label: '야식' },
    ]

    // 스타일별 배지 색상 (미리보기·레시피 카드 공용)
    const STYLE_STYLE = {
      간단요리: 'bg-emerald-100 text-emerald-700',
      다이어트: 'bg-teal-100 text-teal-700',
      야식: 'bg-rose-100 text-rose-700',
    }

    // created_at 등 날짜시각을 한국어로 포맷
    const formatDateTime = (value) => {
      if (!value) return ''
      const d = new Date(value)
      if (isNaN(d.getTime())) return ''
      return d.toLocaleString('ko-KR')
    }

    // 유통기한(YYYY-MM-DD 또는 ISO) 을 yyyy.mm.dd 로 포맷
    const formatExpiry = (value) => {
      if (!value) return ''
      const d = new Date(value)
      if (isNaN(d.getTime())) return ''
      const y = d.getFullYear()
      const m = String(d.getMonth() + 1).padStart(2, '0')
      const day = String(d.getDate()).padStart(2, '0')
      return `${y}.${m}.${day}`
    }

    // 유통기한 상태 계산: 오늘 기준 남은 일수로 구분
    //  - expired: 이미 지남
    //  - soon: 오늘 포함 3일 이내
    //  - normal: 그 외
    //  - none: 유통기한 없음
    const getExpiryStatus = (value) => {
      if (!value) return 'none'
      const d = new Date(value)
      if (isNaN(d.getTime())) return 'none'
      // 시/분 영향을 없애려고 날짜만 비교
      const today = new Date()
      today.setHours(0, 0, 0, 0)
      d.setHours(0, 0, 0, 0)
      const diffDays = Math.round((d.getTime() - today.getTime()) / 86400000)
      if (diffDays < 0) return 'expired'
      if (diffDays <= 3) return 'soon'
      return 'normal'
    }

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 프레젠테이션)
    // ========================================

    // 카드 래퍼: 그림자 + 둥근 모서리
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl ${className}`}>
          {children}
        </div>
      )
    }

    // 배지: 카테고리/개수 표시 등에 사용
    function Badge({ children, className = '' }) {
      return (
        <span className={`inline-flex items-center px-3 py-1 rounded-full text-sm font-semibold ${className}`}>
          {children}
        </span>
      )
    }

    // 스피너: 로딩 인디케이터
    function Spinner() {
      return (
        <div
          className="w-8 h-8 border-4 border-slate-200 border-t-indigo-500 rounded-full animate-spin"
          role="status"
          aria-label="로딩 중"
        />
      )
    }

    // 입력창: placeholder 기반 단일 라인 (controlled)
    function Input({ value, onChange, onKeyDown, placeholder, disabled, type = 'text', className = '' }) {
      return (
        <input
          type={type}
          value={value}
          onChange={onChange}
          onKeyDown={onKeyDown}
          placeholder={placeholder}
          disabled={disabled}
          className={`min-w-0 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-700
            placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-300
            focus:border-indigo-300 transition disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        />
      )
    }

    // 셀렉트: 카테고리 선택 (controlled)
    function Select({ value, onChange, disabled, children, className = '' }) {
      return (
        <select
          value={value}
          onChange={onChange}
          disabled={disabled}
          className={`min-w-0 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-700 bg-white
            focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300 transition
            disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        >
          {children}
        </select>
      )
    }

    // 여러 줄 입력: 재료/조리법용 (controlled)
    function Textarea({ value, onChange, placeholder, disabled, rows = 3, className = '' }) {
      return (
        <textarea
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          disabled={disabled}
          rows={rows}
          className={`w-full min-w-0 px-4 py-2.5 rounded-xl border border-slate-200 text-slate-700
            placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-300
            focus:border-indigo-300 transition resize-y disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        />
      )
    }

    // 버튼: variant·disabled 지원하는 작은 프리미티브
    function Button({ children, onClick, disabled, type = 'button', className = '' }) {
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors
            disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        >
          {children}
        </button>
      )
    }

    // ========================================
    // 🧩 상태별 표시 컴포넌트
    // ========================================

    // 로딩 상태
    function LoadingState({ label }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-4 text-slate-500">
          <Spinner />
          <p className="text-sm">{label}</p>
        </div>
      )
    }

    // 에러 상태
    function ErrorState({ message, onRetry }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-4 text-center">
          <div className="text-4xl">⚠️</div>
          <p className="text-red-600 font-medium">불러오기에 실패했어요</p>
          <p className="text-sm text-slate-500 max-w-xs break-words">{message}</p>
          <button
            onClick={onRetry}
            className="mt-2 px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg text-sm font-semibold transition-colors"
          >
            다시 시도
          </button>
        </div>
      )
    }

    // 항목 없음 상태 (검색 여부에 따라 안내 문구 변경)
    function EmptyState({ searching, icon, emptyText }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 gap-3 text-slate-400">
          <div className="text-4xl">{searching ? '🔍' : icon}</div>
          <p className="text-sm">
            {searching ? '검색 결과가 없어요' : emptyText}
          </p>
        </div>
      )
    }

    // 액션 에러 배너 (추가/수정/삭제 공통, 닫기 가능)
    function ActionErrorBanner({ message, onClose }) {
      if (!message) return null
      return (
        <div
          role="alert"
          className="mt-3 flex items-center justify-between gap-3 px-3 py-2 rounded-lg
            bg-red-50 text-red-700 text-sm border border-red-100"
        >
          <span className="break-words">⚠️ {message}</span>
          <button
            onClick={onClose}
            aria-label="에러 닫기"
            className="shrink-0 text-red-400 hover:text-red-600 font-bold"
          >
            ✕
          </button>
        </div>
      )
    }

    // 액션 성공 배너 (저장 성공 등 안내, 닫기 가능)
    function ActionSuccessBanner({ message, onClose }) {
      if (!message) return null
      return (
        <div
          role="status"
          className="mt-3 flex items-center justify-between gap-3 px-3 py-2 rounded-lg
            bg-emerald-50 text-emerald-700 text-sm border border-emerald-100"
        >
          <span className="break-words">✅ {message}</span>
          <button
            onClick={onClose}
            aria-label="안내 닫기"
            className="shrink-0 text-emerald-400 hover:text-emerald-600 font-bold"
          >
            ✕
          </button>
        </div>
      )
    }

    // ========================================
    // 🖼️ 레시피 썸네일 (로드 실패 시 자체적으로 숨김)
    // ========================================
    // thumbnail_url 이 있어도 실제 이미지 로드에 실패할 수 있으므로
    // onError 시 state 로 요소를 숨긴다.
    function RecipeThumbnail({ src, alt, className = '' }) {
      const [hidden, setHidden] = useState(false)
      // src 가 바뀌면 (재생성 등) 다시 시도할 수 있게 숨김 상태 초기화
      useEffect(() => {
        setHidden(false)
      }, [src])

      if (!src || hidden) return null
      return (
        <img
          src={src}
          alt={alt || '레시피 썸네일'}
          onError={() => setHidden(true)}
          className={`w-full h-48 object-cover rounded-xl ${className}`}
        />
      )
    }

    // ========================================
    // 🍳 레시피 메타 배지 줄 (조리시간 / 난이도 / 스타일)
    // ========================================
    // 값이 있을 때만 각 배지를 렌더링한다. 미리보기 카드·레시피 카드 공용.
    function RecipeMetaBadges({ cookTime, difficulty, style, className = '' }) {
      if (!cookTime && !difficulty && !style) return null
      return (
        <div className={`flex flex-wrap gap-2 ${className}`}>
          {cookTime && (
            <Badge className="bg-slate-100 text-slate-600 !px-2.5 !py-0.5 !text-xs">
              ⏱ {cookTime}
            </Badge>
          )}
          {difficulty && (
            <Badge className="bg-violet-100 text-violet-700 !px-2.5 !py-0.5 !text-xs">
              📊 {difficulty}
            </Badge>
          )}
          {style && (
            <Badge className={`${STYLE_STYLE[style] || 'bg-slate-100 text-slate-600'} !px-2.5 !py-0.5 !text-xs`}>
              {style}
            </Badge>
          )}
        </div>
      )
    }

    // ========================================
    // 🧊 재료 카드 컴포넌트
    // ========================================
    // 보기 모드 ↔ 인라인 편집 모드를 자체 상태로 토글한다.
    function IngredientItem({ item, onSave, onDelete, busy }) {
      const [editing, setEditing] = useState(false)
      const [name, setName] = useState(item.name)
      const [quantity, setQuantity] = useState(item.quantity || '')
      const [category, setCategory] = useState(item.category || '')
      // date input 은 YYYY-MM-DD 형식만 받으므로 잘라준다
      const [expiry, setExpiry] = useState(item.expiry ? item.expiry.slice(0, 10) : '')

      // 편집 시작: 현재 값으로 입력 필드 초기화
      const startEdit = () => {
        setName(item.name)
        setQuantity(item.quantity || '')
        setCategory(item.category || '')
        setExpiry(item.expiry ? item.expiry.slice(0, 10) : '')
        setEditing(true)
      }

      const cancelEdit = () => setEditing(false)

      // 저장: 부모에 PUT 요청을 위임, 성공하면 보기 모드로 전환
      const handleSave = () => {
        const trimmed = name.trim()
        if (!trimmed || busy) return
        onSave(item, { name: trimmed, quantity, category, expiry }, () => setEditing(false))
      }

      // ----- 편집 모드 -----
      if (editing) {
        return (
          <li className="rounded-xl border border-indigo-200 bg-indigo-50/40 p-4">
            <div className="flex flex-col gap-2">
              <Input
                value={name}
                onChange={(e) => setName(e.target.value)}
                placeholder="재료명"
                disabled={busy}
                className="w-full"
              />
              <div className="flex gap-2">
                <Input
                  value={quantity}
                  onChange={(e) => setQuantity(e.target.value)}
                  placeholder="수량"
                  disabled={busy}
                  className="flex-1"
                />
                <Select
                  value={category}
                  onChange={(e) => setCategory(e.target.value)}
                  disabled={busy}
                  className="w-28"
                >
                  <option value="">분류</option>
                  {CATEGORIES.map((c) => (
                    <option key={c} value={c}>{c}</option>
                  ))}
                </Select>
              </div>
              <Input
                type="date"
                value={expiry}
                onChange={(e) => setExpiry(e.target.value)}
                disabled={busy}
                className="w-full"
              />
            </div>
            <div className="flex justify-end gap-2 mt-3">
              <Button
                onClick={cancelEdit}
                disabled={busy}
                className="bg-slate-100 hover:bg-slate-200 text-slate-600"
              >
                취소
              </Button>
              <Button
                onClick={handleSave}
                disabled={busy || name.trim() === ''}
                className="bg-indigo-500 hover:bg-indigo-600 text-white"
              >
                {busy ? '저장 중…' : '저장'}
              </Button>
            </div>
          </li>
        )
      }

      // ----- 보기 모드 -----
      const status = getExpiryStatus(item.expiry)
      // 유통기한 강조: 지났으면 진한 빨강, 3일 이내면 빨강
      const expiryClass =
        status === 'expired'
          ? 'text-red-700 font-bold'
          : status === 'soon'
            ? 'text-red-500 font-semibold'
            : 'text-slate-400'

      return (
        <li className="group rounded-xl border border-slate-100 hover:border-slate-200 hover:bg-slate-50/60 transition-colors p-4">
          <div className="flex items-start justify-between gap-2">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <h3 className="font-semibold text-slate-800 break-words">{item.name}</h3>
                {item.quantity && (
                  <span className="text-sm text-slate-500">{item.quantity}</span>
                )}
                {item.category && (
                  <Badge className={`${CATEGORY_STYLE[item.category] || 'bg-slate-100 text-slate-600'} !px-2.5 !py-0.5 !text-xs`}>
                    {item.category}
                  </Badge>
                )}
              </div>
              {/* 유통기한: 상태에 따라 색상 강조 */}
              {item.expiry && (
                <p className={`mt-2 text-xs ${expiryClass}`}>
                  유통기한 {formatExpiry(item.expiry)}
                  {status === 'expired' && ' (지남)'}
                  {status === 'soon' && ' (임박)'}
                </p>
              )}
            </div>
            <div className="flex shrink-0 gap-1 sm:opacity-0 sm:group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
              <button
                type="button"
                onClick={startEdit}
                disabled={busy}
                aria-label={`"${item.name}" 수정`}
                className="px-2.5 py-1.5 rounded-lg text-sm font-medium text-slate-400
                  hover:text-indigo-600 hover:bg-indigo-50 transition-colors
                  disabled:opacity-50 disabled:cursor-not-allowed"
              >
                수정
              </button>
              <button
                type="button"
                onClick={() => onDelete(item)}
                disabled={busy}
                aria-label={`"${item.name}" 삭제`}
                className="px-2.5 py-1.5 rounded-lg text-sm font-medium text-slate-400
                  hover:text-red-600 hover:bg-red-50 transition-colors
                  disabled:opacity-50 disabled:cursor-not-allowed"
              >
                삭제
              </button>
            </div>
          </div>
        </li>
      )
    }

    // ========================================
    // 🍳 레시피 카드 컴포넌트
    // ========================================
    // Q2 대비 확장: 값이 있으면 썸네일 + 메타 배지(조리시간/난이도/스타일)를 보여준다.
    // 편집 모드는 기존과 동일하게 title/ingredients/steps 만 다룬다(확장 필드는 보기 전용).
    function RecipeItem({ recipe, onSave, onDelete, busy }) {
      const [editing, setEditing] = useState(false)
      const [title, setTitle] = useState(recipe.title)
      const [ingredients, setIngredients] = useState(recipe.ingredients || '')
      const [steps, setSteps] = useState(recipe.steps || '')

      const startEdit = () => {
        setTitle(recipe.title)
        setIngredients(recipe.ingredients || '')
        setSteps(recipe.steps || '')
        setEditing(true)
      }

      const cancelEdit = () => setEditing(false)

      const handleSave = () => {
        const trimmed = title.trim()
        if (!trimmed || busy) return
        onSave(recipe, { title: trimmed, ingredients, steps }, () => setEditing(false))
      }

      // ----- 편집 모드 -----
      if (editing) {
        return (
          <li className="rounded-xl border border-indigo-200 bg-indigo-50/40 p-4">
            <Input
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="레시피 제목"
              disabled={busy}
              className="w-full mb-2"
            />
            <Textarea
              value={ingredients}
              onChange={(e) => setIngredients(e.target.value)}
              placeholder="필요한 재료"
              disabled={busy}
              rows={3}
              className="mb-2"
            />
            <Textarea
              value={steps}
              onChange={(e) => setSteps(e.target.value)}
              placeholder="조리법"
              disabled={busy}
              rows={4}
              className="mb-3"
            />
            <div className="flex justify-end gap-2">
              <Button
                onClick={cancelEdit}
                disabled={busy}
                className="bg-slate-100 hover:bg-slate-200 text-slate-600"
              >
                취소
              </Button>
              <Button
                onClick={handleSave}
                disabled={busy || title.trim() === ''}
                className="bg-indigo-500 hover:bg-indigo-600 text-white"
              >
                {busy ? '저장 중…' : '저장'}
              </Button>
            </div>
          </li>
        )
      }

      // ----- 보기 모드 -----
      return (
        <li className="group rounded-xl border border-slate-100 hover:border-slate-200 hover:bg-slate-50/60 transition-colors p-4">
          {/* 썸네일: 값이 있고 로드 성공한 경우에만 표시 (onError 시 숨김) */}
          {recipe.thumbnail_url && (
            <RecipeThumbnail
              src={recipe.thumbnail_url}
              alt={recipe.title}
              className="mb-3"
            />
          )}

          <div className="flex items-start justify-between gap-2">
            <h3 className="font-semibold text-slate-800 break-words flex-1 min-w-0">
              {recipe.title}
            </h3>
            <div className="flex shrink-0 gap-1 sm:opacity-0 sm:group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
              <button
                type="button"
                onClick={startEdit}
                disabled={busy}
                aria-label={`"${recipe.title}" 수정`}
                className="px-2.5 py-1.5 rounded-lg text-sm font-medium text-slate-400
                  hover:text-indigo-600 hover:bg-indigo-50 transition-colors
                  disabled:opacity-50 disabled:cursor-not-allowed"
              >
                수정
              </button>
              <button
                type="button"
                onClick={() => onDelete(recipe)}
                disabled={busy}
                aria-label={`"${recipe.title}" 삭제`}
                className="px-2.5 py-1.5 rounded-lg text-sm font-medium text-slate-400
                  hover:text-red-600 hover:bg-red-50 transition-colors

              <p className="text-sm text-slate-600 whitespace-pre-wrap break-words">

    // ========================================
    // 🧊 재료 섹션
    // ========================================
    function IngredientSection() {
      const [items, setItems] = useState([])
      const [loading, setLoading] = useState(true)
      const [error, setError] = useState(null)
      const [actionError, setActionError] = useState(null)

      // 작성 폼 상태
      const [name, setName] = useState('')
      const [quantity, setQuantity] = useState('')
      const [category, setCategory] = useState('')
      const [expiry, setExpiry] = useState('')
      const [adding, setAdding] = useState(false)

      // 검색 + 카테고리 필터
      const [query, setQuery] = useState('')
      const [activeQuery, setActiveQuery] = useState('')
      const [filterCategory, setFilterCategory] = useState('') // '' = 전체

      const [busyIds, setBusyIds] = useState(new Set())

      const setBusy = (id, on) => {
        setBusyIds((prev) => {
          const next = new Set(prev)
          if (on) next.add(id)
          else next.delete(id)
          return next
        })
      }

      // /api/ingredients 목록 조회 (검색어 + 카테고리 필터)
      const loadItems = (q = '', cat = '') => {
        setLoading(true)
        setError(null)

        const params = new URLSearchParams()
        const trimmed = q.trim()
        if (trimmed) params.set('q', trimmed)
        if (cat) params.set('category', cat)
        const qs = params.toString()
        const url = qs ? `${API_BASE_URL}/ingredients?${qs}` : `${API_BASE_URL}/ingredients`

        fetch(url)
          .then((res) => {
            if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`)
            return res.json()
          })
          .then((data) => {
            setItems(Array.isArray(data) ? data : [])
          })
          .catch((err) => {
            setError(err.message || '알 수 없는 오류')
          })
          .finally(() => {
            setLoading(false)
          })
      }

      // 검색어 디바운스(약 300ms)
      useEffect(() => {
        const timer = setTimeout(() => {
          setActiveQuery(query.trim())
        }, 300)
        return () => clearTimeout(timer)
      }, [query])

      // 검색어/카테고리 필터가 바뀔 때마다 재조회 (최초 마운트 포함)
      useEffect(() => {
        loadItems(activeQuery, filterCategory)
      }, [activeQuery, filterCategory])

      // 추가: POST /api/ingredients
      const handleAdd = () => {
        const trimmed = name.trim()
        if (!trimmed || adding) return

        setAdding(true)
        setActionError(null)

        fetch(`${API_BASE_URL}/ingredients`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: trimmed, quantity, category, expiry }),
        })
          .then((res) => {
            if (!res.ok) throw new Error(`추가 실패 (${res.status})`)
            return res.json()
          })
          .then((created) => {
            // 현재 필터/검색 조건에 맞을 때만 즉시 목록 맨 위에 반영
            const matchQuery = !activeQuery || created.name.includes(activeQuery)
            const matchCategory = !filterCategory || created.category === filterCategory
            if (matchQuery && matchCategory) {
              setItems((prev) => [created, ...prev])
            }
            // 폼 초기화
            setName('')
            setQuantity('')
            setCategory('')
            setExpiry('')
          })
          .catch((err) => {
            setActionError(err.message || '추가 중 오류가 발생했어요')
          })
          .finally(() => {
            setAdding(false)
          })
      }

      // 수정: PUT /api/ingredients/:id
      const handleSave = (item, payload, onDone) => {
        if (busyIds.has(item.id)) return

        setActionError(null)
        setBusy(item.id, true)

        fetch(`${API_BASE_URL}/ingredients/${item.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        })
          .then((res) => {
            if (!res.ok) throw new Error(`수정 실패 (${res.status})`)
            return res.json()
          })
          .then((updated) => {
            setItems((prev) =>
              prev.map((it) => (it.id === updated.id ? { ...it, ...updated } : it))
            )
            if (onDone) onDone()
          })
          .catch((err) => {
            setActionError(err.message || '수정 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(item.id, false)
          })
      }

      // 삭제: DELETE /api/ingredients/:id — 낙관적 제거 후 실패 시 롤백
      const handleDelete = (item) => {
        if (busyIds.has(item.id)) return

        setActionError(null)
        setBusy(item.id, true)

        let removedIndex = -1
        setItems((prev) => {
          removedIndex = prev.findIndex((it) => it.id === item.id)
          return prev.filter((it) => it.id !== item.id)
        })

        fetch(`${API_BASE_URL}/ingredients/${item.id}`, { method: 'DELETE' })
          .then((res) => {
            if (!res.ok) throw new Error(`삭제 실패 (${res.status})`)
            return res.json()
          })
          .catch((err) => {
            setItems((prev) => {
              const next = [...prev]
              const at = removedIndex >= 0 ? removedIndex : next.length
              next.splice(at, 0, item)
              return next
            })
            setActionError(err.message || '삭제 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(item.id, false)
          })
      }

      const total = items.length
      const searching = activeQuery !== '' || filterCategory !== ''

      // 카테고리 필터 버튼 목록 (전체 + 각 카테고리)
      const filterButtons = ['', ...CATEGORIES]

      return (
        <div>
          {/* 작성 폼 */}
          <div className="flex flex-col gap-2">
            <Input
              value={name}
              onChange={(e) => setName(e.target.value)}
              placeholder="재료명 (예: 계란)"
              disabled={adding}
              className="w-full"
            />
            <div className="flex gap-2">
              <Input
                value={quantity}
                onChange={(e) => setQuantity(e.target.value)}
                placeholder="수량 (예: 6개)"
                disabled={adding}
                className="flex-1"
              />
              <Select
                value={category}
                onChange={(e) => setCategory(e.target.value)}
                disabled={adding}
                className="w-28"
              >
                <option value="">분류</option>
                {CATEGORIES.map((c) => (
                  <option key={c} value={c}>{c}</option>
                ))}
              </Select>
            </div>
            <div className="flex gap-2">
              <Input
                type="date"
                value={expiry}
                onChange={(e) => setExpiry(e.target.value)}
                disabled={adding}
                className="flex-1"
              />
              <Button
                onClick={handleAdd}
                disabled={adding || name.trim() === ''}
                className="bg-indigo-500 hover:bg-indigo-600 text-white shrink-0"
              >
                {adding ? '추가 중…' : '재료 추가'}
              </Button>
            </div>
          </div>

          <ActionErrorBanner message={actionError} onClose={() => setActionError(null)} />

          {/* 카테고리 필터 버튼 */}
          <div className="mt-4 flex gap-2 flex-wrap">
            {filterButtons.map((cat) => {
              const selected = filterCategory === cat
              const label = cat === '' ? '전체' : cat
              return (
                <button
                  key={label}
                  type="button"
                  onClick={() => setFilterCategory(cat)}
                  className={`px-3 py-1.5 rounded-full text-sm font-semibold transition-colors
                    ${selected
                      ? 'bg-indigo-500 text-white'
                      : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                >
                  {label}
                </button>
              )
            })}
          </div>

          {/* 검색창 */}
          <div className="mt-3">
            <Input
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="🔍 재료 검색"
              className="w-full"
            />
          </div>

          {/* 본문: 상태별 분기 */}
          <div className="mt-4">
            {loading && <LoadingState label="재료를 불러오는 중..." />}

            {!loading && error && (
              <ErrorState message={error} onRetry={() => loadItems(activeQuery, filterCategory)} />
            )}

            {!loading && !error && total === 0 && (
              <EmptyState searching={searching} icon="🧊" emptyText="등록된 재료가 없어요" />
            )}

            {!loading && !error && total > 0 && (
              <ul className="flex flex-col gap-3 py-2">
                {items.map((item) => (
                  <IngredientItem
                    key={item.id}
                    item={item}
                    onSave={handleSave}
                    onDelete={handleDelete}
                    busy={busyIds.has(item.id)}
                  />
                ))}
              </ul>
            )}
          </div>
        </div>
      )
    }

    // ========================================
    // ✨ AI 레시피 섹션
    // ========================================
    // 저장된 냉장고 재료를 바탕으로 AI 레시피를 생성 → 미리보기 → 저장/재생성.
    function AiRecipeSection() {
      // 선택된 스타일 ('' = 기본)
      const [style, setStyle] = useState('')
      // 생성 중 여부
      const [generating, setGenerating] = useState(false)
      // 저장 중 여부
      const [saving, setSaving] = useState(false)
      // 생성된 레시피 미리보기 (null = 아직 없음)
      const [preview, setPreview] = useState(null)
      // 생성/저장 에러 메시지
      const [actionError, setActionError] = useState(null)
      // 재료 없음(400) 안내 여부 — 별도 안내 문구를 띄운다
      const [noIngredients, setNoIngredients] = useState(false)
      // 저장 성공 안내
      const [savedMessage, setSavedMessage] = useState(null)

      // 서버 에러 메시지를 최대한 그대로 뽑아낸다.
      // (JSON 이면 message/error 필드, 아니면 상태 코드 문구)
      const extractError = async (res, fallback) => {
        try {
          const data = await res.json()
          if (data && (data.message || data.error)) {
            return data.message || data.error
          }
        } catch (e) {
          // JSON 이 아닐 수 있음 — 무시하고 fallback 사용
        }
        return fallback
      }

      // AI 레시피 생성: POST /api/generate-recipe { style }
      const handleGenerate = () => {
        if (generating) return

        setGenerating(true)
        setActionError(null)
        setNoIngredients(false)
        setSavedMessage(null)

        fetch(`${API_BASE_URL}/generate-recipe`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ style }),
        })
          .then(async (res) => {
            if (!res.ok) {
              // 400 = 재료가 하나도 없을 때로 간주하여 안내 문구 노출
              if (res.status === 400) {
                setNoIngredients(true)
                const msg = await extractError(res, '재료가 없어 레시피를 만들 수 없어요')
                throw new Error(msg)
              }
              const msg = await extractError(res, `AI 생성 실패 (${res.status})`)
              throw new Error(msg)
            }
            return res.json()
          })
          .then((data) => {
            // 서버 응답을 그대로 미리보기로 저장
            setPreview(data)
          })
          .catch((err) => {
            setActionError(err.message || 'AI 레시피 생성 중 오류가 발생했어요')
          })
          .finally(() => {
            setGenerating(false)
          })
      }

      // 저장: POST /api/recipes — 미리보기 내용을 레시피 목록에 저장
      const handleSave = () => {
        if (!preview || saving) return

        setSaving(true)
        setActionError(null)
        setSavedMessage(null)

        // 미리보기의 확장 필드까지 그대로 저장한다
        const payload = {
          title: preview.title,
          ingredients: preview.ingredients,
          steps: preview.steps,
          cook_time: preview.cook_time,
          difficulty: preview.difficulty,
          style: preview.style,
          thumbnail_url: preview.thumbnail_url,
        }

        fetch(`${API_BASE_URL}/recipes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        })
          .then(async (res) => {
            if (!res.ok) {
              const msg = await extractError(res, `저장 실패 (${res.status})`)
              throw new Error(msg)
            }
            return res.json()
          })
          .then(() => {
            // 저장 성공 안내. 미리보기는 그대로 유지한다.
            setSavedMessage('레시피 탭에 저장됐어요!')
          })
          .catch((err) => {
            setActionError(err.message || '저장 중 오류가 발생했어요')
          })
          .finally(() => {
            setSaving(false)
          })
      }

      // 재생성: 같은 style 로 다시 생성 (미리보기 갱신)
      const handleRegenerate = () => {
        handleGenerate()
      }

      const busy = generating || saving

      return (
        <div>
          {/* 안내 문구 */}
          <p className="text-sm text-slate-500">
            🧊 재료 탭에 저장된 냉장고 재료로 AI가 레시피를 만들어드려요.
          </p>

          {/* 스타일 선택 버튼 그룹 (하나만 선택) */}
          <div className="mt-4">
            <p className="text-xs font-semibold text-slate-400 mb-2">스타일 선택</p>
            <div className="flex gap-2 flex-wrap">
              {RECIPE_STYLES.map((opt) => {
                const selected = style === opt.value
                return (
                  <button
                    key={opt.label}
                    type="button"
                    onClick={() => setStyle(opt.value)}
                    disabled={busy}
                    className={`px-3 py-1.5 rounded-full text-sm font-semibold transition-colors
                      disabled:opacity-50 disabled:cursor-not-allowed
                      ${selected
                        ? 'bg-indigo-500 text-white'
                        : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                  >
                    {opt.label}
                  </button>
                )
              })}
            </div>
          </div>

          {/* 생성 버튼 */}
          <div className="mt-4">
            <Button
              onClick={handleGenerate}
              disabled={busy}
              className="w-full bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-600 hover:to-violet-600 text-white"
            >
              {generating ? 'AI가 레시피를 만들고 있어요…' : '✨ AI 레시피 생성'}
            </Button>
          </div>

          {/* 저장 성공 안내 */}
          <ActionSuccessBanner message={savedMessage} onClose={() => setSavedMessage(null)} />

          {/* 에러 배너 */}
          <ActionErrorBanner message={actionError} onClose={() => setActionError(null)} />

          {/* 재료 없음(400) 안내 */}
          {noIngredients && (
            <div className="mt-3 px-4 py-3 rounded-xl bg-amber-50 text-amber-700 text-sm border border-amber-100">
              먼저 🧊 재료 탭에서 재료를 추가하세요.
            </div>
          )}

          {/* 생성 중 로딩 표시 (몇 초 걸릴 수 있음) */}
          {generating && (
            <LoadingState label="AI가 레시피를 만들고 있어요... (몇 초 걸려요)" />
          )}

          {/* 결과 미리보기 카드 (생성 성공 & 로딩 아님) */}
          {!generating && preview && (
            <div className="mt-5 rounded-2xl border border-indigo-100 bg-indigo-50/30 p-4">
              <p className="text-xs font-semibold text-indigo-400 mb-3">✨ 생성 결과 미리보기</p>

              {/* 썸네일 (로드 실패 시 숨김) */}
              {preview.thumbnail_url && (
                <RecipeThumbnail
                  src={preview.thumbnail_url}
                  alt={preview.title}
                  className="mb-3"
                />
              )}

              {/* 제목 */}
              <h3 className="text-xl font-bold text-slate-800 break-words">
                {preview.title}
              </h3>

              {/* 메타 배지: 조리시간 / 난이도 / 스타일 */}
              <RecipeMetaBadges
                cookTime={preview.cook_time}
                difficulty={preview.difficulty}
                style={preview.style}
                className="mt-2"
              />

              {/* 재료 */}
              {preview.ingredients && (
                <div className="mt-3">
                  <p className="text-xs font-semibold text-slate-400 mb-0.5">재료</p>
                  <p className="text-sm text-slate-600 whitespace-pre-wrap break-words">
                    {preview.ingredients}
                  </p>
                </div>
              )}

              {/* 조리법 */}
              {preview.steps && (
                <div className="mt-3">
                  <p className="text-xs font-semibold text-slate-400 mb-0.5">조리법</p>
                  <p className="text-sm text-slate-600 whitespace-pre-wrap break-words">
                    {preview.steps}
                  </p>
                </div>
              )}

              {/* 저장 / 재생성 버튼 */}
              <div className="mt-4 flex gap-2">
                <Button
                  onClick={handleSave}
                  disabled={busy}
                  className="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white"
                >
                  {saving ? '저장 중…' : '💾 저장'}
                </Button>
                <Button
                  onClick={handleRegenerate}
                  disabled={busy}
                  className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600"
                >
                  🔄 재생성
                </Button>
              </div>
            </div>
          )}
        </div>
      )
    }

    // ========================================
    // 🍳 레시피 섹션
    // ========================================
    function RecipeSection() {
      const [recipes, setRecipes] = useState([])
      const [loading, setLoading] = useState(true)
      const [error, setError] = useState(null)
      const [actionError, setActionError] = useState(null)

      // 작성 폼 상태
      const [title, setTitle] = useState('')
      const [ingredients, setIngredients] = useState('')
      const [steps, setSteps] = useState('')
      const [adding, setAdding] = useState(false)

      // 검색
      const [query, setQuery] = useState('')
      const [activeQuery, setActiveQuery] = useState('')

      const [busyIds, setBusyIds] = useState(new Set())

      const setBusy = (id, on) => {
        setBusyIds((prev) => {
          const next = new Set(prev)
          if (on) next.add(id)
          else next.delete(id)
          return next
        })
      }

      // /api/recipes 목록 조회 (검색어가 있으면 ?q=)
      const loadRecipes = (q = '') => {
        setLoading(true)
        setError(null)

        const trimmed = q.trim()
        const url = trimmed
          ? `${API_BASE_URL}/recipes?q=${encodeURIComponent(trimmed)}`
          : `${API_BASE_URL}/recipes`

        fetch(url)
          .then((res) => {
            if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`)
            return res.json()
          })
          .then((data) => {
            setRecipes(Array.isArray(data) ? data : [])
          })
          .catch((err) => {
            setError(err.message || '알 수 없는 오류')
          })
          .finally(() => {
            setLoading(false)
          })
      }

      // 검색어 디바운스(약 300ms)
      useEffect(() => {
        const timer = setTimeout(() => {
          setActiveQuery(query.trim())
        }, 300)
        return () => clearTimeout(timer)
      }, [query])

      useEffect(() => {
        loadRecipes(activeQuery)
      }, [activeQuery])

      // 추가: POST /api/recipes
      const handleAdd = () => {
        const trimmed = title.trim()
        if (!trimmed || adding) return

        setAdding(true)
        setActionError(null)

        fetch(`${API_BASE_URL}/recipes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: trimmed, ingredients, steps }),
        })
          .then((res) => {
            if (!res.ok) throw new Error(`추가 실패 (${res.status})`)
            return res.json()
          })
          .then((created) => {
            if (!activeQuery) {
              setRecipes((prev) => [created, ...prev])
            }
            setTitle('')
            setIngredients('')
            setSteps('')
          })
          .catch((err) => {
            setActionError(err.message || '추가 중 오류가 발생했어요')
          })
          .finally(() => {
            setAdding(false)
          })
      }

      // 수정: PUT /api/recipes/:id
      const handleSave = (recipe, payload, onDone) => {
        if (busyIds.has(recipe.id)) return

        setActionError(null)
        setBusy(recipe.id, true)

        fetch(`${API_BASE_URL}/recipes/${recipe.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        })
          .then((res) => {
            if (!res.ok) throw new Error(`수정 실패 (${res.status})`)
            return res.json()
          })
          .then((updated) => {
            setRecipes((prev) =>
              prev.map((r) => (r.id === updated.id ? { ...r, ...updated } : r))
            )
            if (onDone) onDone()
          })
          .catch((err) => {
            setActionError(err.message || '수정 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(recipe.id, false)
          })
      }

      // 삭제: DELETE /api/recipes/:id — 낙관적 제거 후 실패 시 롤백
      const handleDelete = (recipe) => {
        if (busyIds.has(recipe.id)) return

        setActionError(null)
        setBusy(recipe.id, true)

        let removedIndex = -1
        setRecipes((prev) => {
          removedIndex = prev.findIndex((r) => r.id === recipe.id)
          return prev.filter((r) => r.id !== recipe.id)
        })

        fetch(`${API_BASE_URL}/recipes/${recipe.id}`, { method: 'DELETE' })
          .then((res) => {
            if (!res.ok) throw new Error(`삭제 실패 (${res.status})`)
            return res.json()
          })
          .catch((err) => {
            setRecipes((prev) => {
              const next = [...prev]
              const at = removedIndex >= 0 ? removedIndex : next.length
              next.splice(at, 0, recipe)
              return next
            })
            setActionError(err.message || '삭제 중 오류가 발생했어요')
          })
          .finally(() => {
            setBusy(recipe.id, false)
          })
      }

      const total = recipes.length
      const searching = activeQuery !== ''

      return (
        <div>
          {/* 작성 폼 */}
          <div className="flex flex-col gap-2">
            <Input
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="레시피 제목 (예: 김치볶음밥)"
              disabled={adding}
              className="w-full"
            />
            <Textarea
              value={ingredients}
              onChange={(e) => setIngredients(e.target.value)}
              placeholder="필요한 재료 (예: 밥 1공기, 김치 한 줌, 계란 1개)"
              disabled={adding}
              rows={2}
            />
            <Textarea
              value={steps}
              onChange={(e) => setSteps(e.target.value)}
              placeholder="조리법을 적어주세요"
              disabled={adding}
              rows={3}
            />
            <div className="flex justify-end">
              <Button
                onClick={handleAdd}
                disabled={adding || title.trim() === ''}
                className="bg-indigo-500 hover:bg-indigo-600 text-white shrink-0"
              >
                {adding ? '추가 중…' : '레시피 추가'}
              </Button>
            </div>
          </div>

          <ActionErrorBanner message={actionError} onClose={() => setActionError(null)} />

          {/* 검색창 */}
          <div className="mt-4">
            <Input
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="🔍 레시피 검색 (제목·재료)"
              className="w-full"
            />
          </div>

          {/* 본문: 상태별 분기 */}
          <div className="mt-4">
            {loading && <LoadingState label="레시피를 불러오는 중..." />}

            {!loading && error && (
              <ErrorState message={error} onRetry={() => loadRecipes(activeQuery)} />
            )}

            {!loading && !error && total === 0 && (
              <EmptyState searching={searching} icon="🍳" emptyText="작성된 레시피가 없어요" />
            )}

            {!loading && !error && total > 0 && (
              <ul className="flex flex-col gap-3 py-2">
                {recipes.map((recipe) => (
                  <RecipeItem
                    key={recipe.id}
                    recipe={recipe}
                    onSave={handleSave}
                    onDelete={handleDelete}
                    busy={busyIds.has(recipe.id)}
                  />
                ))}
              </ul>
            )}
          </div>
        </div>
      )
    }

    // ========================================
    // 📄 페이지 컴포넌트 (탭 전환)
    // ========================================
    function RecipeManagerApp() {
      const [tab, setTab] = useState('ingredients') // 'ingredients' | 'ai' | 'recipes'

      // 탭 정의 (표시 순서: 재료 → AI 레시피 → 레시피)
      const tabs = [
        { key: 'ingredients', label: '🧊 재료' },
        { key: 'ai', label: '✨ AI 레시피' },
        { key: 'recipes', label: '🍳 레시피' },
      ]

      return (
        <main className="max-w-lg mx-auto px-4 py-10 sm:py-16">
          <Card className="overflow-hidden">
            {/* 헤더 */}
            <header className="px-6 py-6 bg-gradient-to-r from-indigo-500 to-violet-500 text-white">
              <h1 className="text-2xl font-bold tracking-tight">냉장고 재료 & AI 레시피</h1>
              <p className="text-indigo-100 text-sm mt-1">남은 재료로 AI가 레시피를 만들어드려요</p>
            </header>

            {/* 탭 (3개) */}
            <div className="px-6 pt-5">
              <div className="flex gap-1 p-1 rounded-xl bg-slate-100">
                {tabs.map((t) => (
                  <button
                    key={t.key}
                    type="button"
                    onClick={() => setTab(t.key)}
                    className={`flex-1 px-3 py-2 rounded-lg text-sm font-semibold transition-colors
                      ${tab === t.key
                        ? 'bg-white text-indigo-600 shadow-sm'
                        : 'text-slate-500 hover:text-slate-700'}`}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* 탭별 본문 */}
            <div className="px-6 pb-4 pt-5">
              {tab === 'ingredients' && <IngredientSection />}
              {tab === 'ai' && <AiRecipeSection />}
              {tab === 'recipes' && <RecipeSection />}
            </div>
          </Card>

          {/* 푸터 안내 */}
          <p className="text-center text-xs text-slate-400 mt-6">
            재료와 레시피는 PostgreSQL 데이터베이스에 저장됩니다.
          </p>
        </main>
      )
    }

    // ========================================
    // 🚀 App + 렌더링
    // ========================================
    function App() {
      return <RecipeManagerApp />
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
